ergy of the object."}, {"topic": "Section 1", "q": "The impulse-momentum principle is described as the change in momentum of an object being equal to what?", "o": ["A) The net force applied to the object.", "B) The time over which the force is applied.", "C) The work done on the object.", "D) The displacement of the object."], "a": "B) The time over which the force is applied."}, {"topic": "Section 1", "q": "What is the fundamental difference between a particle and a rigid body in mechanics?", "o": ["A) Particles have dimensions, while rigid bodies have negligible size.", "B) Particles can rotate, while rigid bodies remain stationary.", "C) Particles have mass, while rigid bodies have volume.", "D) Particles can deform, while rigid bodies maintain their shape."], "a": "A) Particles have dimensions, while rigid bodies have negligible size."}, {"topic": "Section 1", "q": "In a system in static equilibrium, which of the following statements is true?", "o": ["A) The system is necessarily at rest.", "B) There is no net external force or torque acting on the system.", "C) The internal forces and torques within the system are always zero.", "D) Kinetic energy of the system is zero."], "a": "B) There is no net external force or torque acting on the system."}, {"topic": "Section 1", "q": "Which of Newton's laws of motion deals with the concept of inertia?", "o": ["A) Newton's First Law", "B) Newton's Second Law", "C) Newton's Third Law", "D) Newton's Law of Universal Gravitation"], "a": "A) Newton's First Law"}, {"topic": "Section 1", "q": "What is the relationship between the force of gravity (F) and the distance (r) between two objects in Newton's Law of Gravitation?", "o": ["A) F \u221d r", "B) F \u221d 1/r", "C) F \u221d r^2", "D) F \u221d 1/r^2"], "a": "D) F \u221d 1/r^2"}, {"topic": "Section 1", "q": "According to the work-energy theorem, what is the work done on an object when its kinetic energy increases?", "o": ["A) Positive work", "B) Negative work", "C) Zero work"  of tension in a string."], "a": "B) The force of attraction between two masses."}, {"topic": "Section 1", "q": "The work-energy theorem states that the work done on an object is equal to what?", "o": ["A) The object's acceleration.", "B) The object's displacement.", "C) The object's initial velocity.", "D) The object's mass."], "a": "B) The object's displacement."}, {"topic": "Section 1", "q": "Which of the following is true about the impulse-momentum principle?", "o": ["A) Impulse is equal to the change in velocity.", "B) Impulse is equal to the change in momentum.", "C) Impulse is equal to the force applied.", "D) Impulse is equal to the time of application."], "a": "B) Impulse is equal to the change in momentum."}, {"topic": "Section 1", "q": "What is the key characteristic of a particle in the context of applied mechanics?", "o": ["A) It has no mass", "B) It has no volume", "C) It has no velocity", "D) It has no forces acting on it"], "a": "B) It has no volume"}, {"topic": "Section 1", "q": "In statics, what is necessary for an object to be in static equilibrium?", "o": ["A) Zero velocity", "B) Zero acceleration", "C) Zero force", "D) Zero work done"], "a": "B) Zero acceleration"}, {"topic": "Section 1", "q": "Which of the following is not a fundamental force acting on a particle or object?", "o": ["A) Gravitational force", "B) Electromagnetic force", "C) Frictional force", "D) Inertial force"], "a": "D) Inertial force"}, {"topic": "Section 1", "q": "Which law of motion describes the relationship between the net force applied to an object and its acceleration?", "o": ["A) Newton's First Law", "B) Newton's Second Law", "C) Newton's Third Law", "D) Newton's Law of Gravitation"], "a": "B) Newton's Second Law"}, {"topic": "Section 1", "q": "What does Newton's Law of Gravitation describe?", "o": ["A) The behavior of objects in static equilibrium", "B) The relationship between force and acceleration", "C) The force of friction", "D) The gravitational attraction between two masses"], "a": "D) The gravitational attraction between two masses"}, {"topic": "Section 1", "q": "The work-energy theorem states that the work done on an object is equal to:", "o": ["A) Its velocity", "B) Its displacement", "C) Its kinetic energy", "D) Its mass"], "a": "C) Its kinetic energy"}, {"topic": "Section 1", "q": "Which principle describes the change in momentum of an object when a force is applied to it?", "o": ["A) Work-Energy Theorem", "B) Newton's Third Law", "C) Impulse-Momentum Principle", "D) Law of Inertia"], "a": "C) Impulse-Momentum Principle"}, {"topic": "Section 1", "q": "What type of body maintains its shape and size when subjected to external forces?", "o": ["A) Deformable body", "B) Rigid body", "C) Particle", "D) Solid body"], "a": "B) Rigid body"}, {"topic": "Section 1", "q": "The force that opposes the relative motion or tendency of such motion between two surfaces in contact is called:", "o": ["A) Gravitational force", "B) Frictional force", "C) Tension force", "D) Elastic force"], "a": "B) Frictional force"}, {"topic": "Section 1", "q": "When calculating the net force on an object, what should be considered for forces acting in different directions?", "o": ["A) Only the magnitude", "B) Only the direction", "C) Both magnitude and direction", "D) Neither magnitude nor direction"], "a": "C) Both magnitude and direction"}, {"topic": "Section 1", "q": "Which of the following best defines a particle in the context of applied mechanics?", "o": ["A) An extremely small physical object", "B) An object with a fixed shape", "C) A body that can deform under load", "D) A body with both translational and rotational motion"], "a": "A) An extremely small physical object"}, {"topic": "Section 1", "q": "In statics, what does \"static equilibrium\" mean?", "o": ["A) The object is stationary", "B) The object is at rest but may be in motion", "C) The object is moving at a constant velocity", "D) The object is accelerating"], "a": "A) The object is sta ung's modulus", "B) Shear modulus", "C) Bulk modulus", "D) Poisson's ratio"], "a": "A) Young's modulus"}, {"topic": "Section 1", "q": "What is the strain that results from a change in temperature called?", "o": ["A) Longitudinal strain", "B) Lateral strain", "C) Thermal strain", "D) Poisson's strain"], "a": "C) Thermal strain"}, {"topic": "Section 1", "q": "Poisson's ratio is a measure of the relationship between:", "o": ["A) Stress and strain", "B) Longitudinal and lateral strain", "C) Elastic and plastic deformation", "D) Modulus of elasticity and bulk modulus"], "a": "B) Longitudinal and lateral strain"}, {"topic": "Section 1", "q": "Which modulus of elasticity measures a material's resistance to volumetric deformation?", "o": ["A) Young's modulus", "B) Shear modulus", "C) Bulk modulus", "D) Poisson's modulus"], "a": "C) Bulk modulus"}, {"topic": "Section 1", "q": "What is the measure of the ability of a material to absorb energy without undergoing permanent deformation or failure?", "o": ["A) Strain energy", "B) Elastic modulus", "C) Stress-strain curve", "D) Plastic deformation"], "a": "A) Strain energy"}, {"topic": "Section 1", "q": "Which type of loading involves a sudden and intense application of force over a short period of time?", "o": ["A) Static loading", "B) Dynamic loading", "C) Tensile loading", "D) Compressive loading"], "a": "B) Dynamic loading"}, {"topic": "Section 1", "q": "What is the fundamental relationship described by Hooke's Law in the theory of elasticity?", "o": ["A) Stress = Strain", "B) Stress = Modulus of Elasticity", "C) Stress = Poisson's Ratio", "D) Stress = Volumetric Strain"], "a": "A) Stress = Strain"}, {"topic": "Section 1", "q": "Which material property characterizes a material's resistance to deformation under an applied load?", "o": ["A) Modulus of Elasticity", "B) Poisson's Ratio", "C) Volumetric Strain", "D) Thermal Stress"], "a": "A) Modulus of Elasticity"}, {"topic": "Section 1", "q": "Poisson's Ratio is a measure of:", " ch material property measures a material's ability to absorb energy without breaking?", "o": ["A) Modulus of Elasticity", "B) Thermal Stress", "C) Impact Strength", "D) Strain Energy Absorption"], "a": "C) Impact Strength"}, {"topic": "Section 1", "q": "What is the fundamental relationship that defines the behavior of elastic materials under stress?", "o": ["A) Hooke's Law", "B) Pascal's Principle", "C) Bernoulli's Theorem", "D) Archimedes' Principle"], "a": "A) Hooke's Law"}, {"topic": "Section 1", "q": "What is the Modulus of Elasticity often referred to as?", "o": ["A) Elastic Modulus", "B) Stress Modulus", "C) Shear Modulus", "D) Poisson's Ratio"], "a": "A) Elastic Modulus"}, {"topic": "Section 1", "q": "What is the relationship between the longitudinal strain and the longitudinal stress for a material obeying Hooke's Law?", "o": ["A) Directly proportional", "B) Inversely proportional", "C) Quadratically proportional", "D) No relationship"], "a": "A) Directly proportional"}, {"topic": "Section 1", "q": "What does Poisson's ratio describe?", "o": ["A) The ratio of lateral strain to longitudinal strain", "B) The ratio of stress to strain", "C) The ratio of volume to area", "D) The ratio of density to mass"], "a": "A) The ratio of lateral strain to longitudinal strain"}, {"topic": "Section 1", "q": "Which parameter describes a material's ability to resist a change in volume under pressure?", "o": ["A) Modulus of Elasticity", "B) Poisson's Ratio", "C) Bulk Modulus", "D) Shear Modulus"], "a": "C) Bulk Modulus"}, {"topic": "Section 1", "q": "What type of strain results from temperature changes in a material?", "o": ["A) Longitudinal strain", "B) Lateral strain", "C) Thermal strain", "D) Volumetric strain"], "a": "C) Thermal strain"}, {"topic": "Section 1", "q": "Which concept represents the energy stored in a deformed elastic material?", "o": ["A) Strain Energy", "B) Kinetic Energy", "C) Potential Energy", "D) Elastic Energy"], "a": "A) Strain Energy"}, {"topic": "Sec ) Bulk modulus", "C) Young's modulus", "D) Tensile modulus"], "a": "B) Bulk modulus"}, {"topic": "Section 1", "q": "Which property represents the ability of a material to absorb energy without permanent deformation?", "o": ["A) Strain energy", "B) Stress energy", "C) Impact energy", "D) Elastic energy"], "a": "A) Strain energy"}, {"topic": "Section 1", "q": "Impact loading is associated with:", "o": ["A) Slow and gradual force application", "B) Sudden and dynamic force application", "C) Constant stress over time", "D) Low-stress levels"], "a": "B) Sudden and dynamic force application"}, {"topic": "Section 1", "q": "What is the relationship between stress and strain in a material obeying Hooke's Law?", "o": ["A) Stress = Strain", "B) Stress = Modulus of Elasticity \u00d7 Strain", "C) Stress = Poisson's Ratio \u00d7 Strain", "D) Stress = Bulk Modulus \u00d7 Strain"], "a": "B) Stress = Modulus of Elasticity \u00d7 Strain"}, {"topic": "Section 1", "q": "What does Poisson's Ratio measure in a material under deformation?", "o": ["A) The ratio of longitudinal strain to lateral strain", "B) The ratio of stress to strain", "C) The ratio of bulk modulus to Young's modulus", "D) The ratio of stress to deformation"], "a": "A) The ratio of longitudinal strain to lateral strain"}, {"topic": "Section 1", "q": "The modulus of elasticity measures a material's:", "o": ["A) Resistance to deformation under a thermal load", "B) Resistance to deformation under an impact load", "C) Stiffness and ability to return to its original shape after deformation", "D) Resistance to deformation due to gravity"], "a": "C) Stiffness and ability to return to its original shape after deformation"}, {"topic": "Section 1", "q": "Which parameter represents the resistance of a material to thermal stress due to temperature changes?", "o": ["A) Bulk Modulus", "B) Young's Modulus", "C) Shear Modulus", "D) Thermal Expansion Coefficient"], "a": "D) Thermal Expansion Coefficient"}, {"topic": "Section 1", "q": "What does the bulk modulus measure in a material?", "o": ["A) The ability of a material to resist shearing forces", "B) The ability of a material to return to its original shape after deformation", "C) The ability of a material to resist volume changes under pressure", "D) The ability of a material to resist tensile forces"], "a": "C) The ability of a material to resist volume changes under pressure"}, {"topic": "Section 1", "q": "Strain energy is stored in a material when:", "o": ["A) Stress exceeds the elastic limit", "B) Stress and strain are equal", "C) A material is at rest", "D) A material is heated"], "a": "A) Stress exceeds the elastic limit"}, {"topic": "Section 1", "q": "What does Poisson's ratio indicate about a material?", "o": ["A) Its stiffness", "B) Its ability to withstand high temperatures", "C) Its ability to conduct electricity", "D) Its ability to deform in response to stress"], "a": "D) Its ability to deform in response to stress"}, {"topic": "Section 1", "q": "What property of a material is characterized by its ability to absorb impact energy without fracturing?", "o": ["A) Hardness", "B) Toughness", "C) Ductility", "D) Brittleness"], "a": "B) Toughness"}, {"topic": "Section 1", "q": "What is the centroid of a triangle?", "o": ["A) At the intersection of its medians", "B) At the intersection of its altitudes", "C) At the intersection of its bisectors", "D) At the midpoint of its base"], "a": "A) At the intersection of its medians"}, {"topic": "Section 1", "q": "Which geometric shape has the largest area moment of inertia for a given area?", "o": ["A) Rectangle", "B) Circle", "C) Triangle", "D) Ellipse"], "a": "B) Circle"}, {"topic": "Section 1", "q": "In a simply supported beam, where does the maximum bending moment occur?", "o": ["A) At the midpoint", "B) At the support", "C) At a quarter-span from one end", "D) At the free end"], "a": "B) At the support"}, {"topic": "Section 1", "q": "Which beam loading case will result in the maximum deflectio ) Newton's First Law", "B) Newton's Second Law", "C) Newton's Third Law", "D) Kepler's Law"], "a": "B) Newton's Second Law"}, {"topic": "Section 1", "q": "Which type of pair in a mechanism allows both relative sliding and turning between two links?", "o": ["A) Higher pair", "B) Lower pair", "C) Binary pair", "D) Ternary pair"], "a": "B) Lower pair"}, {"topic": "Section 1", "q": "What is the primary effect of a gyroscopic couple in a spinning object?", "o": ["A) Torsional stress", "B) Precession", "C) Nutation", "D) Axial wobbling"], "a": "B) Precession"}, {"topic": "Section 1", "q": "In a centrifugal governor, if the balls move outward, the speed of the engine will:", "o": ["A) Increase", "B) Decrease", "C) Remain constant", "D) Vary randomly"], "a": "B) Decrease"}, {"topic": "Section 1", "q": "What is the main function of a flywheel in a machine?", "o": ["A) Energy storage", "B) Power generation", "C) Speed control", "D) Heat dissipation"], "a": "A) Energy storage"}, {"topic": "Section 1", "q": "Which type of imbalance is corrected by adding counterweights?", "o": ["A) Static imbalance", "B) Dynamic imbalance", "C) Both static and dynamic imbalance", "D) Neither static nor dynamic imbalance"], "a": "B) Dynamic imbalance"}, {"topic": "Section 1", "q": "In a cam-follower system, the follower's motion is primarily determined by the shape of the:", "o": ["A) Camshaft", "B) Follower material", "C) Cam profile", "D) Spring stiffness"], "a": "C) Cam profile"}, {"topic": "Section 1", "q": "In SHM, what is the phase difference between displacement and velocity?", "o": ["A) 0 degrees", "B) 90 degrees", "C) 180 degrees", "D) 270 degrees"], "a": "C) 180 degrees"}, {"topic": "Section 1", "q": "Which of the following best describes uniform motion?", "o": ["A) Constant velocity and changing direction", "B) Changing velocity and changing direction", "C) Constant velocity and constant direction", "D) Changing velocity and constant direction"], "a": "C) Constant velocity and constan function getRandomQuestions(){
    let shuffled = fullQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0,100);
}

var questions = getRandomQuestions();

var current = 0;
var answers = {};
var visited = {};
var marked = {};


// TIMER
var totalTime = 7200;

function startTimer(){
    var timer = setInterval(function(){
        var h = Math.floor(totalTime/3600);
        var m = Math.floor((totalTime%3600)/60);
        var s = totalTime%60;

        document.getElementById("timer").innerText =
        h + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            submitExam(true);
        }
    },1000);
}


// PALETTE
function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>

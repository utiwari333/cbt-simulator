al", "B) Drill bit speed", "C) Drill bit length", "D) Drill bit point angle"], "a": "D) Drill bit point angle"}, {"topic": "Section 1", "q": "In metal forging, what role do lubricants and coolants play?", "o": ["A) Lubricants reduce friction, while coolants control the temperature", "B) Lubricants control the temperature, while coolants reduce friction", "C) Both lubricants and coolants reduce friction", "D) Both lubricants and coolants control the temperature"], "a": "A) Lubricants reduce friction, while coolants control the temperature"}, {"topic": "Section 1", "q": "What is the SI unit of force?", "o": ["A) Kilogram (kg)", "B) Meter per second squared (m/s\u00b2)", "C) Newton (N)", "D) Joule (J)"], "a": "C) Newton (N)"}, {"topic": "Section 1", "q": "When an external force is applied to an object, causing it to rotate, it generates:", "o": ["A) Linear momentum", "B) Angular momentum", "C) Kinetic energy", "D) Potential energy"], "a": "B) Angular momentum"}, {"topic": "Section 1", "q": "Which type of cutting tool is best suited for machining hard materials like metals?", "o": ["A) High-speed steel (HSS) tool", "B) Carbide tool", "C) Diamond tool", "D) Ceramic tool"], "a": "B) Carbide tool"}, {"topic": "Section 1", "q": "What is the primary function of a press tool in manufacturing processes?", "o": ["A) Drilling holes", "B) Bending metal sheets", "C) Forging metal parts", "D) Grinding surfaces"], "a": "B) Bending metal sheets"}, {"topic": "Section 1", "q": "In drilling operations, the cutting speed refers to:", "o": ["A) The speed of the workpiece rotation", "B) The speed of the cutting tool's movement", "C) The depth of cut", "D) The feed rate"], "a": "B) The speed of the cutting tool's movement"}, {"topic": "Section 1", "q": "Forging dies are used to:", "o": ["A) Drill holes in metal", "B) Shape metal parts through compression", "C) Grind metal surfaces", "D) Create threaded fasteners"], "a": "B) Shape metal parts through compression"}, {"topic": "Section 1", "q": "Which of the following is NOT a function of lubrication in machining processes?", "o": ["A) Reducing friction", "B) Cooling the cutting tool", "C) Enhancing surface finish", "D) Removing metal chips"], "a": "D) Removing metal chips"}, {"topic": "Section 1", "q": "When selecting a coolant for a machining process, what is a crucial consideration?", "o": ["A) Color", "B) Odor", "C) Viscosity", "D) Heat dissipation and corrosion resistance"], "a": "D) Heat dissipation and corrosion resistance"}, {"topic": "Section 1", "q": "Which material property is most important for assessing static strength in design?", "o": ["A) Density", "B) Elastic modulus", "C) Thermal conductivity", "D) Electrical resistivity"], "a": "B) Elastic modulus"}, {"topic": "Section 1", "q": "When designing transmission components, which of the following is a primary consideration?", "o": ["A) Low cost", "B) High wear resistance", "C) Aesthetic appeal", "D) High thermal conductivity"], "a": "B) High wear resistance"}, {"topic": "Section 1", "q": "In the design of fasteners, what is the purpose of a washer under the nut or bolt head?", "o": ["A) To increase the tensile strength of the fastener", "B) To provide a decorative finish", "C) To distribute the load over a larger area", "D) To reduce the size of the fastener"], "a": "C) To distribute the load over a larger area"}, {"topic": "Section 1", "q": "Which of the following types of connections is most suitable for carrying shear loads?", "o": ["A) Welded connection", "B) Bolted connection", "C) Riveted connection", "D) Adhesive connection"], "a": "B) Bolted connection"}, {"topic": "Section 1", "q": "What is the primary objective when designing load-carrying members in structures?", "o": ["A) Minimize weight", "B) Maximize thermal conductivity", "C) Minimize aesthetic impact", "D) Ensure safety and structural integrity"], "a": "D) Ensure safety and structural integrity"}, {"topic": "Section 1", "q": "What is the primary objective of designing for sta ce", "B) Tensile strength", "C) Thermal conductivity", "D) Thread type"], "a": "C) Thermal conductivity"}, {"topic": "Section 1", "q": "In the context of load-carrying member design, what does the term \"buckling\" refer to?", "o": ["A) Sudden fracture of a material", "B) A deformation that occurs under a compressive load", "C) The corrosion of a material", "D) A type of fatigue failure"], "a": "B) A deformation that occurs under a compressive load"}, {"topic": "Section 1", "q": "When designing for static strength, what factor is crucial to consider in materials selection?", "o": ["A) Ductility", "B) Electrical conductivity", "C) Surface finish", "D) Coefficient of thermal expansion"], "a": "A) Ductility"}, {"topic": "Section 1", "q": "What is the primary consideration in the design for static strength of a structural component?", "o": ["A) Material selection", "B) Geometric shape", "C) Surface finish", "D) Temperature resistance"], "a": "A) Material selection"}, {"topic": "Section 1", "q": "Which of the following is an example of a transmission component in a mechanical system?", "o": ["A) Bolts and nuts", "B) Gears and shafts", "C) Springs and dampers", "D) Electrical wiring"], "a": "B) Gears and shafts"}, {"topic": "Section 1", "q": "In the design of fasteners, what is the term for the ability of a fastener to withstand an applied load without breaking or deforming?", "o": ["A) Tensile strength", "B) Torque capacity", "C) Yield point", "D) Elastic modulus"], "a": "A) Tensile strength"}, {"topic": "Section 1", "q": "When designing load-carrying members, which factor is essential to consider in ensuring a stable and safe structure?", "o": ["A) Temperature resistance", "B) Material cost", "C) Buckling and stability", "D) Aesthetic appearance"], "a": "C) Buckling and stability"}, {"topic": "Section 1", "q": "Which type of load-carrying member is designed to resist primarily axial loads and is often seen in columns and compression members?", "o": ["A) Beams", "B) Shafts", "C) Torsion bars", "D) Struts"], "a": "D) Struts"}, {"topic": "Section 1", "q": "What type of connection is used to join two structural members end-to-end in line with their axes to carry axial loads?", "o": ["A) Lap joint", "B) Butt joint", "C) Riveted joint", "D) Welded joint"], "a": "B) Butt joint"}, {"topic": "Section 1", "q": "Which material property is crucial for the design of fasteners, as it helps determine the ability to maintain clamping force over time?", "o": ["A) Hardness", "B) Ductility", "C) Creep resistance", "D) Thermal conductivity"], "a": "C) Creep resistance"}, {"topic": "Section 1", "q": "When designing for static strength, what principle ensures that a component doesn't experience stress concentrations and potential failure points?", "o": ["A) Material optimization", "B) Redundant design", "C) Smooth stress flow", "D) Thermal insulation"], "a": "C) Smooth stress flow"}, {"topic": "Section 1", "q": "What is the primary purpose of static analysis in engineering design?", "o": ["A) To analyze systems with moving parts", "B) To study dynamic loading conditions", "C) To assess the behavior of systems under static loads", "D) To design electrical circuits"], "a": "C) To assess the behavior of systems under static loads"}, {"topic": "Section 1", "q": "Which material property is essential for the design of load-carrying members?", "o": ["A) Thermal conductivity", "B) Electrical resistivity", "C) Yield strength", "D) Coefficient of friction"], "a": "C) Yield strength"}, {"topic": "Section 1", "q": "What is a common method for improving the static strength of a material?", "o": ["A) Decreasing its density", "B) Increasing its electrical conductivity", "C) Reducing its elasticity", "D) Increasing its hardness through heat treatment"], "a": "D) Increasing its hardness through heat treatment"}, {"topic": "Section 1", "q": "In the context of transmission components, what is the primary function of a gearbox?", "o": ["A) To provide electrical power", "B) To increase the speed of rotation", "C) To transfer mechanical power from one part of a machine to another", "D) To store energy"], "a": "C) To transfer mechanical power from one part of a machine to another"}, {"topic": "Section 1", "q": "What is the primary purpose of fasteners in engineering design?", "o": ["A) To add aesthetic value", "B) To provide electrical connections", "C) To join or secure components together", "D) To reduce friction"], "a": "C) To join or secure components together"}, {"topic": "Section 1", "q": "Which type of connection is typically used for joining two plates together in a static load-bearing structure?", "o": ["A) Welding", "B) Soldering", "C) Adhesive bonding", "D) Riveting"], "a": "D) Riveting"}, {"topic": "Section 1", "q": "What is the primary consideration in designing load-carrying members to prevent failure under static loads?", "o": ["A) Minimizing material cost", "B) Maximizing weight reduction", "C) Ensuring sufficient cross-sectional area and strength", "D) Enhancing heat dissipation"], "a": "C) Ensuring sufficient cross-sectional area and strength"}, {"topic": "Section 1", "q": "What is the primary purpose of using generalized coordinates in the analysis of mechanical vibrations?", "o": ["A) To make the equations of motion simpler and easier to solve.", "B) To represent the motion of a system in a coordinate system of choice.", "C) To increase the degrees of freedom (DoF) of the system.", "D) To reduce the number of DoF in the system."], "a": "B) To represent the motion of a system in a coordinate system of choice."}, {"topic": "Section 1", "q": "A mechanical system with n degrees of freedom has 4 generalized coordinates. What can be inferred about the system?", "o": ["A) The system is over-constrained.", "B) The system is under-constrained.", "C) The system has extra degrees of freedom.", "D) The system is correctly described."], "a": "B) The system is under-constrained."}, {"topic": "Section 1", "q": "In a mechanical vibration system, what is the primary purpose of damping?", "o": ["A) To increase the amplitude of vibrations.", "B) To reduce the natural frequency.", "C) To dissipate energy and reduce oscillations.", "D) To excite the system into resonance."], "a": "C) To dissipate energy and reduce oscillations."}, {"topic": "Section 1", "q": "In an undamped free vibration of a system, which of the following is true about the motion?", "o": ["A) The motion continues indefinitely without attenuation.", "B) The motion gradually decreases in amplitude over time.", "C) The motion remains constant with time.", "D) The motion is in the form of a sine wave."], "a": "A) The motion continues indefinitely without attenuation."}, {"topic": "Section 1", "q": "What is the key characteristic of a resonating system?", "o": ["A) It vibrates at the natural frequency of the system.", "B) It has the lowest possible damping.", "C) It has no degrees of freedom.", "D) It operates in a vacuum."], "a": "A) It vibrates at the natural frequency of the system."}, {"topic": "Section 1", "q": "What happens to the amplitude of forced harmonic vibrations when the driving frequency matches the system's natural frequency?", "o": ["A) It decreases.", "B) It increases without limit.", "C) It remains constant.", "D) It depends on the damping."], "a": "B) It increases without limit."}, {"topic": "Section 1", "q": "What are generalized coordinates in the context of mechanical vibrations?", "o": ["A) Coordinates used to describe motion in one dimension only.", "B) Coordinates that represent the position of a system in a fixed reference frame.", "C) A set of independent coordinates used to describe the configuration of a dynamic system.", "D) Coordinates that are unique to mechanical systems with friction."], "a": "C) A set of independent coordinates used to describe the configuration of a dynamic system."}, {"topic": "Section 1", "q": "What is the degree of freedom (DoF) of a mechanical system?", "o": ["A) The number of dimensions in which a system can move.", "B) The number of generalized coordinates required to describe the system's configuration.", "C) The number of external forces acting on the system.", "D) The total number of particles in the system."], "a": "B) The number of generalized coordinates required to describe the system's configuration."}, {"topic": "Section 1", "q": "In a damped mechanical system, what happens to the amplitude of the free response over time?", "o": ["A) It remains constant.", "B) It increases.", "C) It decreases.", "D) It oscillates chaotically."], "a": "C) It decreases."}, {"topic": "Section 1", "q": "What is the primary difference between a damped and an undamped free response in a vibrating system?", "o": ["A) Damped systems have external forces, while undamped systems do not.", "B) Damped systems experience a decrease in amplitude over time, while undamped systems do not.", "C) Damped systems have more degrees of freedom.", "D) Damped systems have a higher natural frequency."], "a": "B) Damped systems experience a decrease in amplitude over time, while undamped systems do not."}, {"topic": "Section 1", "q": "When a mechanical system is subjected to a periodic external force, what is the term for the response that is synchronized with the applied force?", "o": ["A) Natural frequency response.", "B) Resonant frequency response.", "C) Damped response.", "D) Free response."], "a": "B) Resonant frequency response."}, {"topic": "Section 1", "q": "What is the natural frequency of a vibrating system?", "o": ["A) The frequency at which the system is driven by external forces.", "B) The frequency at which the system oscillates with maximum amplitude.", "C) The frequency at which the system experiences no damping.", "D) The frequency at which the system vibrates without any external excitation."], "a": "D) The frequency at which the system vibrates without any external excitation."}, {"topic": "Section 1", "q": "What is the primary purpose of using generalized coordinates in the analysis of mechanical vibrations?", "o": ["A) To simplify the mathematics involved in solving vibration problems.", "B) To represent a system's motion with fewer variables.", "C) To increase the degree of freedom of the system.", "D) To introduce damping into the system."], "a": "B) To represent a system's motion with fewer variables."}, {"topic": "Section 1", "q": "In the context of mechanical vibrations, what does \"degree of freedom\" (DoF) refer to?", "o": ["A) The number of variables used to define the motion of a system.", "B) The number of different types of vibrations a system can exhibit.", "C) The level of damping present in a vibrating system.", "D) The frequency of external forces applied to the system."], "a": "A) The number of variables used to define the motion of a system."}, {"topic": "Section 1", "q": "Which of the following statements is true about the natural frequency of a vibrating system?", "o": ["A) It is the frequency at which the system is forced to vibrate.", "B) It depends on the level of damping in the system.", "C) It is the frequency at which the system would vibrate if it were disturbed and then left to vibrate on its own.", "D) It is always equal to zero."], "a": "C) It is the frequency at which the system would vibrate if it were disturbed and then left to vibrate on its own."}, {"topic": "Section 1", "q": "When analyzing forced harmonic responses of discrete systems, what is the term for the frequency at which a system responds most strongly to an external force?", "o": ["A) Resonating frequency", "B) Critical frequency", "C) Damping ratio", "D) Natural frequency"], "a": "A) Resonating frequency"}, {"topic": "Section 1", "q": "In the context of mechanical vibrations, what is the primary purpose of damping in a vibrating system?", "o": ["A) To increase the system's natural frequency.", "B) To reduce the system's degree of freedom.", "C) To dissipate energy and reduce oscillations.", "D) To increase the sy function getRandomQuestions(){
    let shuffled = fullQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0,100);
}

var questions = getRandomQuestions();

var current = 0;
var answers = {};
var visited = {};
var marked = {};


// TIMER
var totalTime = 7200;

function startTimer(){
    var timer = setInterval(function(){
        var h = Math.floor(totalTime/3600);
        var m = Math.floor((totalTime%3600)/60);
        var s = totalTime%60;

        document.getElementById("timer").innerText =
        h + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            submitExam(true);
        }
    },1000);
}


// PALETTE
function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>

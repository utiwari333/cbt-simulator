ical drawing?", "o": ["A) To improve the part's strength", "B) To enhance the part's visual appeal", "C) To ensure proper lubrication", "D) To define the texture and quality of the part's surface"], "a": "D) To define the texture and quality of the part's surface"}, {"topic": "Section 1", "q": "What type of drawing is used to represent the detailed dimensions and specifications of machine parts and assemblies?", "o": ["A) Pictorial drawing", "B) Isometric drawing", "C) Mechanical drawing", "D) Architectural drawing"], "a": "C) Mechanical drawing"}, {"topic": "Section 1", "q": "Which type of joint is commonly used to join two metal plates together by using a heated metal rod?", "o": ["A) Welded joint", "B) Riveted joint", "C) Bolted joint", "D) Adhesive joint"], "a": "A) Welded joint"}, {"topic": "Section 1", "q": "In a riveted joint, what is the part that covers the end of the rivet and provides a decorative and protective finish called?", "o": ["A) Rivet shank", "B) Rivet head", "C) Rivet tail", "D) Rivet body"], "a": "B) Rivet head"}, {"topic": "Section 1", "q": "Which fastener type is designed to be threaded into a corresponding hole in another part to hold them together?", "o": ["A) Weld", "B) Rivet", "C) Bolt", "D) Nut"], "a": "C) Bolt"}, {"topic": "Section 1", "q": "In a bolted joint, which component is used to secure the bolt and prevent it from loosening?", "o": ["A) Bolt", "B) Nut", "C) Washer", "D) Rivet"], "a": "B) Nut"}, {"topic": "Section 1", "q": "What is the term for the groove or slot cut into a machine part to accommodate a key, which prevents relative rotation between the parts?", "o": ["A) Thread", "B) Keyway", "C) Rivet hole", "D) Nut thread"], "a": "B) Keyway"}, {"topic": "Section 1", "q": "When discussing tolerances in mechanical drawings, what does the term \"fit\" refer to?", "o": ["A) How well parts fit together", "B) The size of the tolerance", "C) The fit of the drawing on the page", "D) The type of fastener used"], "a": "A) How well parts fit together"}, {"topic": "Section 1", "q": "What is the standard unit of measurement for surface finish, which indicates the roughness or smoothness of a surface?", "o": ["A) Meters", "B) Radians", "C) Micrometers", "D) Inches"], "a": "C) Micrometers"}, {"topic": "Section 1", "q": "In mechanical drawing, what is the purpose of specifying limits and fits?", "o": ["A) To determine the material used", "B) To control the cost of production", "C) To ensure interchangeability of parts", "D) To define the drawing's scale"], "a": "C) To ensure interchangeability of parts"}, {"topic": "Section 1", "q": "Which type of drawing provides a three-dimensional representation of an object and is often used for presentation and visualization purposes?", "o": ["A) Orthographic drawing", "B) Isometric drawing", "C) Pictorial drawing", "D) Sectional drawing"], "a": "C) Pictorial drawing"}, {"topic": "Section 1", "q": "Which of the following is a commonly used method for joining two metal parts permanently in machine drawing?", "o": ["A) Welding", "B) Bolting", "C) Adhesive bonding", "D) Clamping"], "a": "A) Welding"}, {"topic": "Section 1", "q": "In a welded joint, what does the term \"fillet weld\" refer to?", "o": ["A) A type of welding rod", "B) A type of welding machine", "C) A weld in the shape of a triangle", "D) A weld made by soldering"], "a": "C) A weld in the shape of a triangle"}, {"topic": "Section 1", "q": "Which type of joint is created by using cylindrical pins or bolts to fasten two parts together?", "o": ["A) Welded joint", "B) Riveted joint", "C) Bolted joint", "D) Adhesive joint"], "a": "C) Bolted joint"}, {"topic": "Section 1", "q": "What is the primary function of a keyway in mechanical assemblies?", "o": ["A) To provide lubrication", "B) To measure tolerances", "C) To prevent corrosion", "D) To transmit torque"], "a": "D) To transmit torque"}, {"topic": "Section 1", "q": "In engineering, what does the term \"tolerance\" refer to?", "o": ["A) The ability of a material to withstand stress", "B) The permissible variation in a dimension or property", "C) The resistance to wear and tear", "D) The degree of surface finish"], "a": "B) The permissible variation in a dimension or property"}, {"topic": "Section 1", "q": "What is the function of a nut in a bolted joint?", "o": ["A) To provide smooth movement", "B) To prevent corrosion", "C) To apply axial load or clamping force", "D) To provide aesthetics"], "a": "C) To apply axial load or clamping force"}, {"topic": "Section 1", "q": "What does \"Surface finish\" refer to in machine drawing?", "o": ["A) The final color of a product", "B) The appearance of a surface", "C) The texture and smoothness of a surface after machining", "D) The type of material used in manufacturing"], "a": "C) The texture and smoothness of a surface after machining"}, {"topic": "Section 1", "q": "What is the purpose of using limits and fits in machine design?", "o": ["A) To specify the overall size of a part", "B) To ensure that parts are interchangeable and have the desired clearance or interference", "C) To determine the material composition of a part", "D) To establish the surface finish requirements"], "a": "B) To ensure that parts are interchangeable and have the desired clearance or interference"}, {"topic": "Section 1", "q": "What type of line is used to represent a hidden or concealed edge in a machine drawing?", "o": ["A) Continuous thin line", "B) Continuous thick line", "C) Dashed line", "D) Zigzag line"], "a": "C) Dashed line"}, {"topic": "Section 1", "q": "Which of the following views in a multiview drawing typically shows the most detail of an object?", "o": ["A) Front view", "B) Top view", "C) Right-side view", "D) Isometric view"], "a": "A) Front view"}, {"topic": "Section 1", "q": "In a welding symbol, what does a circle on the arrow's tail indicate?", "o": ["A) A fillet weld", "B) A groove weld", "C) A plug weld", "D) A spot weld"], "a": "A) A fillet weld"}, {"topic": "Section 1", "q": "Which welding process uses a consumable wire electrode to join metals?", "o": ["A) TIG welding", "B) MIG welding", "C) Stick welding", "D) Arc welding"], "a": "B) MIG welding"}, {"topic": "Section 1", "q": "What is the main advantage of using riveted joints in structural applications?", "o": ["A) Easy disassembly", "B) High shear strength", "C) Low cost", "D) High fatigue resistance"], "a": "B) High shear strength"}, {"topic": "Section 1", "q": "In a rivet symbol, what does the number \"3/8\" represent in \"3/8 - 16\"?", "o": ["A) The rivet material", "B) The rivet diameter in inches", "C) The number of rivets", "D) The pitch between rivets"], "a": "B) The rivet diameter in inches"}, {"topic": "Section 1", "q": "Which type of thread engagement provides the highest resistance to vibration loosening?", "o": ["A) Full thread engagement", "B) Partial thread engagement", "C) No thread engagement", "D) Deep thread engagement"], "a": "A) Full thread engagement"}, {"topic": "Section 1", "q": "What is the purpose of a lock washer in a fastener assembly?", "o": ["A) To prevent over-tightening", "B) To improve corrosion resistance", "C) To create a seal", "D) To prevent loosening due to vibration"], "a": "D) To prevent loosening due to vibration"}, {"topic": "Section 1", "q": "In a keyed assembly, what is the function of the key?", "o": ["A) To transmit torque", "B) To provide corrosion protection", "C) To align parts", "D) To act as a bearing"], "a": "A) To transmit torque"}, {"topic": "Section 1", "q": "Which type of key is used when the keyway is cut in the hub and the key slides through the shaft?", "o": ["A) Woodruff key", "B) Square key", "C) Sunk key", "D) Tapered key"], "a": "A) Woodruff key"}, {"topic": "Section 1", "q": "What is the purpose of specifying a tolerance in a mechanical drawing?", "o": ["A) To indicate the maximum size of a part", "B) To ensure parts are manufactured to exact dimensions", "C) To allow for variations in part dimensions", "D) To identify the material type"], "a": "C) To allow for variations in part dimensions"}, {"topic": "Section 1", "q": "In a \"H7/g6\" fit, what does \"H7\" represent?", "o": ["A) The lower deviation", "B) The upper deviation", "C) The nominal size", "D) The basic size"], "a": "C) The nominal size"}, {"topic": "Section 1", "q": "Which parameter is used to specify the smoothness of a surface finish?", "o": ["A) Ra (Roughness Average)", "B) Rz (Average Roughness Depth)", "C) RPM (Rotations Per Minute)", "D) PSI (Pounds per Square Inch)"], "a": "A) Ra (Roughness Average)"}, {"topic": "Section 1", "q": "Which surface finish symbol represents a smooth, polished surface?", "o": ["A) \u2295", "B) \u25bc", "C) \u25b3", "D) \u25bd"], "a": "A) \u2295"}, {"topic": "Section 1", "q": "What is the purpose of a mechanical drawing?", "o": ["A) To provide instructions for machine operation", "B) To create a work of art", "C) To communicate design and manufacturing information", "D) To entertain engineers"], "a": "C) To communicate design and manufacturing information"}, {"topic": "Section 1", "q": "Which of the following types of joints is commonly used in steel structures for joining two pieces of metal using a heated, molten filler material?", "o": ["A) Welded joint", "B) Riveted joint", "C) Bolted joint", "D) Adhesive joint"], "a": "A) Welded joint"}, {"topic": "Section 1", "q": "In a riveted joint, what is the name of the cylindrical metal pin used to connect two plates?", "o": ["A) Bolt", "B) Nut", "C) Screw", "D) Rivet"], "a": "D) Rivet"}, {"topic": "Section 1", "q": "Which type of fastener is primarily used for temporary connections that require frequent disassembly and reassembly?", "o": ["A) Bolt", "B) Nut", "C) Screw", "D) Rivet"], "a": "C) Screw"}, {"topic": "Section 1", "q": "What is the purpose of a keyway in mechanical engineering?", "o": ["A) To provide ventilation in a machine", "B) To reduce friction between moving parts", "C) To connect two rotating parts, such as a shaft and a gear",  to creep?", "o": ["A) Aluminum", "B) Steel", "C) Titanium", "D) Superalloys"], "a": "D) Superalloys"}, {"topic": "Section 1", "q": "Fatigue failure in a material is characterized by:", "o": ["A) Sudden, catastrophic fracture.", "B) Permanent deformation.", "C) Repeated cyclic loading leading to failure.", "D) Creep deformation."], "a": "C) Repeated cyclic loading leading to failure."}, {"topic": "Section 1", "q": "What is the primary cause of stress corrosion cracking in metals?", "o": ["A) High temperature", "B) Exposure to ultraviolet (UV) radiation", "C) Exposure to a corrosive environment and tensile stress", "D) Rapid cooling"], "a": "C) Exposure to a corrosive environment and tensile stress"}, {"topic": "Section 1", "q": "What is the purpose of a Charpy impact test?", "o": ["A) To measure a material's hardness.", "B) To evaluate a material's resistance to creep.", "C) To assess a material's toughness and resistance to sudden impact loading.", "D) To measure the electrical conductivity of a material."], "a": "C) To assess a material's toughness and resistance to sudden impact loading."}, {"topic": "Section 1", "q": "Which property of a material is related to its ability to return to its original shape after deformation?", "o": ["A) Elasticity", "B) Toughness", "C) Hardness", "D) Creep resistance"], "a": "A) Elasticity"}, {"topic": "Section 1", "q": "Which material property indicates a material's ability to resist scratching and wear?", "o": ["A) Ductility", "B) Elastic modulus", "C) Hardness", "D) Toughness"], "a": "C) Hardness"}, {"topic": "Section 1", "q": "Creep is a time-dependent deformation that occurs under:", "o": ["A) Static, constant load.", "B) Dynamic, fluctuating load.", "C) Cyclic loading conditions.", "D) Impact loading."], "a": "A) Static, constant load."}, {"topic": "Section 1", "q": "What is the primary purpose of a tensile test on a material specimen?", "o": ["A) To measure the material's weight.", "B) To evaluate the material's ductility an essure", "B) Use of adhesives", "C) No melting of base metals", "D) Weak joints"], "a": "A) Application of heat and pressure"}, {"topic": "Section 1", "q": "What is the purpose of shielding gas or flux in arc welding?", "o": ["A) To cool the welding region", "B) To protect the weld pool from external atmosphere", "C) To remove impurities from the workpiece", "D) To enhance the electrical conductivity of the electrode"], "a": "B) To protect the weld pool from external atmosphere"}, {"topic": "Section 1", "q": "Which welding process uses a consumable electrode coated with chemicals that provide flux and shielding?", "o": ["A) Gas tungsten arc welding (TIG)", "B) Gas metal arc welding (MIG)", "C) Shielded metal arc welding (SMAW)", "D) Submerged arc welding"], "a": "B) Gas metal arc welding (MIG)"}, {"topic": "Section 1", "q": "What does the \"80\" in the AWS classification E8018 for welding electrodes represent?", "o": ["A) The coating composition of the electrode", "B) The welding position compatibility", "C) The minimum tensile strength of the weld metal", "D) The type of base metal used"], "a": "C) The minimum tensile strength of the weld metal"}, {"topic": "Section 1", "q": "What is the primary fuel used in oxyacetylene welding (OAW) to generate a high-temperature flame?", "o": ["A) Propane", "B) Oxygen", "C) Acetylene", "D) Hydrogen"], "a": "C) Acetylene"}, {"topic": "Section 1", "q": "What is the approximate temperature at the inner core of an oxyacetylene flame?", "o": ["A) 1260\u00b0C", "B) 3500\u00b0C", "C) 2500\u00b0C", "D) 4500\u00b0C"], "a": "B) 3500\u00b0C"}, {"topic": "Section 1", "q": "Which type of oxyacetylene flame, when used on steel, causes an increase in the carbon content of the weld metal?", "o": ["A) Neutral flame", "B) Carburising flame", "C) Oxidizing flame", "D) Excess Oxygen flame"], "a": "B) Carburising flame"}, {"topic": "Section 1", "q": "What effect does an oxidizing flame have when burning a mixture containing more oxygen than required  Joint Stock Company", "D) Cooperative Society"], "a": "C) Joint Stock Company"}, {"topic": "Section 1", "q": "In formal organization, what primarily prescribes the relationships among people working in an organization?", "o": ["A) Personal preferences", "B) Formal authority", "C) Emotions and prejudices", "D) Pattern of responsibilities"], "a": "D) Pattern of responsibilities"}, {"topic": "Section 1", "q": "Which of the following is not one of the main types of cooperative societies?", "o": ["A) Co-operative Credit Society", "B) Cooperative Marketing Society", "C) Co-operative Farming Society", "D) Limited Liability Cooperative Society"], "a": "D) Limited Liability Cooperative Society"}, {"topic": "Section 1", "q": "What is the main purpose of cooperative societies?", "o": ["A) Maximizing individual profits", "B) Meeting common economic, social, and cultural needs", "C) Exercising power and control over members", "D) Reducing surplus distribution"], "a": "B) Meeting common economic, social, and cultural needs"}, {"topic": "Section 1", "q": "What type of company doesn\u2019t have its members share profit and losses to the extent of their stock held by them?", "o": ["A) Public Limited Company", "B) Private Limited Company", "C) Sole Proprietorship Company", "D) Joint Stock Company"], "a": "C) Sole Proprietorship Company"}, {"topic": "Section 1", "q": "In the context of formal organization, what is the role of top management in achieving organizational goals?", "o": ["A) Personal relationships", "B) Prescribing the structure of the organization", "C) Emphasizing informal communication", "D) Avoiding specialization"], "a": "B) Prescribing the structure of the organization"}, {"topic": "Section 1", "q": "What does \"open membership\" typically mean in the context of a cooperative society?", "o": ["A) Limited number of members", "B) Membership restricted to specific professions", "C) Membership open to the general public", "D) Membership restricted to family members"], " nt Approach"], "a": "D) Scientific Management Approach"}, {"topic": "Section 1", "q": "What does the System Approach view the organization as?", "o": ["A) A collection of unrelated parts", "B) An isolated entity", "C) An organized whole with interacting parts", "D) A chaotic and unpredictable structure"], "a": "C) An organized whole with interacting parts"}, {"topic": "Section 1", "q": "In the System Approach, what is the main focus in evaluating the effectiveness of the organization?", "o": ["A) Effectiveness of the sub-systems", "B) Individual employee performance", "C) Overall effectiveness of the system", "D) Financial performance"], "a": "C) Overall effectiveness of the system"}, {"topic": "Section 1", "q": "What does the Contingency Approach reject about management?", "o": ["A) The importance of employee motivation", "B) The situational nature of management", "C) The universality of management principles", "D) The role of top management"], "a": "C) The universality of management principles"}, {"topic": "Section 1", "q": "According to the Contingency Approach, how should managers design organizations and formulate policies and plans?", "o": ["A) Universally for all situations", "B) According to the manager's preference", "C) According to prevailing environmental conditions", "D) Independently of the environment"], "a": "C) According to prevailing environmental conditions"}, {"topic": "Section 1", "q": "According to the Contingency Approach, why is there no universally applicable set of rules for management?", "o": ["A) Because managers have different preferences", "B) Because technology is constantly changing", "C) Because management problems vary with different situations", "D) Because organizations are inherently unpredictable"], "a": "C) Because management problems vary with different situations"}, {"topic": "Section 1", "q": "What is one advantage of the Contingency Approach?", "o": ["A) It provides universal management principles", "B) It simplifies comple function getRandomQuestions(){
    let shuffled = fullQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0,100);
}

var questions = getRandomQuestions();

var current = 0;
var answers = {};
var visited = {};
var marked = {};


// TIMER
var totalTime = 7200;

function startTimer(){
    var timer = setInterval(function(){
        var h = Math.floor(totalTime/3600);
        var m = Math.floor((totalTime%3600)/60);
        var s = totalTime%60;

        document.getElementById("timer").innerText =
        h + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            submitExam(true);
        }
    },1000);
}


// PALETTE
function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>

e with time", "B) Properties remain constant", "C) Properties change but not with time", "D) Properties are undefined"], "a": "B) Properties remain constant"}, {"topic": "Section 1", "q": "In an unsteady state work application, which of the following is true?", "o": ["A) Work is constant with time", "B) Work is undefined", "C) Work changes with time", "D) Work is zero"], "a": "C) Work changes with time"}, {"topic": "Section 1", "q": "What does the 1st Law of Thermodynamics state?", "o": ["A) Conservation of energy only", "B) Conservation of mass only", "C) Conservation of both mass and energy", "D) Conservation of volume only"], "a": "C) Conservation of both mass and energy"}, {"topic": "Section 1", "q": "Which of the following best defines internal energy in a thermodynamic system?", "o": ["A) The total energy of a system", "B) The energy associated with the motion of molecules within the system", "C) The energy transferred as heat", "D) The energy associated with the external work done by the system"], "a": "B) The energy associated with the motion of molecules within the system"}, {"topic": "Section 1", "q": "Enthalpy is defined as:", "o": ["A) The internal energy minus the pressure times volume", "B) The internal energy plus the product of pressure and volume", "C) The heat transferred at constant pressure", "D) The heat transferred at constant volume"], "a": "B) The internal energy plus the product of pressure and volume"}, {"topic": "Section 1", "q": "What is the specific heat capacity of a substance?", "o": ["A) The heat required to raise the temperature of 1 gram of the substance by 1 degree Celsius", "B) The heat required to raise the temperature of 1 kilogram of the substance by 1 degree Celsius", "C) The heat required to raise the temperature of 1 mole of the substance by 1 degree Celsius", "D) The heat required to raise the temperature of 1 liter of the substance by 1 degree Celsius"], "a": "C) The heat required to raise the temperature of 1 mole of the pic": "Section 1", "q": "Steady state work and flow applications in thermodynamics typically refer to processes where:", "o": ["A) The system is isolated from the surroundings.", "B) The system undergoes rapid changes.", "C) There is a continuous and balanced flow of energy or matter.", "D) The system remains at a constant temperature."], "a": "C) There is a continuous and balanced flow of energy or matter."}, {"topic": "Section 1", "q": "What does the 1st Law of Thermodynamics state?", "o": ["A) Conservation of mass and energy", "B) Conservation of energy", "C) Conservation of mass", "D) Conservation of momentum"], "a": "A) Conservation of mass and energy"}, {"topic": "Section 1", "q": "Which property of a substance represents its internal energy?", "o": ["A) Enthalpy", "B) Entropy", "C) Temperature", "D) Specific heat"], "a": "C) Temperature"}, {"topic": "Section 1", "q": "Enthalpy is defined as:", "o": ["A) H = U + PV", "B) H = U - PV", "C) H = U/PV", "D) H = P/U - V"], "a": "A) H = U + PV"}, {"topic": "Section 1", "q": "Specific heat is a measure of a substance's:", "o": ["A) Temperature change", "B) Mass", "C) Thermal conductivity", "D) Energy required to change its temperature"], "a": "D) Energy required to change its temperature"}, {"topic": "Section 1", "q": "In an isothermal process, which of the following remains constant?", "o": ["A) Internal energy", "B) Pressure", "C) Volume", "D) Temperature"], "a": "D) Temperature"}, {"topic": "Section 1", "q": "In an adiabatic process, which of the following is true?", "o": ["A) Heat transfer is zero", "B) Work transfer is zero", "C) Internal energy remains constant", "D) Pressure remains constant"], "a": "A) Heat transfer is zero"}, {"topic": "Section 1", "q": "In a steady-state process, which of the following is true?", "o": ["A) Properties change with time", "B) Properties remain constant", "C) Properties change with position", "D) Properties remain constant with time and position"], "a": "D) Properties remain constant with time and position"}, {"topic": "Section 1", "q": "Which statement is true regarding the 2nd Law of Thermodynamics?", "o": ["A) It states that energy cannot be created or destroyed.", "B) It states that heat always flows from a colder body to a hotter body.", "C) It states that it is impossible to construct a device that operates in a cycle and produces no net effect other than the transfer of heat from a colder body to a hotter body.", "D) It states that all processes are reversible."], "a": "C) It states that it is impossible to construct a device that operates in a cycle and produces no net effect other than the transfer of heat from a colder body to a hotter body."}, {"topic": "Section 1", "q": "What is entropy?", "o": ["A) The measure of the internal energy of a system.", "B) The measure of the disorder or randomness of a system.", "C) The total energy of a system.", "D) The heat added to a system."], "a": "B) The measure of the disorder or randomness of a system."}, {"topic": "Section 1", "q": "An isentropic process is one that is:", "o": ["A) Reversible and adiabatic.", "B) Irreversible and adiabatic.", "C) Reversible and isothermal.", "D) Irreversible and isothermal."], "a": "A) Reversible and adiabatic."}, {"topic": "Section 1", "q": "What is the efficiency of a heat engine?", "o": ["A) The ratio of work done by the engine to the heat input.", "B) The ratio of work done by the engine to the work input.", "C) The ratio of heat input to heat output.", "D) The ratio of temperature difference between the hot and cold reservoirs."], "a": "A) The ratio of work done by the engine to the heat input."}, {"topic": "Section 1", "q": "Which type of process cannot occur in a real-world system?", "o": ["A) Reversible process", "B) Irreversible process", "C) Adiabatic process", "D) Isobaric process"], "a": "A) Reversible process"}, {"topic": "Section 1", "q": "What is the Coefficient of Performance (COP) for a refrigerator?", "o": ["A) The ratio of heat absorbed from the cold reservoir to the work input.", "B) The ratio of heat absorbed from the hot reservoir to the work input.", "C) The ratio of work input to the heat rejected to the hot reservoir.", "D) The ratio of heat rejected to the cold reservoir to the heat absorbed from the hot reservoir."], "a": "D) The ratio of heat rejected to the cold reservoir to the heat absorbed from the hot reservoir."}, {"topic": "Section 1", "q": "What is the maximum theoretical efficiency of a Carnot heat engine operating between two temperature reservoirs?", "o": ["A) 0%", "B) 100%", "C) It depends on the specific working fluid.", "D) It depends on the size of the engine."], "a": "B) 100%"}, {"topic": "Section 1", "q": "Which of the following statements is part of the Kelvin-Planck statement of the second law of thermodynamics?", "o": ["A) Heat cannot spontaneously flow from a colder body to a hotter body.", "B) The entropy of an isolated system always increases over time.", "C) It is impossible to construct a heat engine that operates in a cycle and produces no net work while transferring heat from a single reservoir.", "D) The entropy of a perfect crystal at absolute zero is zero."], "a": "C) It is impossible to construct a heat engine that operates in a cycle and produces no net work while transferring heat from a single reservoir."}, {"topic": "Section 1", "q": "The Clausius statement of the second law of thermodynamics is related to:", "o": ["A) Heat pumps.", "B) Refrigerators.", "C) Carnot cycle.", "D) Isentropic processes."], "a": "A) Heat pumps."}, {"topic": "Section 1", "q": "Entropy is a measure of:", "o": ["A) Temperature.", "B) Disorder or randomness.", "C) Internal energy.", "D) Heat transfer."], "a": "B) Disorder or randomness."}, {"topic": "Section 1", "q": "An isentropic process is one that is:", "o": ["A) Reversible and adiabatic.", "B) Irreversible and isothermal.", "C) Reversible and isothermal.", "D) Irreversible and adiabatic."], "a": "A) Reversible and adiabatic." ess"}, {"topic": "Section 1", "q": "In a reversible process, which of the following is true?", "o": ["A) The process occurs infinitely slowly.", "B) The process is always isothermal.", "C) The process is irreversible.", "D) The entropy of the system decreases."], "a": "A) The process occurs infinitely slowly."}, {"topic": "Section 1", "q": "What is the coefficient of performance (COP) for a refrigerator?", "o": ["A) The ratio of work input to the heat absorbed from the inside of the refrigerator.", "B) The ratio of work input to the heat rejected to the surroundings.", "C) The ratio of heat absorbed from the inside of the refrigerator to the work input.", "D) The ratio of heat rejected to the surroundings to the heat absorbed from the inside of the refrigerator."], "a": "C) The ratio of heat absorbed from the inside of the refrigerator to the work input."}, {"topic": "Section 1", "q": "What is the efficiency of a Carnot engine operating between two reservoirs at temperatures T_H (hot) and T_C (cold)?", "o": ["A) 100%", "B) (T_H - T_C) / T_H", "C) T_H / (T_H - T_C)", "D) T_C / T_H"], "a": "C) T_H / (T_H - T_C)"}, {"topic": "Section 1", "q": "What does the Kelvin-Planck statement of the 2nd Law of Thermodynamics state?", "o": ["A) Heat cannot be transferred from a cold reservoir to a hot reservoir.", "B) It is impossible to construct a perpetual motion machine of the first kind.", "C) Total energy of the universe is constant.", "D) Entropy always decreases in an isolated system."], "a": "B) It is impossible to construct a perpetual motion machine of the first kind."}, {"topic": "Section 1", "q": "What does the Clausius statement of the 2nd Law of Thermodynamics state?", "o": ["A) Heat cannot be transferred from a hot reservoir to a cold reservoir.", "B) It is impossible to construct a perpetual motion machine of the second kind.", "C) Heat is always transferred from a cold body to a hot body.", "D) Entropy always decreases in a closed system."], "a": "A) Heat cannot be transferred from a hot reservoir to a cold reservoir."}, {"topic": "Section 1", "q": "Which of the following is a state function related to the 2nd Law of Thermodynamics?", "o": ["A) Temperature", "B) Pressure", "C) Enthalpy", "D) Entropy"], "a": "D) Entropy"}, {"topic": "Section 1", "q": "An isentropic process is one that is:", "o": ["A) Reversible and adiabatic", "B) Irreversible and adiabatic", "C) Reversible and isobaric", "D) Irreversible and isothermal"], "a": "A) Reversible and adiabatic"}, {"topic": "Section 1", "q": "What is the efficiency of a Carnot heat engine operating between two reservoirs at temperatures T_H and T_C?", "o": ["A) 1 - (T_C / T_H)", "B) (T_H - T_C) / T_H", "C) (T_H / T_C) - 1", "D) T_H / (T_H - T_C)"], "a": "A) 1 - (T_C / T_H)"}, {"topic": "Section 1", "q": "What is the coefficient of performance (COP) of a refrigerator?", "o": ["A) 1 - (T_C / T_H)", "B) (T_H - T_C) / T_H", "C) (T_H / T_C) - 1", "D) T_C / (T_H - T_C)"], "a": "B) (T_H - T_C) / T_H"}, {"topic": "Section 1", "q": "What is the second law of thermodynamics primarily concerned with?", "o": ["A) Heat transfer", "B) Energy conservation", "C) Entropy", "D) Temperature"], "a": "C) Entropy"}, {"topic": "Section 1", "q": "The Kelvin-Planck statement of the second law of thermodynamics is related to:", "o": ["A) Entropy change", "B) Conservation of energy", "C) Irreversible processes", "D) Temperature gradients"], "a": "C) Irreversible processes"}, {"topic": "Section 1", "q": "The Clausius statement of the second law of thermodynamics is related to:", "o": ["A) Entropy change", "B) Conservation of energy", "C) Reversible processes", "D) Temperature gradients"], "a": "A) Entropy change"}, {"topic": "Section 1", "q": "Which of the following is an example of an isentropic process?", "o": ["A) Adiabatic compression", "B) Isothermal expansion", "C) Constant volume heating", "D) Constant pressure cooling"], "a": "A) Adiabatic compression"}, {"topic": "Section 1", "q": "The efficiency of a heat engine is defined as:", "o": ["A) The ratio of heat input to work output", "B) The ratio of work input to heat output", "C) The ratio of work output to heat input", "D) The ratio of temperature change to heat input"], "a": "C) The ratio of work output to heat input"}, {"topic": "Section 1", "q": "A reversible process in thermodynamics is one that:", "o": ["A) Occurs very slowly", "B) Happens spontaneously", "C) Cannot be analyzed", "D) Violates the second law"], "a": "A) Occurs very slowly"}, {"topic": "Section 1", "q": "In a refrigerator, the coefficient of performance (COP) is defined as:", "o": ["A) The ratio of work input to heat output", "B) The ratio of heat input to work output", "C) The ratio of work output to heat input", "D) The ratio of temperature change to work input"], "a": "A) The ratio of heat input to work output"}, {"topic": "Section 1", "q": "The Carnot cycle is an idealized thermodynamic cycle that:", "o": ["A) Operates with 100% efficiency", "B) Has a constant temperature during isentropic processes", "C) Consists of two isobaric and two isochoric processes", "D) Cannot be implemented in practice"], "a": "D) Cannot be implemented in practice"}, {"topic": "Section 1", "q": "What is the Kelvin-Planck statement of the second law of thermodynamics?", "o": ["A) Heat cannot be completely converted into work in a cyclic process.", "B) It is impossible to reach absolute zero temperature.", "C) The total entropy of an isolated system always increases.", "D) Energy can neither be created nor destroyed."], "a": "A) Heat cannot be completely converted into work in a cyclic process."}, {"topic": "Section 1", "q": "Which statement is true regarding the Clausius statement of the second law of thermodynamics?", "o": ["A) Heat cannot be transferred from a colder body to a hotter body without external work being done on the system.", "B) Heat can flow from a colder body to a hotter body spontaneously.", "C) The total entropy of an isolated system always decreases.", "D) Energy is conserved in all processes."], "a": "A) Heat cannot be transferred from a colder body to a hotter body without external work being done on the system."}, {"topic": "Section 1", "q": "Entropy is a measure of:", "o": ["A) Energy content of a system.", "B) Disorder or randomness in a system.", "C) Temperature of a system.", "D) Pressure of a system."], "a": "B) Disorder or randomness in a system."}, {"topic": "Section 1", "q": "An isentropic process is one in which:", "o": ["A) The temperature remains constant.", "B) The pressure remains constant.", "C) The entropy remains constant.", "D) The volume remains constant."], "a": "C) The entropy remains constant."}, {"topic": "Section 1", "q": "The efficiency of a Carnot engine operating between two reservoirs at temperatures T_H and T_C is given by:", "o": ["A) 1 - T_C / T_H", "B) 1 - T_H / T_C", "C) T_H / T_C", "D) T_C / T_H"], "a": "A) 1 - T_C / T_H"}, {"topic": "Section 1", "q": "What is the coefficient of performance (COP) for a heat pump?", "o": ["A) COP = 1 / (1 - T_C / T_H)", "B) COP = 1 - T_C / T_H", "C) COP = T_H / (T_H - T_C)", "D) COP = T_C / (T_H - T_C)"], "a": "A) COP = 1 / (1 - T_C / T_H)"}, {"topic": "Section 1", "q": "In a reversible process, which of the following is true?", "o": ["A) The process occurs spontaneously.", "B) The process is in thermal equilibrium.", "C) There is no change in entropy.", "D) The process is ideal and does not exist in reality."], "a": "B) The process is in thermal equilibrium."}, {"topic": "Section 1", "q": "A refrigerator is a device that:", "o": ["A) Converts heat into work.", "B) Transfers heat from a cold space to a hot space.", "C) Increases the internal energy of a system.", "D) Decreases the temperature of a system."], "a": "B) Transfers heat from a cold space to a hot space."}, {"topic": "Section 1", "q": "Which of the following is a power cycle used in steam power plants?", "o": ["A) Vapour Compression Cycle", "B) Brayton Cycle", "C) Rankine C nition gasoline engines?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "C) Otto cycle"}, {"topic": "Section 1", "q": "Which thermodynamic cycle is commonly used in diesel engines?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "D) Diesel cycle"}, {"topic": "Section 1", "q": "In a Brayton cycle, which component is responsible for the compression and expansion of the working fluid?", "o": ["A) Compressor and turbine", "B) Compressor and condenser", "C) Evaporator and compressor", "D) Turbine and condenser"], "a": "A) Compressor and turbine"}, {"topic": "Section 1", "q": "Which thermodynamic cycle is commonly used in refrigeration systems for air conditioning and cooling?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Vapour compression cycle"], "a": "D) Vapour compression cycle"}, {"topic": "Section 1", "q": "Which cycle is used in most natural gas power plants and jet engines?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "B) Brayton cycle"}, {"topic": "Section 1", "q": "Which thermodynamic cycle is commonly used in household refrigerators and air conditioners?", "o": ["A) Rankine cycle", "B) Otto cycle", "C) Brayton cycle", "D) Vapour compression cycle"], "a": "D) Vapour compression cycle"}, {"topic": "Section 1", "q": "In the Rankine cycle, what is the primary working fluid used to generate power in most steam power plants?", "o": ["A) Air", "B) Water", "C) Natural gas", "D) Refrigerant"], "a": "B) Water"}, {"topic": "Section 1", "q": "Which thermodynamic cycle is typically associated with internal combustion engines used in most cars?", "o": ["A) Brayton cycle", "B) Rankine cycle", "C) Otto cycle", "D) Vapour absorption cycle"], "a": "C) Otto cycle"}, {"topic": "Section 1", "q": "What is the main difference between the Brayton cycle and the Rankine cycle?", "o": ["A) The working fluid", "B) The heat source", "C) T function getRandomQuestions(){
    let shuffled = fullQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0,100);
}

var questions = getRandomQuestions();

var current = 0;
var answers = {};
var visited = {};
var marked = {};


// TIMER
var totalTime = 7200;

function startTimer(){
    var timer = setInterval(function(){
        var h = Math.floor(totalTime/3600);
        var m = Math.floor((totalTime%3600)/60);
        var s = totalTime%60;

        document.getElementById("timer").innerText =
        h + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            submitExam(true);
        }
    },1000);
}


// PALETTE
function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>

y molecular collision, It is referred as", "o": ["A) Conduction", "B) Convection", "C) Radiation", "D) Scattering"], "a": "A) Conduction"}, {"topic": "Section 1", "q": "Stefan boltzmann law is applicable for", "o": ["A) Conduction", "B) Convection", "C) Radiation", "D) Conduction and radiation combined"], "a": "C) Radiation"}, {"topic": "Section 1", "q": "On which of the following does convective heat transfer coefficient doesn\u2019t depend?", "o": ["A) Temperature", "B) Surface area", "C) Time", "D) distance"], "a": "C) Time"}, {"topic": "Section 1", "q": "Which of the following is the unit of coefficient of convective heat transfer?", "o": ["A) W/m2", "B) W/m K", "C) W/m2 K", "D) W/K"], "a": "C) W/m2 K"}, {"topic": "Section 1", "q": "Heat transfer in liquid and gases takes place by", "o": ["A) conduction", "B) convection", "C) radiation", "D) conduction and convection"], "a": "B) convection"}, {"topic": "Section 1", "q": "Heat is closely related with", "o": ["A) liquids", "B) energy", "C) temperature", "D) entropy"], "a": "B) energy"}, {"topic": "Section 1", "q": "Heat flows from one body to other when they have", "o": ["A) different heat contents", "B) different specific heat", "C) different atomic structure", "D) different temperatures"], "a": "D) different temperatures"}, {"topic": "Section 1", "q": "The concept of overall coefficient of heat transfer is used in heat transfer problems of", "o": ["A) conduction", "B) convection", "C) radiation", "D) conduction and convection"], "a": "D) conduction and convection"}, {"topic": "Section 1", "q": "The amount of heat flow through a body by conduction is", "o": ["A) directly proportional to the surface area of the body", "B) dependent upon the material of the body", "C) inversely proportional to the thickness of the body", "D) All off the above"], "a": "D) All off the above"}, {"topic": "Section 1", "q": "A perfect black body is one which", "o": ["A) is black in colour", "B) reflects all heat", "C) transmits all heat ": "Which of the following is the lightest and most volatile liquid fuel?", "o": ["A) Petrol", "B) fuel oil", "C) kerosene", "D) diesel"], "a": "A) Petrol"}, {"topic": "Section 1", "q": "The fins at the top of a motor cycle engine cylinder are longer than those at the bottom because", "o": ["A) extra strength is required at the top", "B) they are in an exposed position", "C) top is the hottest part", "D) hot air rises"], "a": "C) top is the hottest part"}, {"topic": "Section 1", "q": "The specific fuel consumption per B.P. hour for a petrol engine is about ______", "o": ["A) 0.2 kg", "B) 0.25 kg", "C) 0.3 kg", "D) 0.35 kg"], "a": "B) 0.25 kg"}, {"topic": "Section 1", "q": "The specific fuel consumption per B.P. hour for a diesel engine is about ___________", "o": ["A) 0.2 kg", "B) 0.25 kg", "C) 0.3 kg", "D) 0.35 kg"], "a": "A) 0.2 kg"}, {"topic": "Section 1", "q": "The pressure inside the lubrication system is controlled by ______", "o": ["A) Oil pump", "B) Oil filter", "C) Relief valve", "D) Supply voltage"], "a": "C) Relief valve"}, {"topic": "Section 1", "q": "Which of the following is the most important property of the lubricant?", "o": ["A) Density", "B) Thermal conductivity", "C) Viscosity", "D) Melting point"], "a": "C) Viscosity"}, {"topic": "Section 1", "q": "The specific fuel consumption is defined as:", "o": ["A) fuel consumption per brake power", "B) fuel consumption per hour", "C) fuel consumption per hour per brake power", "D) fuel consumption per indicated power"], "a": "C) fuel consumption per hour per brake power"}, {"topic": "Section 1", "q": "What is the range of pressure is achieved in the injection pump?", "o": ["A) 120 \u2013 200 bar", "B) 10 \u2013 20 bar", "C) 400 \u2013 500 bar", "D) < 10bar"], "a": "A) 120 \u2013 200 bar"}, {"topic": "Section 1", "q": "In most automobiles, which lubrication system is commonly used?", "o": ["A) Splash system", "B) Pressure system", "C) Petrol system", "D) Gravity system"], "a": "B) Pressure system"}, {"topic": "Section 1", "q": "The specific fuel consumption per B.H.P. hour for a diesel engine as compared to that of petrol engine is ?", "o": ["A) same", "B) higher", "C) lower", "D) none of the above."], "a": "C) lower"}, {"topic": "Section 1", "q": "The air standard efficiency of an I.C. engine depends on _____________", "o": ["A) fuel used", "B) speed of engine", "C) compression ratio", "D) none of the mentioned"], "a": "C) compression ratio"}];

function getRandomQuestions(){
    let shuffled = fullQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0,100);
}

var questions = getRandomQuestions();

var current = 0;
var answers = {};
var visited = {};
var marked = {};


// TIMER
var totalTime = 7200;

function startTimer(){
    var timer = setInterval(function(){
        var h = Math.floor(totalTime/3600);
        var m = Math.floor((totalTime%3600)/60);
        var s = totalTime%60;

        document.getElementById("timer").innerText =
        h + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            submitExam(true);
        }
    },1000);
}


// PALETTE
function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>

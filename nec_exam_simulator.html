 {"topic": "Section 8", "q": "In material handling, what does the term \"conveyors\" refer to?", "o": ["A) Workers responsible for moving materials", "B) Machinery used to transport materials", "C) Storage containers for materials", "D) Material inventory tracking system"], "a": "B) Machinery used to transport materials"}, {"topic": "Section 8", "q": "Which of the following is NOT a key element in production planning and control?", "o": ["A) Capacity planning", "B) Inventory management", "C) Material handling equipment", "D) Scheduling"], "a": "C) Material handling equipment"}, {"topic": "Section 8", "q": "What is the purpose of a Gantt chart in production planning and control?", "o": ["A) To track employee attendance", "B) To visualize the production schedule over time", "C) To manage inventory levels", "D) To optimize machine maintenance"], "a": "B) To visualize the production schedule over time"}, {"topic": "Section 8", "q": "Which location selection factor considers access to transportation infrastructure and proximity to suppliers and customers?", "o": ["A) Cost of land and labor", "B) Availability of utilities", "C) Market demand", "D) Transportation and proximity"], "a": "D) Transportation and proximity"}, {"topic": "Section 8", "q": "Just-In-Time (JIT) production is associated with which production planning and control philosophy?", "o": ["A) Mass production", "B) Lean manufacturing", "C) Batch production", "D) Job shop production"], "a": "B) Lean manufacturing"}, {"topic": "Section 8", "q": "Which material handling equipment is best suited for moving heavy and bulky items over a short distance within a plant?", "o": ["A) Forklift", "B) Conveyor belt", "C) Pallet jack", "D) Automated guided vehicle (AGV)"], "a": "A) Forklift"}, {"topic": "Section 8", "q": "What is the primary objective of plant layout design?", "o": ["A) Maximizing production output", "B) Minimizing production costs", "C) Enhancing employee comfort and safety", "D) Reducing machine downtime"], "a": "C) Enhancing employee comfort and safety"}, {"topic": "Section 8", "q": "Which type of plant layout is best suited for industries with high product variety and low volume production?", "o": ["A) Process layout", "B) Product layout", "C) Cellular layout", "D) Fixed-position layout"], "a": "A) Process layout"}, {"topic": "Section 8", "q": "Which of the following factors is NOT typically considered when selecting a plant location?", "o": ["A) Availability of skilled labor", "B) Proximity to suppliers and customers", "C) Government regulations", "D) Plant capacity"], "a": "D) Plant capacity"}, {"topic": "Section 8", "q": "Which material handling equipment is best suited for moving heavy loads over a short distance within a manufacturing facility?", "o": ["A) Conveyor belt", "B) Forklift", "C) Crane", "D) Pallet jack"], "a": "B) Forklift"}, {"topic": "Section 8", "q": "What is the primary purpose of automated guided vehicles (AGVs) in material handling?", "o": ["A) Transporting materials between buildings", "B) Carrying heavy machinery", "C) Moving materials autonomously within a facility", "D) Providing storage for raw materials"], "a": "C) Moving materials autonomously within a facility"}, {"topic": "Section 8", "q": "In the context of material handling, what is the significance of \"unit load\"?", "o": ["A) It refers to the maximum weight a forklift can lift.", "B) It defines the size and weight of the materials to be handled.", "C) It is the distance materials can be moved.", "D) It indicates the speed of material transport."], "a": "B) It defines the size and weight of the materials to be handled"}, {"topic": "Section 8", "q": "What is the primary objective of production planning and control?", "o": ["A) Minimizing production costs", "B) Maximizing machine utilization", "C) Meeting customer demand on time", "D) Reducing employee overtime"], "a": "C) Meeting customer demand on time"}, {"topic": "Section 8", "q": "Which of the following is NOT a production planning and control technique?", "o": ["A) Just-In-Time (JIT)", "B) Six Sigma", "C) Material Requirements Planning (MRP)", "D) Kanban"], "a": "B) Six Sigma"}, {"topic": "Section 8", "q": "What is the main function of a Gantt chart in production planning and control?", "o": ["A) Tracking inventory levels", "B) Scheduling production tasks over time", "C) Monitoring employee attendance", "D) Analyzing financial performance"], "a": "B) Scheduling production tasks over time"}, {"topic": "Section 8", "q": "What is the primary objective of plant layout?", "o": ["A) Maximizing production capacity", "B) Minimizing material handling costs", "C) Minimizing production time", "D) Maximizing employee satisfaction"], "a": "B) Minimizing material handling costs"}, {"topic": "Section 8", "q": "Which of the following is NOT a factor influencing plant location decisions?", "o": ["A) Availability of skilled labor", "B) Proximity to suppliers and customers", "C) Government regulations", "D) Plant layout design"], "a": "D) Plant layout design"}, {"topic": "Section 8", "q": "What is the primary purpose of material handling in a production system?", "o": ["A) Reducing production capacity", "B) Minimizing worker productivity", "C) Maximizing transportation costs", "D) Efficient movement of materials"], "a": "D) Efficient movement of materials"}, {"topic": "Section 8", "q": "Which of the following is an example of a fixed-location layout?", "o": ["A) Process layout", "B) Product layout", "C) Cellular layout", "D) Job shop layout"], "a": "A) Process layout"}, {"topic": "Section 8", "q": "Just-In-Time (JIT) production is closely associated with which production planning and control system?", "o": ["A) MRP (Material Requirements Planning)", "B) Kanban", "C) Six Sigma", "D) Total Quality Management (TQM)"], "a": "B) Kanban"}, {"topic": "Section 8", "q": "Which production planning and control tool is used to schedule tasks in a project with a focus on minimizing project duration?", "o": ["A) Gantt chart", "B) Critical Path Method (CPM)", "C) PERT (Program Evaluation and Review Technique)", "D) ABC analysis"], "a": "B) Critical Path Method (CPM)"}, {"topic": "Section 8", "q": "What does the ABC analysis in production planning and control categorize items based on?", "o": ["A) Alphabetical order", "B) Frequency of use", "C) Item size", "D) Cost or value"], "a": "D) Cost or value"}, {"topic": "Section 8", "q": "Which of the following is a key component of the Theory of Constraints (TOC) in production management?", "o": ["A) in production management?", "B) Reducing material handling costs", "C) Identifying and managing bottlenecks", "D) Implementing JIT production"], "a": "B) Identifying and managing bottlenecks"}, {"topic": "Section 8", "q": "What is the primary objective of plant layout design?", "o": ["A) Minimize employee satisfaction", "B) Maximize material handling cost", "C) Maximize production efficiency", "D) Minimize machine utilization"], "a": "C) Maximize production efficiency"}, {"topic": "Section 8", "q": "Which type of plant layout arranges production units sequentially in a straight line?", "o": ["A) Process layout", "B) Cellular layout", "C) Product layout", "D) Functional layout"], "a": "C) Product layout"}, {"topic": "Section 8", "q": "Material handling is an essential aspect of production systems. Which of the following is NOT a primary purpose of material handling?", "o": ["A) Reducing production lead time", "B) Minimizing production costs", "C) Enhancing worker safety", "D) Increasing machine downtime"], "a": "D) Increasing machine downtime"}, {"topic": "Section 8", "q": "Which of the following is an element of production planning and control (PPC) that involves determining the start and end times for each operation in a production process?", "o": ["A) that involves determining the start and end times for each operation in a production process?", "B) Capacity planning", "C) Inventory control", "D) Job scheduling"], "a": "C) Job scheduling"}, {"topic": "Section 8", "q": "What is the primary goal of location analysis for a new production facility?", "o": ["A) Minimize transportation costs", "B) Maximize labor costs", "C) Minimize customer accessibility", "D) Maximize material costs"], "a": "A) Minimize transportation costs"}, {"topic": "Section 8", "q": "What is the primary objective of a good plant layout?", "o": ["A) Maximizing space utilization", "B) Minimizing transportation cost", "C) Increasing workforce efficiency", "D) All of the above"], "a": "D) All of the above"}, {"topic": "Section 8", "q": "Which type of plant layout organizes workstations in a U-shaped pattern to enhance communication and teamwork among workers?", "o": ["A) Process layout", "B) Product layout", "C) Cellular layout", "D) Fixed-position layout"], "a": "C) Cellular layout"}, {"topic": "Section 8", "q": "Which material handling equipment is best suited for moving heavy and irregularly shaped objects within a manufacturing facility?", "o": ["A) Conveyor belt", "B) Forklift", "C) AGV (Automated Guided Vehicle)", "D) Hoist and crane"], "a": "D) Hoist and crane"}, {"topic": "Section 8", "q": "What is the primary purpose of an Automated Guided Vehicle (AGV) in a production system?", "o": ["A) Transporting workers between workstations", "B) Automated material handling and transport", "C) Providing real-time production status updates", "D) Quality control inspections"], "a": "B) Automated material handling and transport"}, {"topic": "Section 8", "q": "Which of the following is a key function of production planning?", "o": ["A) Managing employee payroll", "B) Scheduling maintenance of machinery", "C) Allocating resources to meet production targets", "D) Handling customer complaints"], "a": "C) Allocating resources to meet production targets"}, {"topic": "Section 8", "q": "What is the primary objective of a Just-In-Time (JIT) production system?", "o": ["A) Minimizing inventory levels", "B) Maximizing production output", "C) Reducing production lead times", "D) Increasing work-in-progress (WIP) inventory"], "a": "A) Minimizing inventory levels"}, {"topic": "Section 8", "q": "What is Economic Order Quantity (EOQ)?", "o": ["A) The maximum quantity of inventory a company can order at one time.", "B) The order quantity that minimizes total inventory holding costs and ordering costs.", "C) The minimum quantity of inventory a company must order to meet demand.", "D) The average inventory level maintained by a company."], "a": "B) The order quantity that minimizes total inventory holding costs and ordering costs."}, {"topic": "Section 8", "q": "What is Safety Stock?", "o": ["A) The stock that is kept for safety purposes, such as for fire emergencies.", "B) Excess inventory that should be sold quickly.", "C) Extra inventory held to protect against uncertainties in demand and lead time.", "D) The inventory stored in a safety deposit box."], "a": "C) Extra inventory held to protect against uncertainties in demand and lead time."}, {"topic": "Section 8", "q": "What is the Reorder Point?", "o": ["A) The point at which you should stop reordering inventory.", "B) The point at which inventory levels are critically low and a reorder is necessary.", "C) The maximum inventory level that should not be exceeded.", "D) The point at which you should reorder more than you need."], "a": "B) The point at which inventory levels are critically low and a reorder is necessary."}, {"topic": "Section 8", "q": "What is Lead Time in inventory management?", "o": ["A) The time it takes to deliver a product to a customer.", "B) The time it takes to produce a product.", "C) The time it takes to reorder inventory.", "D) The time it takes for an order to be delivered after it's placed."], "a": "D) The time it takes for an order to be delivered after it's placed."}, {"topic": "Section 8", "q": "What does ABC Analysis in inventory management involve?", "o": ["A) Categorizing inventory items into three groups based on their importance.", "B) Analyzing the inventory alphabetically by product name.", "C) Classifying inventory items based on their color coding.", "D) Identifying the most expensive items in inventory."], "a": "A) Categorizing inventory items into three groups based on their importance."}, {"topic": "Section 8", "q": "Which of the following is a quantitative forecasting technique?", "o": ["A) Market Research", "B) Delphi Method", "C) Moving Average", "D) Expert Opinion"], "a": "C) Moving Average"}, {"topic": "Section 8", "q": "In inventory management, what does the term \"Ordering Cost\" refer to?", "o": ["A) The cost of placing and receiving orders for inventory.", "B) The cost of holding inventory in storage.", "C) The cost of damaged or obsolete inventory.", "D) The cost of production."], "a": "A) The cost of placing and receiving orders for inventory."}, {"topic": "Section 8", "q": "What does the Economic Order Quantity (EOQ) represent?", "o": ["A) The maximum order quantity to minimize holding costs.", "B) The order quantity that minimizes both ordering and holding costs.", "C) The minimum order quantity to ensure stockouts are avoided.", "D) The order quantity that maximizes reorder frequency."], "a": "B) The order quantity that minimizes both ordering and holding costs."}, {"topic": "Section 8", "q": "Safety stock is used to:", "o": ["A) Maximize inventory turnover.", "B) Minimize carrying costs.", "C) Prevent stockouts due to variability in demand or lead time.", "D) Reduce the reorder point."], "a": "C) Prevent stockouts due to variability in demand or lead time."}, {"topic": "Section 8", "q": "The reorder quantity is:", "o": ["A) The quantity ordered each time inventory reaches the reorder point.", "B) The quantity of safety stock added to the current inventory.", "C) The maximum quantity an organization can order at one time.", "D) The quantity required to reach the Economic Order Quantity (EOQ)."], "a": "A) The quantity ordered each time inventory reaches the reorder point."}, {"topic": "Section 8", "q": "In inventory management, lead time refers to:", "o": ["A) The time it takes to process an order and receive it.", "B) The time it takes to sell an item from inventory.", "C) The time it takes to manufacture a product.", "D) The time it takes to count inventory."], "a": "A) The time it takes to process an order and receive it."}, {"topic": "Section 8", "q": "What does the \"A\" category in ABC analysis represent?", "o": ["A) Items with the highest value and the highest priority.", "B) Items with the lowest value and the lowest priority.", "C) Items with the highest value and the lowest priority.", "D) Items with the lowest value and the highest priority."], "a": "A) Items with the highest value and the highest priority."}, {"topic": "Section 8", "q": "Which forecasting technique relies on past data to predict future values by identifying trends and patterns?", "o": ["A) Exponential Smoothing", "B) Delphi Method", "C) Market Research", "D) Simple Moving Average"], "a": "D) Simple Moving Average"}, {"topic": "Section 8", "q": "What does Economic Order Quantity (EOQ) represent in inventory management?", "o": ["A) The maximum order quantity", "B) The minimum order quantity", "C) The order quantity that minimizes total inventory costs", "D) The order quantity that maximizes total inventory costs"], "a": "C) The order quantity that minimizes total inventory costs"}, {"topic": "Section 8", "q": "Safety stock is used to:", "o": ["A) Reduce lead time", "B) Minimize holding costs", "C) Protect against stockouts due to demand variability", "D) Reduce order quantity"], "a": "C) Protect against stockouts due to demand variability"}, {"topic": "Section 8", "q": "Reorder point is calculated as:", "o": ["A) EOQ + Safety Stock", "B) Safety Stock - EOQ", "C) Demand during lead time + Safety Stock", "D) EOQ - Demand during lead time"], "a": "C) Demand during lead time + Safety Stock"}, {"topic": "Section 8", "q": "Lead time in inventory management represents:", "o": ["A) The time required to sell inventory", "B) The time required to reorder inventory", "C) The time between placing an order and receiving the order", "D) The time between receiving inventory and paying for it"], "a": "C) The time between placing an order and receiving the order"}, {"topic": "Section 8", "q": "In ABC analysis, items are categorized into three classes based on:", "o": ["A) Item size and weight", "B) The cost of the item", "C) The demand for the item", "D) The lead time for the item"], "a": "B) The cost of the item"}, {"topic": "Section 8", "q": "Which forecasting technique relies on historical demand data and weights recent data more heavily?", "o": ["A) Exponential Smoothing", "B) Moving Averages", "C) Delphi Method", "D) Linear Regression"], "a": "A) Exponential Smoothing"}, {"topic": "Section 8", "q": "Which forecasting technique involves experts providing their opinions and estimates on future demand?", "o": ["A) Time Series Analysis", "B) Market Research", "C) Delphi Method", "D) Regression Analysis"], "a": "C) Delphi Method"}, {"topic": "Section 8", "q": "What is the Economic Order Quantity (EOQ) used for in inventory control?", "o": ["A) To minimize carrying costs", "B) To maximize order quantity", "C) To reduce lead time", "D) To maximize safety stock"], "a": "A) To minimize carrying costs"}, {"topic": "Section 8", "q": "Safety stock is used primarily for:", "o": ["A) Minimizing ordering costs", "B) Handling unexpected demand or lead time fluctuations", "C) Reducing holding costs", "D) Maximizing inventory turnover"], "a": "B) Handling unexpected demand or lead time fluctuations"}, {"topic": "Section 8", "q": "Reorder Quantity is also known as:", "o": ["A) Economic Order Quantity (EOQ)", "B) Maximum Stock Level", "C) Minimum Stock Level", "D) Order Point"], "a": "D) Order Point"}, {"topic": "Section 8", "q": "Lead time in inventory control refers to:", "o": ["A) The time it takes to sell a product", "B) The time it takes to receive an order once it's placed", "C) The time it takes to manufacture a product", "D) The time it takes to forecast future demand"], "a": "B) The time it takes to receive an order once it's placed"}, {"topic": "Section 8", "q": "In ABC Analysis, 'A' items are typically characterized by:", "o": ["A) Low value but high demand", "B) High value and high demand", "C) High value but low demand", "D) Low value and low demand"], "a": "B) High value and high demand"}, {"topic": "Section 8", "q": "Which of the following is a quantitative forecasting technique?", "o": ["A) Delphi method", "B) Market research", "C) Time series analysis", "D) Expert judgment"], "a": "C) Time series analysis"}, {"topic": "Section 8", "q": "In time series forecasting, what is a moving average used for?", "o": ["A) Forecasting long-term trends", "B) Handling seasonality", "C) Smoothing out random variations", "D) Forecasting short-term fluctuations"], "a": "C) Smoothing out random variations"}, {"topic": "Section 8", "q": "What forecasting technique relies on the judgment and expertise of individuals with knowledge of the industry or market?", "o": ["A) Time series analysis", "B) Causal forecasting", "C) Expert judgment", "D) Regression analysis"], "a": "C) Expert judgment"}, {"topic": "Section 8", "q": "Which of the following is a measure of engine efficiency?", "o": ["A) Brake specific fuel consumption (BSFC)", "B) Engine displacement", "C) Tire pressure", "D) Spark plug gap"], "a": "A) Brake specific fuel consumption (BSFC)"}, {"topic": "Section 8", "q": "What is the primary purpose of engine testing?", "o": ["A) To calculate engine displacement", "B) To determine the engine's weight", "C) To assess the engine's performance and reliability", "D) To adjust the vehicle's alignment"], "a": "C) To assess the engine's performance and reliability"}, {"topic": "Section 8", "q": "What is the primary source of power in an internal combustion engine?", "o": ["A) Electricity", "B) Chemical energy from fuel", "C) Compressed air", "D) Solar energy"], "a": "B) Chemical energy from fuel"}, {"topic": "Section 8", "q": "In an internal combustion engine, excessive heat can lead to what issue?", "o": ["A) Increased efficiency", "B) Improved fuel consumption", "C) Engine overheating and damage", "D) Better lubrication"], "a": "C) Engine overheating and damage"}, {"topic": "Section 8", "q": "What is the term for the undesirable noise produced in an engine due to the uncontrolled ignition of air-fuel mixture before the spark plug fires?", "o": ["A) Detonation", "B) Combustion", "C) Pre-compression", "D) Vaporization"], "a": "A) Detonation"}, {"topic": "Section 8", "q": "What component in an engine is responsible for mixing air and fuel in the correct ratio for combustion?", "o": ["A) Spark plug", "B) Exhaust manifold", "C) Carburetor", "D) Piston"], "a": "C) Carburetor"}, {"topic": "Section 8", "q": "In modern automotive engines, what system has largely replaced carburetors for delivering fuel to the engine?", "o": ["A) Supercharger", "B) Turbocharger", "C) Fuel injection system", "D) Intake manifold"], "a": "C) Fuel injection system"}, {"topic": "Section 8", "q": "What is the primary purpose of testing engines?", "o": ["A) To improve fuel efficiency", "B) To measure engine power and performance", "C) To evaluate exhaust emissions", "D) To assess engine cooling"], "a": "B) To measure engine power and performance"}, {"topic": "Section 8", "q": "In engine testing, what is the Brake Specific Fuel Consumption (BSFC) value related to?", "o": ["A) value related to?", "B) Engine cooling efficiency", "C) Engine power output", "D) Fuel efficiency"], "a": "C) Fuel efficiency"}, {"topic": "Section 8", "q": "What is the term for the undesirable noise created by an engine when the air-fuel mixture prematurely ignites in the cylinder?", "o": ["A) Detonation", "B) Pre-ignition", "C) Vapor lock", "D) Knocking"], "a": "D) Knocking"}, {"topic": "Section 8", "q": "Which component in the engine cooling system removes excess heat from the engine?", "o": ["A) Radiator", "B) Carburetor", "C) Crankshaft", "D) Camshaft"], "a": "A) Radiator"}, {"topic": "Section 8", "q": "What is the primary purpose of a carburetor in an internal combustion engine?", "o": ["A) To compress the air-fuel mixture", "B) To regulate the flow of exhaust gases", "C) To mix air and fuel in the correct ratio", "D) To convert exhaust gases into energy"], "a": "C) To mix air and fuel in the correct ratio"}, {"topic": "Section 8", "q": "In a fuel injection system, which component sprays fuel directly into the combustion chamber?", "o": ["A) Fuel pump", "B) Injector", "C) Carburetor", "D) Spark plug"], "a": "B) Injector"}, {"topic": "Section 8", "q": "What is the primary reason for conducting engine efficiency tests?", "o": ["A) To assess exhaust emissions", "B) To determine engine cooling performance", "C) To measure the power output for a given amount of fuel", "D) To evaluate the engine's noise level"], "a": "C) To measure the power output for a given amount of fuel"}, {"topic": "Section 8", "q": "What is the primary purpose of testing an internal combustion engine's performance?", "o": ["A) To check the engine's color", "B) To measure its efficiency and power", "C) To assess the tire pressure", "D) To verify the vehicle's top speed"], "a": "B) To measure its efficiency and power"}, {"topic": "Section 8", "q": "What is engine efficiency defined as in terms of thermal efficiency?", "o": ["A) The ratio of heat produced to heat absorbed", "B) The ratio of power output to fuel input", "C) The ratio of power output to thermal output", "D) The ratio of air intake to exhaust gases"], "a": "B) The ratio of power output to fuel input"}, {"topic": "Section 8", "q": "What is \"knocking\" in the context of internal combustion engines?", "o": ["A) A method to increase engine efficiency", "B) A type of engine cooling system", "C) The premature ignition of air-fuel mixture", "D) The sound produced by a well-running engine"], "a": "C) The premature ignition of air-fuel mixture"}, {"topic": "Section 8", "q": "Which system is responsible for mixing air and fuel in an internal combustion engine?", "o": ["A) Exhaust system", "B) Cooling system", "C) Carburetor or fuel injection system", "D) Transmission system"], "a": "C) Carburetor or fuel injection system"}, {"topic": "Section 8", "q": "In engine cooling, what is the primary purpose of the radiator?", "o": ["A) To regulate fuel flow", "B) To control air intake", "C) To maintain oil pressure", "D) To dissipate excess heat"], "a": "D) To dissipate excess heat"}, {"topic": "Section 8", "q": "What is the term for the condition in which an engine's air-fuel mixture ignites before the spark plug fires?", "o": ["A) Detonation", "B) Carburetion", "C) Pre-ignition", "D) Compression"], "a": "C) Pre-ignition"}, {"topic": "Section 8", "q": "What is the primary function of a dynamometer in engine testing?", "o": ["A) To measure engine temperature", "B) To monitor exhaust emissions", "C) To measure engine power and torque", "D) To adjust the carburetor"], "a": "C) To measure engine power and torque"}, {"topic": "Section 8", "q": "What is the Brake Specific Fuel Consumption (BSFC) of an engine?", "o": ["A) of an engine?", "B) The rate of fuel consumption per unit of power produced", "C) The rate of power produced per unit of fuel consumed", "D) The rate of air consumption per unit of power produced"], "a": "A) The rate of fuel consumption per unit of power produced"}, {"topic": "Section 8", "q": "What is the purpose of an engine dynamometer?", "o": ["A) To measure engine torque and power output", "B) To cool the engine during testing", "C) To increase engine efficiency", "D) To filter exhaust emissions"], "a": "A) To measure engine torque and power output"}, {"topic": "Section 8", "q": "Which phenomenon occurs when the air-fuel mixture in the engine cylinder ignites before the spark plug fires?", "o": ["A) Detonation", "B) Carburetion", eriod is the time required for:", "o": ["A) Recovering the initial investment without considering time value.", "B) Recovering the initial investment with discounting.", "C) Achieving a positive Net Present Value.", "D) Calculating the Modified Internal Rate of Return."], "a": "B) Recovering the initial investment with discounting."}, {"topic": "Section 10", "q": "Which of the following is not a depreciation method commonly used in engineering economics?", "o": ["A) Straight-Line Depreciation.", "B) Double Declining Balance Depreciation.", "C) Sum-of-the-Years-Digits Depreciation.", "D) Annualized Taxation Depreciation."], "a": "D) Annualized Taxation Depreciation."}, {"topic": "Section 10", "q": "In the context of engineering economics, MARR stands for:", "o": ["A) Mean Annual Rate of Return.", "B) Minimum Acceptable Rate of Return.", "C) Maximum Allowable Rate of Return.", "D) Modified Annual Return Rate."], "a": "B) Minimum Acceptable Rate of Return."}, {"topic": "Section 10", "q": "When comparing alternative projects, which metric would you use to determine the project's profitability relative to its cost of capital?", "o": ["A) Payback Period.", "B) Net Present Value (NPV).", "C) Internal Rate of Return (IRR).", "D) Depreciation Rate."], "a": "B) Net Present Value (NPV)."}, {"topic": "Section 10", "q": "Which of the following is a consideration in engineering economics specific to taxation systems in Nepal?", "o": ["A) Depreciation methods.", "B) Time value of money.", "C) Net Present Value (NPV).", "D) Internal Rate of Return (IRR)."], "a": "A) Depreciation methods."}, {"topic": "Section 10", "q": "Which of the following best defines the concept of \"time value of money\" in engineering economics?", "o": ["A) Money earned in the future is worth more than money earned today.", "B) Money earned today is worth more than money earned in the future.", "C) Money has a constant value regardless of time.", "D) Money earned in the past is worth more than money earned today."], "a": "B) Money earned today is worth more than money earned in the future."}, {"topic": "Section 10", "q": "In project cash flow analysis, which of the following components represents the net cash inflow or outflow from the project?", "o": ["A) Sunk costs", "B) Opportunity costs", "C) Operating cash flows", "D) Sunk and opportunity costs combined"], "a": "C) Operating cash flows"}, {"topic": "Section 10", "q": "What is the Discounted Payback Period of a project?", "o": ["A) The period it takes to recoup the initial investment without considering time value of money.", "B) The period it takes to recoup the initial investment considering time value of money.", "C) The period when the project generates maximum cash flow.", "D) The time period when all costs and revenues are equal."], "a": "B) The period it takes to recoup the initial investment considering time value of money."}, {"topic": "Section 10", "q": "What does NPV (Net Present Value) of a project indicate when it is positive?", "o": ["A) The project is not financially viable.", "B) The project is financially viable and expected to generate a return greater than the discount rate.", "C) The project is financially viable, but it is unclear if it will generate a return greater than the discount rate.", "D) The project is infeasible."], "a": "B) The project is financially viable and expected to generate a return greater than the discount rate."}, {"topic": "Section 10", "q": "What is IRR (Internal Rate of Return) for a project?", "o": ["A) The rate at which the project breaks even.", "B) The rate at which the project generates maximum cash flow.", "C) The rate at which NPV is equal to zero.", "D) The rate at which the project generates maximum revenue."], "a": "C) The rate at which NPV is equal to zero."}, {"topic": "Section 10", "q": "MARR (Minimum Attractive Rate of Return) is used in engineering economics for:", "o": ["A) Comparing projects based on their riskiness.", "B) Estimating the initial project  ["A) Ethylene", "B) Ozone", "C) Carbon monoxide", "D) Nitrogen dioxide"], "a": "B) Ozone"}, {"topic": "Section 12", "q": "Standard dimensions (mm x mm) of A3 drawing sheet is", "o": ["A) 11.69 \u00d7 16.54", "B) 29.7 \u00d7 42", "C) 297 \u00d7 420", "D) 420 \u00d7 280"], "a": "C) 297 \u00d7 420"}, {"topic": "Section 12", "q": "Which of the following methods of charging depreciation of an asset has increased amount of depreciation as the age of asset increases", "o": ["A) Sum-of-year digit", "B) Sinking fund", "C) Diminishing balance", "D) Straight line"], "a": "B) Sinking fund"}, {"topic": "Section 12", "q": "The process of optimizing the project\u2019s limited resources without extending the project duration is known as", "o": ["A) Project crashing", "B) Resource levelling", "C) Resource smoothing", "D) Networking"], "a": "C) Resource smoothing"}, {"topic": "Section 12", "q": "The process of composing/raising the required fund from different sources such as equity, preferred stock, bond and debenture is known as", "o": ["A) Capital structure planning", "B) Project financing", "C) Capital budgeting decision", "D) Deducing earning per share"], "a": "A) Capital structure planning"}, {"topic": "Section 12", "q": "In which of the following society, people used to seek their existence on growing plants for their cattle and domestic animals", "o": ["A) Pastoral society", "B) Tribal society", "C) Horticultural society", "D) Agricultural society"], "a": "A) Pastoral society"}, {"topic": "Section 12", "q": "According to Nepal Engineering Council Act, 2055 (Revised, 2079), all engineering academic institutions shall be ................................... in the Council.", "o": ["A) Affiliated", "B) United", "C) Recognized", "D) Associated"], "a": "C) Recognized"}, {"topic": "Section 12", "q": "Which of the following is not an effective method to control corrosion?", "o": ["A) Cathodic protection", "B) Use of corrosion-resistant alloys", "C) Application of protective coatings", "D) Increasing humidity and temperature"], "a": "D) Increasing humidity and temperature"}, {"topic": "Section 12", "q": "Which of the following quantities represents the rate of flow of electric charge?", "o": ["A) Voltage", "B) Current", "C) Resistance", "D) Power"], "a": "B) Current"}, {"topic": "Section 12", "q": "In a shaper machine, the cutting action takes place during:", "o": ["A) The return stroke of the ram", "B) Both forward and return strokes", "C) The forward stroke of the ram", "D) Only during tool setup"], "a": "C) The forward stroke of the ram"}, {"topic": "Section 12", "q": "Motivation that comes from internal satisfaction, personal growth, or achievement is called:", "o": ["A) Extrinsic motivation", "B) Intrinsic motivation", "C) Coercive motivation", "D) External reinforcement"], "a": "B) Intrinsic motivation"}, {"topic": "Section 12", "q": "The pitch of a screw thread is defined as:", "o": ["A) The distance between two consecutive crests or roots measured parallel to the axis", "B) The angle between the flanks of the thread", "C) The height of the thread from root to crest", "D) The diameter at which the thread thickness equals the space between threads"], "a": "A) The distance between two consecutive crests or roots measured parallel to the axis"}, {"topic": "Section 12", "q": "A closed system in thermodynamics is one in which:", "o": ["A) Both mass and energy can cross the system boundary", "B) Only mass can cross the system boundary", "C) Only energy can cross the system boundary", "D) Neither mass nor energy can cross the system boundary"], "a": "C) Only energy can cross the system boundary"}, {"topic": "Section 12", "q": "The Clausius statement of the Second Law of Thermodynamics says that::", "o": ["A) No heat engine can be 100% efficient", "B) Heat cannot of itself flow from a colder body to a hotter body", "C) All reversible engines have equal efficiency", "D) Energy can neither be created nor destroyed"], "a": "B) Heat cannot of itself flow from a colder body to a hotter body"}, {"topic": "Section 12", "q": "The camshaft in an engine is responsible for:", "o": ["A) Controlling the timing of valve opening and closing", "B) Driving the crankshaft", "C) Maintaining engine temperature", "D) Compressing the air\u2013fuel mixture"], "a": "A) Controlling the timing of valve opening and closing"}, {"topic": "Section 12", "q": "Which of the following is a desirable property of a refrigerant?", "o": ["A) High boiling point and high toxicity", "B) High latent heat of vaporization and non-corrosiveness", "C) Low thermal conductivity and high density", "D) High ozone depletion potential"], "a": "B) High latent heat of vaporization and non-corrosiveness"}, {"topic": "Section 12", "q": "A Newtonian fluid is one in which:", "o": ["A) Shear stress is independent of shear rate", "B) Shear stress is directly proportional to the rate of shear strain", "C) Viscosity changes with temperature and pressure abruptly", "D) There is no viscous effect"], "a": "B) Shear stress is directly proportional to the rate of shear strain"}, {"topic": "Section 12", "q": "The Continuity Equation for a steady, incompressible flow is based on the law of:", "o": ["A) Law of conservation of mass", "B) Law of conservation of momentum", "C) Law of conservation of energy", "D) Newton\u2019s second law"], "a": "A) Law of conservation of mass"}, {"topic": "Section 12", "q": "The hydraulic efficiency of a turbine is defined as:", "o": ["A) Ratio of mechanical energy at the shaft to electrical output", "B) Ratio of power developed by the runner to the energy supplied by water at the inlet", "C) Ratio of input head to output head", "D) Ratio of total head to net head"], "a": "B) Ratio of power developed by the runner to the energy supplied by water at the inlet"}, {"topic": "Section 12", "q": "The performance curves of a pump show the relationship between:", "o": ["A) Head, discharge, and efficiency", "B) Temperature, viscosity, and flow rate", "C) Speed, torque, and power factor", "D) Pressure, density, and temperature"], "a": "A) Head, discharge, and efficiency"}, {"topic": "Section 12", "q": "For a body to be in static equilibrium, the following conditions must be satisfied:", "o": ["A) \u03a3F=0 and \u03a3M=0", "B) \u03a3F=0 only", "C) \u03a3M=0 only", "D) \u03a3F\u22600 and \u03a3M=0"], "a": "A) \u03a3F=0 and \u03a3M=0"}, {"topic": "Section 12", "q": "Thermal stress is developed in a material when:", "o": ["A) The material is freely expanding or contracting with temperature", "B) The temperature is constant throughout", "C) Expansion or contraction due to temperature is restrained", "D) The material is under pure shear stress"], "a": "C) Expansion or contraction due to temperature is restrained"}, {"topic": "Section 12", "q": "In a slider-crank mechanism, the link that transmits motion from the crank to the slider is called:", "o": ["A) Frame", "B) Coupling rod", "C) Connecting rod", "D) Follower"], "a": "C) Connecting rod"}, {"topic": "Section 12", "q": "Quenching is a process in which the heated metal is:", "o": ["A) Cooled slowly in the furnace", "B) Cooled rapidly in water, oil, or brine", "C) Heated again to a lower temperature", "D) Allowed to cool in air"], "a": "B) Cooled rapidly in water, oil, or brine"}, {"topic": "Section 12", "q": "In a milling machine, the cutting tool:", "o": ["A) Rotates while the workpiece remains stationary or moves linearly", "B) Remains stationary while the workpiece rotates", "C) Moves to and fro while the workpiece is fixed", "D) Cuts by grinding action"], "a": "A) Rotates while the workpiece remains stationary or moves linearly"}, {"topic": "Section 12", "q": "The major difference between soldering and brazing is that:", "o": ["A) Soldering uses a lower melting point filler metal than brazing", "B) Brazing is done at a lower temperature than soldering", "C) Soldering always requires flux, while brazing does not", "D) Brazing is used for electrical joints only"], "a": "A) Soldering uses a lower melting point filler metal than brazing"}, {"topic": "Section 12", "q": "Additive manufacturing (3D printing) differs from conventional machining because it:", "o": ["A) Removes material to create parts", "B) Builds parts layer by layer by adding material", "C) Requires no digital model", "D) Uses only metallic materials"], "a": "B) Builds parts layer by layer by adding material"}, {"topic": "Section 12", "q": "The main function of a clutch is to:", "o": ["A) Stop a rotating shaft instantly", "B) Connect and disconnect power between driving and driven shafts smoothly", "C) Transmit power continuously without control", "D) Increase torque output of an engine"], "a": "B) Connect and disconnect power between driving and driven shafts smoothly"}, {"topic": "Section 12", "q": "In an undamped free vibration, the amplitude of vibration:", "o": ["A) Decreases gradually with time", "B) Increases exponentially with time", "C) Remains constant with time", "D) Becomes zero immediately after one cycle"], "a": "C) Remains constant with time"}, {"topic": "Section 12", "q": "A mechanical engineering standard helps designers by:", "o": ["A) Eliminating the need for material selection", "B) Providing reference dimensions, tolerances, and safety factors for common components", "C) Forcing all products to be identical", "D) Allowing arbitrary assumptions in design"], "a": "B) Providing reference dimensions, tolerances, and safety factors for common components"}, {"topic": "Section 12", "q": "Galvanic corrosion occurs when:", "o": ["A) Two similar metals are exposed to dry air", "B) Two dissimilar metals are in electrical contact in the presence of an electrolyte", "C) Metal is exposed to high temperature", "D) The paint coating is too thick"], "a": "B) Two dissimilar metals are in electrical contact in the presence of an electrolyte"}, {"topic": "Section 12", "q": "Total Productive Maintenance (TPM) aims to:", "o": ["A) Involve only the maintenance department in machine care", "B) Achieve zero breakdowns and zero defects through operator participation", "C) Focus only on production efficiency", "D) Replace traditional preventive maintenance with breakdown repair"], "a": "B) Achieve zero breakdowns and zero defects through operator participation"}, {"topic": "Section 12", "q": "The need for maintenance arises mainly because of:", "o": ["A) Continuous wear and tear, corrosion, vibration, and aging of components", "B) Overdesign and underuse of machinery", "C) Perfect working conditions at all times", "D) Frequent equipment upgrades"], "a": "A) Continuous wear and tear, corrosion, vibration, and aging of components"}, {"topic": "Section 12", "q": "The Mean Time Between Failures (MTBF) of a system represents:", "o": ["A) The time taken to repair a component after failure", "B) The total operating time divided by the number of failures", "C) The maximum life span of a component", "D) The downtime of a system"], "a": "B) The total operating time divided by the number of failures"}, {"topic": "Section 12", "q": "A qualitative risk analysis technique involves:", "o": ["A) Using numerical probability and statistical data only", "B) Ranking risks based on expert judgment, experience, or categories like low/medium/high", "C) Using Monte Carlo simulations", "D) Deriving exact mathematical models of risk"], "a": "B) Ranking risks based on expert judgment, experience, or categories like low/medium/high"}, {"topic": "Section 12", "q": "In Dye Penetrant Testing (DPT), surface cracks are made visible by:", "o": ["A) Applying magnetic particles to the surface", "B) Using a fluorescent or colored liquid that seeps into surface defects", "C) Measuring electrical resistance", "D) Using X-rays to highlight the defect"], "a": "B) Using a fluorescent or colored liquid that seeps into surface defects"}, {"topic": "Section 12", "q": "The least count of an instrument is defined as:", "o": ["A) The highest value that can be measured", "B) The difference between two readings", "C) The smallest value that can be measured accurately by the instrument", "D) The ratio of error to accuracy"], "a": "C) The smallest value that can be measured accurately by the instrument"}, {"topic": "Section 12", "q": "The Economic Order Quantity (EOQ) is the order quantity that:", "o": ["A) Minimizes total ordering and holding costs", "B) Maximizes total inventory level", "C) Minimizes purchasing cost only", "D) Maximizes supplier discounts"], "a": "A) Minimizes total ordering and holding costs"}, {"topic": "Section 12", "q": "Knocking in spark ignition (SI) engines is primarily caused by:", "o": ["A) Late combustion of the air\u2013fuel mixture", "B) Spontaneous auto-ignition of the end-gas ahead of the flame front", "C) Use of high-octane fuel", "D) Low compression ratio"], "a": "B) Spontaneous auto-ignition of the end-gas ahead of the flame front"}, {"topic": "Section 12", "q": "Calibration of an instrument is done to:", "o": ["A) Adjust the instrument to read correctly within a specified accuracy range", "B) Increase the range of measurement", "C) Make the instrument lighter", "D) Eliminate the need for repeat measurements"], "a": "A) Adjust the instrument to read correctly within a specified accuracy range"}, {"topic": "Section 12", "q": "The rate of heat transfer by conduction through a plane wall is given by:", "o": ["A) Q=kA(T1\u2212T2)/L", "B) Q=hA(T1\u2212T2)", "C) Q=\u03c3AT4", "D) Q=mcp(T1\u2212T2)"], "a": "A) Q=kA(T1\u2212T2)/L"}, {"topic": "Section 12", "q": "The primary purpose of using fins on a heated surface is to:", "o": ["A) Reduce heat transfer from the surface", "B) Increase the heat transfer area and enhance the rate of heat dissipation", "C) Store thermal energy for later use", "D) Decrease the convective heat transfer coefficient"], "a": "B) Increase the heat transfer area and enhance the rate of heat dissipation"}, {"topic": "Section 12", "q": "In a fuel cell, the chemical energy of fuel is converted directly into:", "o": ["A) Heat energy", "B) Electrical energy", "C) Mechanical energy", "D) Sound energy"], "a": "B) Electrical energy"}, {"topic": "Section 12", "q": "The viscosity grade of lubricating oil (e.g., SAE 20W-40) indicates:", "o": ["A) The ignition quality of fuel", "B) The fuel economy of the engine", "C) The flow characteristics of oil at low and high temperatures", "D) The purity of the oil"], "a": "C) The flow characteristics of oil at low and high temperatures"}, {"topic": "Section 12", "q": "The Internal Rate of Return (IRR) is:", "o": ["A) The interest rate at which the NPV of all cash flows equals zero", "B) The rate of tax applied on income", "C) The rate at which future cash flows are discounted for inflation", "D) The fixed rate used by banks for all loans"], "a": "A) The interest rate at which the NPV of all cash flows equals zero"}, {"topic": "Section 12", "q": "An isometric projection is a type of pictorial drawing in which:", "o": ["A) All axes are at 45\u00b0 to each other", "B) Two axes are at 30\u00b0 to the horizontal and one is vertical", "C) Only one view is drawn without true dimensions", "D) All dimensions are reduced by half"], "a": "B) Two axes are at 30\u00b0 to the horizontal and one is vertical"}, {"topic": "Section 12", "q": "The Council (NEC) maintains a record of engineers under:", "o": ["A) maintains a record of engineers under:", "B) Only one category for all engineers", "C) Different categories based on qualifications and experience (e.g., Graduate Engineer, Professional Engineer)", "D) Only foreign engineers working in Nepal"], "a": "B) Different categories based on qualifications and experience (e.g., Graduate Engineer, Professional Engineer)"}];

function getRandomQuestions(){
    let shuffled = fullQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0,100);
}

var questions = getRandomQuestions();

var current = 0;
var answers = {};
var visited = {};
var marked = {};


// TIMER
var totalTime = 7200;

function startTimer(){
    var timer = setInterval(function(){
        var h = Math.floor(totalTime/3600);
        var m = Math.floor((totalTime%3600)/60);
        var s = totalTime%60;

        document.getElementById("timer").innerText =
        h + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            submitExam(true);
        }
    },1000);
}


// PALETTE
function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>

var fullQuestions = [{"topic": "Section 1", "q": "What is the primary purpose of a mechanical drawing?", "o": ["A) Aesthetic representation", "B) Communication of design intent", "C) Artistic expression", "D) Historical documentation"], "a": "B) Communication of design intent"}, {"topic": "Section 1", "q": "Which type of joint is created by fusing two metal parts using heat and filler material?", "o": ["A) Welded joint", "B) Riveted joint", "C) Bolted joint", "D) Keyed joint"], "a": "A) Welded joint"}, {"topic": "Section 1", "q": "What is the main function of a rivet in a riveted joint?", "o": ["A) To provide flexibility", "B) To provide electrical conductivity", "C) To join two or more parts permanently", "D) To facilitate easy disassembly"], "a": "C) To join two or more parts permanently"}, {"topic": "Section 1", "q": "In a bolted joint, what component prevents the nut from loosening due to vibration or other forces?", "o": ["A) Bolt head", "B) Lock washer", "C) Threaded rod", "D) Nut plate"], "a": "B) Lock washer"}, {"topic": "Section 1", "q": "What is the purpose of a keyway in a keyed assembly?", "o": ["A) To enhance the aesthetics of the assembly", "B) To provide a passage for fluids", "C) To transmit torque between connected components", "D) To reduce the overall weight of the assembly"], "a": "C) To transmit torque between connected components"}, {"topic": "Section 1", "q": "Tolerance in mechanical drawings refers to:", "o": ["A) The allowable deviation from a specified dimension", "B) The maximum dimension of a part", "C) The minimum dimension of a part", "D) The exact dimension without any deviation"], "a": "A) The allowable deviation from a specified dimension"}, {"topic": "Section 1", "q": "Which term refers to the range of acceptable sizes for mating parts in an assembly?", "o": ["A) Surface finish", "B) Limits", "C) Fits", "D) Welding"], "a": "C) Fits"}, {"topic": "Section 1", "q": "What is the primary purpose of specifying a surface finish in a mechanical drawing?", "o": ["A) To improve the part's strength", "B) To enhance the part's visual appeal", "C) To ensure proper lubrication", "D) To define the texture and quality of the part's surface"], "a": "D) To define the texture and quality of the part's surface"}, {"topic": "Section 1", "q": "What type of drawing is used to represent the detailed dimensions and specifications of machine parts and assemblies?", "o": ["A) Pictorial drawing", "B) Isometric drawing", "C) Mechanical drawing", "D) Architectural drawing"], "a": "C) Mechanical drawing"}, {"topic": "Section 1", "q": "Which type of joint is commonly used to join two metal plates together by using a heated metal rod?", "o": ["A) Welded joint", "B) Riveted joint", "C) Bolted joint", "D) Adhesive joint"], "a": "A) Welded joint"}, {"topic": "Section 1", "q": "In a riveted joint, what is the part that covers the end of the rivet and provides a decorative and protective finish called?", "o": ["A) Rivet shank", "B) Rivet head", "C) Rivet tail", "D) Rivet body"], "a": "B) Rivet head"}, {"topic": "Section 1", "q": "Which fastener type is designed to be threaded into a corresponding hole in another part to hold them together?", "o": ["A) Weld", "B) Rivet", "C) Bolt", "D) Nut"], "a": "C) Bolt"}, {"topic": "Section 1", "q": "In a bolted joint, which component is used to secure the bolt and prevent it from loosening?", "o": ["A) Bolt", "B) Nut", "C) Washer", "D) Rivet"], "a": "B) Nut"}, {"topic": "Section 1", "q": "What is the term for the groove or slot cut into a machine part to accommodate a key, which prevents relative rotation between the parts?", "o": ["A) Thread", "B) Keyway", "C) Rivet hole", "D) Nut thread"], "a": "B) Keyway"}, {"topic": "Section 1", "q": "When discussing tolerances in mechanical drawings, what does the term \"fit\" refer to?", "o": ["A) How well parts fit together", "B) The size of the tolerance", "C) The fit of the drawing on the page", "D) The type of fastener used"], "a": "A) How well parts fit together"}, {"topic": "Section 1", "q": "What is the standard unit of measurement for surface finish, which indicates the roughness or smoothness of a surface?", "o": ["A) Meters", "B) Radians", "C) Micrometers", "D) Inches"], "a": "C) Micrometers"}, {"topic": "Section 1", "q": "In mechanical drawing, what is the purpose of specifying limits and fits?", "o": ["A) To determine the material used", "B) To control the cost of production", "C) To ensure interchangeability of parts", "D) To define the drawing's scale"], "a": "C) To ensure interchangeability of parts"}, {"topic": "Section 1", "q": "Which type of drawing provides a three-dimensional representation of an object and is often used for presentation and visualization purposes?", "o": ["A) Orthographic drawing", "B) Isometric drawing", "C) Pictorial drawing", "D) Sectional drawing"], "a": "C) Pictorial drawing"}, {"topic": "Section 1", "q": "Which of the following is a commonly used method for joining two metal parts permanently in machine drawing?", "o": ["A) Welding", "B) Bolting", "C) Adhesive bonding", "D) Clamping"], "a": "A) Welding"}, {"topic": "Section 1", "q": "In a welded joint, what does the term \"fillet weld\" refer to?", "o": ["A) A type of welding rod", "B) A type of welding machine", "C) A weld in the shape of a triangle", "D) A weld made by soldering"], "a": "C) A weld in the shape of a triangle"}, {"topic": "Section 1", "q": "Which type of joint is created by using cylindrical pins or bolts to fasten two parts together?", "o": ["A) Welded joint", "B) Riveted joint", "C) Bolted joint", "D) Adhesive joint"], "a": "C) Bolted joint"}, {"topic": "Section 1", "q": "What is the primary function of a keyway in mechanical assemblies?", "o": ["A) To provide lubrication", "B) To measure tolerances", "C) To prevent corrosion", "D) To transmit torque"], "a": "D) To transmit torque"}, {"topic": "Section 1", "q": "In engineering, what does the term \"tolerance\" refer to?", "o": ["A) The ability of a material to withstand stress", "B) The permissible variation in a dimension or property", "C) The resistance to wear and tear", "D) The degree of surface finish"], "a": "B) The permissible variation in a dimension or property"}, {"topic": "Section 1", "q": "What is the function of a nut in a bolted joint?", "o": ["A) To provide smooth movement", "B) To prevent corrosion", "C) To apply axial load or clamping force", "D) To provide aesthetics"], "a": "C) To apply axial load or clamping force"}, {"topic": "Section 1", "q": "What does \"Surface finish\" refer to in machine drawing?", "o": ["A) The final color of a product", "B) The appearance of a surface", "C) The texture and smoothness of a surface after machining", "D) The type of material used in manufacturing"], "a": "C) The texture and smoothness of a surface after machining"}, {"topic": "Section 1", "q": "What is the purpose of using limits and fits in machine design?", "o": ["A) To specify the overall size of a part", "B) To ensure that parts are interchangeable and have the desired clearance or interference", "C) To determine the material composition of a part", "D) To establish the surface finish requirements"], "a": "B) To ensure that parts are interchangeable and have the desired clearance or interference"}, {"topic": "Section 1", "q": "What type of line is used to represent a hidden or concealed edge in a machine drawing?", "o": ["A) Continuous thin line", "B) Continuous thick line", "C) Dashed line", "D) Zigzag line"], "a": "C) Dashed line"}, {"topic": "Section 1", "q": "Which of the following views in a multiview drawing typically shows the most detail of an object?", "o": ["A) Front view", "B) Top view", "C) Right-side view", "D) Isometric view"], "a": "A) Front view"}, {"topic": "Section 1", "q": "In a welding symbol, what does a circle on the arrow's tail indicate?", "o": ["A) A fillet weld", "B) A groove weld", "C) A plug weld", "D) A spot weld"], "a": "A) A fillet weld"}, {"topic": "Section 1", "q": "Which welding process uses a consumable wire electrode to join metals?", "o": ["A) TIG welding", "B) MIG welding", "C) Stick welding", "D) Arc welding"], "a": "B) MIG welding"}, {"topic": "Section 1", "q": "What is the main advantage of using riveted joints in structural applications?", "o": ["A) Easy disassembly", "B) High shear strength", "C) Low cost", "D) High fatigue resistance"], "a": "B) High shear strength"}, {"topic": "Section 1", "q": "In a rivet symbol, what does the number \"3/8\" represent in \"3/8 - 16\"?", "o": ["A) The rivet material", "B) The rivet diameter in inches", "C) The number of rivets", "D) The pitch between rivets"], "a": "B) The rivet diameter in inches"}, {"topic": "Section 1", "q": "Which type of thread engagement provides the highest resistance to vibration loosening?", "o": ["A) Full thread engagement", "B) Partial thread engagement", "C) No thread engagement", "D) Deep thread engagement"], "a": "A) Full thread engagement"}, {"topic": "Section 1", "q": "What is the purpose of a lock washer in a fastener assembly?", "o": ["A) To prevent over-tightening", "B) To improve corrosion resistance", "C) To create a seal", "D) To prevent loosening due to vibration"], "a": "D) To prevent loosening due to vibration"}, {"topic": "Section 1", "q": "In a keyed assembly, what is the function of the key?", "o": ["A) To transmit torque", "B) To provide corrosion protection", "C) To align parts", "D) To act as a bearing"], "a": "A) To transmit torque"}, {"topic": "Section 1", "q": "Which type of key is used when the keyway is cut in the hub and the key slides through the shaft?", "o": ["A) Woodruff key", "B) Square key", "C) Sunk key", "D) Tapered key"], "a": "A) Woodruff key"}, {"topic": "Section 1", "q": "What is the purpose of specifying a tolerance in a mechanical drawing?", "o": ["A) To indicate the maximum size of a part", "B) To ensure parts are manufactured to exact dimensions", "C) To allow for variations in part dimensions", "D) To identify the material type"], "a": "C) To allow for variations in part dimensions"}, {"topic": "Section 1", "q": "In a \"H7/g6\" fit, what does \"H7\" represent?", "o": ["A) The lower deviation", "B) The upper deviation", "C) The nominal size", "D) The basic size"], "a": "C) The nominal size"}, {"topic": "Section 1", "q": "Which parameter is used to specify the smoothness of a surface finish?", "o": ["A) Ra (Roughness Average)", "B) Rz (Average Roughness Depth)", "C) RPM (Rotations Per Minute)", "D) PSI (Pounds per Square Inch)"], "a": "A) Ra (Roughness Average)"}, {"topic": "Section 1", "q": "Which surface finish symbol represents a smooth, polished surface?", "o": ["A) \u2295", "B) \u25bc", "C) \u25b3", "D) \u25bd"], "a": "A) \u2295"}, {"topic": "Section 1", "q": "What is the purpose of a mechanical drawing?", "o": ["A) To provide instructions for machine operation", "B) To create a work of art", "C) To communicate design and manufacturing information", "D) To entertain engineers"], "a": "C) To communicate design and manufacturing information"}, {"topic": "Section 1", "q": "Which of the following types of joints is commonly used in steel structures for joining two pieces of metal using a heated, molten filler material?", "o": ["A) Welded joint", "B) Riveted joint", "C) Bolted joint", "D) Adhesive joint"], "a": "A) Welded joint"}, {"topic": "Section 1", "q": "In a riveted joint, what is the name of the cylindrical metal pin used to connect two plates?", "o": ["A) Bolt", "B) Nut", "C) Screw", "D) Rivet"], "a": "D) Rivet"}, {"topic": "Section 1", "q": "Which type of fastener is primarily used for temporary connections that require frequent disassembly and reassembly?", "o": ["A) Bolt", "B) Nut", "C) Screw", "D) Rivet"], "a": "C) Screw"}, {"topic": "Section 1", "q": "What is the purpose of a keyway in mechanical engineering?", "o": ["A) To provide ventilation in a machine", "B) To reduce friction between moving parts", "C) To connect two rotating parts, such as a shaft and a gear", "D) To store spare keys for the workshop"], "a": "C) To connect two rotating parts, such as a shaft and a gear"}, {"topic": "Section 1", "q": "What term describes the permissible variation in dimensions and geometry for a part?", "o": ["A) Precision", "B) Tolerance", "C) Accuracy", "D) Conformity"], "a": "B) Tolerance"}, {"topic": "Section 1", "q": "In a shaft-hole assembly, what is the function of the \"interference fit\"?", "o": ["A) To allow for easy disassembly", "B) To create a loose connection", "C) To maximize clearance", "D) To create a tight, press-fit connection"], "a": "D) To create a tight, press-fit connection"}, {"topic": "Section 1", "q": "Which of the following is a measure of the roughness or smoothness of a surface?", "o": ["A) Color", "B) Texture", "C) Surface finish", "D) Hardness"], "a": "C) Surface finish"}, {"topic": "Section 1", "q": "What does GD&T stand for in the context of engineering drawings?", "o": ["A) Good Design and Tolerance", "B) General Drafting Techniques", "C) Geometric Dimensioning and Tolerancing", "D) Graphical Data Transfer"], "a": "C) Geometric Dimensioning and Tolerancing"}, {"topic": "Section 1", "q": "What is the purpose of a limit in a tolerance specification?", "o": ["A) To set a minimum acceptable value", "B) To provide a range of acceptable values", "C) To indicate a maximum allowable value", "D) To specify an exact value"], "a": "B) To provide a range of acceptable values"}, {"topic": "Section 1", "q": "What is the yield strength of a material?", "o": ["A) The maximum stress a material can withstand without permanent deformation.", "B) The stress at which a material breaks.", "C) The stress when a material undergoes a change in phase.", "D) The stress at which a material conducts electricity."], "a": "A) The maximum stress a material can withstand without permanent deformation."}, {"topic": "Section 1", "q": "Which of the following materials is typically used for high-temperature applications due to its resistance to creep?", "o": ["A) Aluminum", "B) Steel", "C) Titanium", "D) Superalloys"], "a": "D) Superalloys"}, {"topic": "Section 1", "q": "Fatigue failure in a material is characterized by:", "o": ["A) Sudden, catastrophic fracture.", "B) Permanent deformation.", "C) Repeated cyclic loading leading to failure.", "D) Creep deformation."], "a": "C) Repeated cyclic loading leading to failure."}, {"topic": "Section 1", "q": "What is the primary cause of stress corrosion cracking in metals?", "o": ["A) High temperature", "B) Exposure to ultraviolet (UV) radiation", "C) Exposure to a corrosive environment and tensile stress", "D) Rapid cooling"], "a": "C) Exposure to a corrosive environment and tensile stress"}, {"topic": "Section 1", "q": "What is the purpose of a Charpy impact test?", "o": ["A) To measure a material's hardness.", "B) To evaluate a material's resistance to creep.", "C) To assess a material's toughness and resistance to sudden impact loading.", "D) To measure the electrical conductivity of a material."], "a": "C) To assess a material's toughness and resistance to sudden impact loading."}, {"topic": "Section 1", "q": "Which property of a material is related to its ability to return to its original shape after deformation?", "o": ["A) Elasticity", "B) Toughness", "C) Hardness", "D) Creep resistance"], "a": "A) Elasticity"}, {"topic": "Section 1", "q": "Which material property indicates a material's ability to resist scratching and wear?", "o": ["A) Ductility", "B) Elastic modulus", "C) Hardness", "D) Toughness"], "a": "C) Hardness"}, {"topic": "Section 1", "q": "Creep is a time-dependent deformation that occurs under:", "o": ["A) Static, constant load.", "B) Dynamic, fluctuating load.", "C) Cyclic loading conditions.", "D) Impact loading."], "a": "A) Static, constant load."}, {"topic": "Section 1", "q": "What is the primary purpose of a tensile test on a material specimen?", "o": ["A) To measure the material's weight.", "B) To evaluate the material's ductility and strength.", "C) To assess the material's electrical conductivity.", "D) To determine the material's resistance to thermal expansion."], "a": "B) To evaluate the material's ductility and strength."}, {"topic": "Section 1", "q": "What is the purpose of a Charpy impact test?", "o": ["A) To measure tensile strength", "B) To evaluate fatigue resistance", "C) To assess impact toughness", "D) To determine corrosion resistance"], "a": "C) To assess impact toughness"}, {"topic": "Section 1", "q": "Which mechanical property represents a material's ability to withstand deformation without breaking?", "o": ["A) Hardness", "B) Elasticity", "C) Ductility", "D) Brittleness"], "a": "C) Ductility"}, {"topic": "Section 1", "q": "Creep in materials is primarily related to which of the following factors?", "o": ["A) Sudden load application", "B) Repeated loading and unloading", "C) Time and temperature", "D) Material composition"], "a": "C) Time and temperature"}, {"topic": "Section 1", "q": "What type of fracture is characterized by a slow, progressive crack propagation with little or no plastic deformation?", "o": ["A) Ductile fracture", "B) Creep fracture", "C) Fatigue fracture", "D) Brittle fracture"], "a": "D) Brittle fracture"}, {"topic": "Section 1", "q": "Which alloying element is commonly added to steel to improve its resistance to corrosion?", "o": ["A) Chromium", "B) Nickel", "C) Copper", "D) Zinc"], "a": "A) Chromium"}, {"topic": "Section 1", "q": "The fatigue life of a material is affected by which of the following factors?", "o": ["A) Static loading only", "B) Stress amplitude and mean stress", "C) Material hardness", "D) Temperature"], "a": "B) Stress amplitude and mean stress"}, {"topic": "Section 1", "q": "What is the primary reason for conducting tensile testing on a material?", "o": ["A) To measure hardness", "B) To evaluate impact toughness", "C) To determine the yield strength", "D) To assess the material's tensile properties"], "a": "D) To assess the material's ) The pressure of a gas at standard conditions", "D) The enthalpy of a substance"], "a": "A) The mass per unit volume"}, {"topic": "Section 2", "q": "In a two-phase system, what is happening to the substance?", "o": ["A) It is in a single phase.", "B) It is undergoing a phase change.", "C) It is at a constant temperature.", "D) It is in thermal equilibrium."], "a": "B) It is undergoing a phase change."}, {"topic": "Section 2", "q": "How is the quality (x) of a two-phase mixture defined?", "o": ["A) The percentage of the mixture that is in the gaseous phase", "B) The molar mass of the mixture", "C) The total volume of the mixture", "D) The pressure of the mixture"], "a": "A) The percentage of the mixture that is in the gaseous phase"}, {"topic": "Section 2", "q": "How are property charts and tables useful in thermodynamics?", "o": ["A) They provide recipes for cooking thermodynamic systems.", "B) They allow for easy plotting of graphs.", "C) They provide a visual representation of thermodynamic properties.", "D) They offer a historical perspective on thermodynamics."], "a": "C) They provide a visual representation of thermodynamic properties"}, {"topic": "Section 2", "q": "What is a system in thermodynamics?", "o": ["A) A specific amount of matter", "B) The surroundings of a process", "C) Both a and b", "D) Neither a nor b"], "a": "A) A specific amount of matter"}, {"topic": "Section 2", "q": "Which of the following is a state function in thermodynamics?", "o": ["A) Work", "B) Heat", "C) Internal energy", "D) Enthalpy"], "a": "C) Internal energy"}, {"topic": "Section 2", "q": "What is the Zeroth Law of Thermodynamics?", "o": ["A) Energy cannot be created or destroyed", "B) Heat always flows from a hot body to a cold body", "C) If two systems are in thermal equilibrium with a third system, they are in thermal equilibrium with each other", "D) Entropy of an isolated system always increases"], "a": "C) If two systems are in thermal equilibrium with a third system, they ic": "Section 2", "q": "In an isothermal process, which of the following is true?", "o": ["A) Temperature remains constant", "B) Pressure remains constant", "C) Volume remains constant", "D) Internal energy remains constant"], "a": "A) Temperature remains constant"}, {"topic": "Section 2", "q": "In an isobaric process, which of the following is true?", "o": ["A) Pressure remains constant", "B) Temperature remains constant", "C) Volume remains constant", "D) Internal energy remains constant"], "a": "A) Pressure remains constant"}, {"topic": "Section 2", "q": "In an isochoric process, which of the following is true?", "o": ["A) Volume remains constant", "B) Pressure remains constant", "C) Temperature remains constant", "D) Internal energy remains constant"], "a": "A) Volume remains constant"}, {"topic": "Section 2", "q": "In an adiabatic process, which of the following is true?", "o": ["A) Heat transfer (Q) is zero", "B) Work done (W) is zero", "C) Pressure remains constant", "D) Volume remains constant"], "a": "A) Heat transfer (Q) is zero"}, {"topic": "Section 2", "q": "In a polytropic process with the index 'n,' which of the following is true?", "o": ["A) The process is isothermal (n = 1)", "B) The process is isobaric (n = 0)", "C) The process is adiabatic (n = \u221e)", "D) The process is isochoric (n = -1)"], "a": "A) The process is isothermal (n = 1)"}, {"topic": "Section 2", "q": "Which of the following best describes a steady-state process?", "o": ["A) All properties remain constant over time", "B) Properties vary with time", "C) Properties vary with space", "D) Properties remain constant over space"], "a": "C) Properties vary with space"}, {"topic": "Section 2", "q": "Which of the following best describes an unsteady-state process?", "o": ["A) All properties remain constant over time", "B) Properties vary with time", "C) Properties vary with space", "D) Properties remain constant over space"], "a": "B) Properties vary with time"}, {"topic": "Section 2", "q": "Which law of thermodynamics is associated with the conservation of mass and energy?", "o": ["A) 1st Law", "B) 2nd Law", "C) 3rd Law", "D) Zeroth Law"], "a": "A) 1st Law"}, {"topic": "Section 2", "q": "Which property of a system is a measure of its internal energy?", "o": ["A) Enthalpy", "B) Specific Heat", "C) Pressure", "D) Temperature"], "a": "D) Temperature"}, {"topic": "Section 2", "q": "In which process does the enthalpy of a system remain constant?", "o": ["A) Isothermal process", "B) Adiabatic process", "C) Isobaric process", "D) Isochoric process"], "a": "A) Isothermal process"}, {"topic": "Section 2", "q": "Which type of process involves no heat transfer into or out of the system?", "o": ["A) Isothermal process", "B) Adiabatic process", "C) Isobaric process", "D) Isochoric process"], "a": "B) Adiabatic process"}, {"topic": "Section 2", "q": "What type of process can be described by the equation PV^n = constant, where n is a constant value?", "o": ["A) Isothermal process", "B) Isobaric process", "C) Isochoric process", "D) Polytropic process"], "a": "D) Polytropic process"}, {"topic": "Section 2", "q": "In a steady-state flow process, which of the following is true?", "o": ["A) Properties change with time", "B) Properties remain constant", "C) Properties change but not with time", "D) Properties are undefined"], "a": "B) Properties remain constant"}, {"topic": "Section 2", "q": "In an unsteady state work application, which of the following is true?", "o": ["A) Work is constant with time", "B) Work is undefined", "C) Work changes with time", "D) Work is zero"], "a": "C) Work changes with time"}, {"topic": "Section 2", "q": "What does the 1st Law of Thermodynamics state?", "o": ["A) Conservation of energy only", "B) Conservation of mass only", "C) Conservation of both mass and energy", "D) Conservation of volume only"], "a": "C) Conservation of both mass and energy"}, {"topic": "Section 2", "q": "Which of the following best defines internal energy in a thermodynamic system?", "o": ["A) The total energy of a system", "B) The energy associated with the motion of molecules within the system", "C) The energy transferred as heat", "D) The energy associated with the external work done by the system"], "a": "B) The energy associated with the motion of molecules within the system"}, {"topic": "Section 2", "q": "Enthalpy is defined as:", "o": ["A) The internal energy minus the pressure times volume", "B) The internal energy plus the product of pressure and volume", "C) The heat transferred at constant pressure", "D) The heat transferred at constant volume"], "a": "B) The internal energy plus the product of pressure and volume"}, {"topic": "Section 2", "q": "What is the specific heat capacity of a substance?", "o": ["A) The heat required to raise the temperature of 1 gram of the substance by 1 degree Celsius", "B) The heat required to raise the temperature of 1 kilogram of the substance by 1 degree Celsius", "C) The heat required to raise the temperature of 1 mole of the substance by 1 degree Celsius", "D) The heat required to raise the temperature of 1 liter of the substance by 1 degree Celsius"], "a": "C) The heat required to raise the temperature of 1 mole of the substance by 1 degree Celsius"}, {"topic": "Section 2", "q": "In an isothermal process, what remains constant?", "o": ["A) Pressure", "B) Volume", "C) Temperature", "D) Internal energy"], "a": "C) Temperature"}, {"topic": "Section 2", "q": "In an isobaric process, what remains constant?", "o": ["A) Temperature", "B) Volume", "C) Pressure", "D) Internal energy"], "a": "C) Pressure"}, {"topic": "Section 2", "q": "Which process involves no heat transfer into or out of the system?", "o": ["A) Isothermal process", "B) Adiabatic process", "C) Isobaric process", "D) Isochoric process"], "a": "B) Adiabatic process"}, {"topic": "Section 2", "q": "What is the key characteristic of a polytropic process?", "o": ["A) Constant pressure", "B) Constant volume", "C) Variable heat transfer", "D) Variable specific heat"], "a": "D) Variable specific heat"}, {"topic": "Section 2", "q": "What is the main difference between steady-state and unsteady-state work and flow applications?", "o": ["A) Steady-state involves continuous processes, while unsteady-state is temporary.", "B) Steady-state involves no heat transfer, while unsteady-state does.", "C) Steady-state processes always involve ideal gases, while unsteady-state does not.", "D) Steady-state processes are always isobaric, while unsteady-state processes are isothermal."], "a": "A) Steady-state involves continuous processes, while unsteady-state is temporary."}, {"topic": "Section 2", "q": "Which fundamental principle does the 1st Law of Thermodynamics follow?", "o": ["A) Conservation of mass", "B) Conservation of energy", "C) Conservation of momentum", "D) Conservation of temperature"], "a": "B) Conservation of energy"}, {"topic": "Section 2", "q": "What is internal energy in thermodynamics?", "o": ["A) The energy of an object in motion", "B) The energy contained within a system", "C) The energy associated with an object's position", "D) The energy due to the object's temperature"], "a": "B) The energy contained within a system"}, {"topic": "Section 2", "q": "Enthalpy is defined as:", "o": ["A) The total energy of a closed system", "B) The energy transferred as heat", "C) The energy stored within a system", "D) The sum of internal energy and pressure-volume work"], "a": "D) The sum of internal energy and pressure-volume work"}, {"topic": "Section 2", "q": "Specific heat is a measure of:", "o": ["A) The energy required to raise the temperature of a substance", "B) The heat capacity of a material", "C) The amount of energy transferred in a process", "D) The rate of heat transfer in a system"], "a": "A) The energy required to raise the temperature of a substance"}, {"topic": "Section 2", "q": "During an isothermal process, which of the following statements is true?", "o": ["A) The temperature of the system changes.", "B) The internal energy of the system changes.", "C) The pressure of the system remains constant.", "D) The volume of the system remains constant."], "a": "A) The temperature of the system changes."}, {"topic": "Section 2", "q": "In an isobaric process, what remains constant?", "o": ["A) Temperature", "B) Pressure", "C) Volume", "D) Internal energy"], "a": "B) Pressure"}, {"topic": "Section 2", "q": "Which process involves a constant volume, meaning the system doesn't change its volume during the process?", "o": ["A) Isothermal", "B) Isobaric", "C) Isochoric", "D) Adiabatic"], "a": "C) Isochoric"}, {"topic": "Section 2", "q": "In an adiabatic process, which of the following statements is true?", "o": ["A) Heat is transferred into or out of the system.", "B) The process occurs very slowly.", "C) The entropy of the system remains constant.", "D) There is no heat transfer into or out of the system."], "a": "D) There is no heat transfer into or out of the system."}, {"topic": "Section 2", "q": "Which type of process is characterized by the equation PV^n = constant, where n is a constant?", "o": ["A) Isothermal", "B) Isobaric", "C) Isochoric", "D) Polytropic"], "a": "D) Polytropic"}, {"topic": "Section 2", "q": "Steady state work and flow applications in thermodynamics typically refer to processes where:", "o": ["A) The system is isolated from the surroundings.", "B) The system undergoes rapid changes.", "C) There is a continuous and balanced flow of energy or matter.", "D) The system remains at a constant temperature."], "a": "C) There is a continuous and balanced flow of energy or matter."}, {"topic": "Section 2", "q": "What does the 1st Law of Thermodynamics state?", "o": ["A) Conservation of mass and energy", "B) Conservation of energy", "C) Conservation of mass", "D) Conservation of momentum"], "a": "A) Conservation of mass and energy"}, {"topic": "Section 2", "q": "Which property of a substance represents its internal energy?", "o": ["A) Enthalpy", "B) Entropy", "C) Temperature", "D) Specific heat"], "a": "C) Temperature"}, {"topic": "Section 2", "q": "Enthalpy is defined as:", "o": ["A) H = U + PV", "B) H = U - PV", "C) H = U/PV", "D) H = P/U - V"], "a": "A) H = U + PV"}, {"topic": "Section 2", "q": "Specific heat is a measure of a substance's:", "o": ["A) Temperature change", "B) Mass", "C) Thermal conductivity", "D) Energy required to change its temperature"], "a": "D) Energy required to change its temperature"}, {"topic": "Section 2", "q": "In an isothermal process, which of the following remains constant?", "o": ["A) Internal energy", "B) Pressure", "C) Volume", "D) Temperature"], "a": "D) Temperature"}, {"topic": "Section 2", "q": "In an adiabatic process, which of the following is true?", "o": ["A) Heat transfer is zero", "B) Work transfer is zero", "C) Internal energy remains constant", "D) Pressure remains constant"], "a": "A) Heat transfer is zero"}, {"topic": "Section 2", "q": "In a steady-state process, which of the following is true?", "o": ["A) Properties change with time", "B) Properties remain constant", "C) Properties change with position", "D) Properties remain constant with time and position"], "a": "D) Properties remain constant with time and position"}, {"topic": "Section 2", "q": "Which statement is true regarding the 2nd Law of Thermodynamics?", "o": ["A) It states that energy cannot be created or destroyed.", "B) It states that heat always flows from a colder body to a hotter body.", "C) It states that it is impossible to construct a device that operates in a cycle and produces no net effect other than the transfer of heat from a colder body to a hotter body.", "D) It states that all processes are reversible."], "a": "C) It states that it is impossible to construct a device that operates in a cycle and produces no net effect other than the transfer of heat from a colder body to a hotter body."}, {"topic": "Section 2", "q": "What is entropy?", "o": ["A) The measure of the internal energy of a system.", "B) The measure of the disorder or randomness of a system.", "C) The total energy of a system.", "D) The heat added to a system."], "a": "B) The measure of the disorder or randomness of a system."}, {"topic": "Section 2", "q": "An isentropic process is one that is:", "o": ["A) Reversible and adiabatic.", "B) Irreversible and adiabatic.", "C) Reversible and isothermal.", "D) Irreversible and isothermal."], "a": "A) Reversible and adiabatic."}, {"topic": "Section 2", "q": "What is the efficiency of a heat engine?", "o": ["A) The ratio of work done by the engine to the heat input.", "B) The ratio of work done by the engine to the work input.", "C) The ratio of heat input to heat output.", "D) The ratio of temperature difference between the hot and cold reservoirs."], "a": "A) The ratio of work done by the engine to the heat input."}, {"topic": "Section 2", "q": "Which type of process cannot occur in a real-world system?", "o": ["A) Reversible process", "B) Irreversible process", "C) Adiabatic process", "D) Isobaric process"], "a": "A) Reversible process"}, {"topic": "Section 2", "q": "What is the Coefficient of Performance (COP) for a refrigerator?", "o": ["A) The ratio of heat absorbed from the cold reservoir to the work input.", "B) The ratio of heat absorbed from the hot reservoir to the work input.", "C) The ratio of work input to the heat rejected to the hot reservoir.", "D) The ratio of heat rejected to the cold reservoir to the heat absorbed from the hot reservoir."], "a": "D) The ratio of heat rejected to the cold reservoir to the heat absorbed from the hot reservoir."}, {"topic": "Section 2", "q": "What is the maximum theoretical efficiency of a Carnot heat engine operating between two temperature reservoirs?", "o": ["A) 0%", "B) 100%", "C) It depends on the specific working fluid.", "D) It depends on the size of the engine."], "a": "B) 100%"}, {"topic": "Section 2", "q": "Which of the following statements is part of the Kelvin-Planck statement of the second law of thermodynamics?", "o": ["A) Heat cannot spontaneously flow from a colder body to a hotter body.", "B) The entropy of an isolated system always increases over time.", "C) It is impossible to construct a heat engine that operates in a cycle and produces no net work while transferring heat from a single reservoir.", "D) The entropy of a perfect crystal at absolute zero is zero."], "a": "C) It is impossible to construct a heat engine that operates in a cycle and produces no net work while transferring heat from a single reservoir."}, {"topic": "Section 2", "q": "The Clausius statement of the second law of thermodynamics is related to:", "o": ["A) Heat pumps.", "B) Refrigerators.", "C) Carnot cycle.", "D) Isentropic processes."], "a": "A) Heat pumps."}, {"topic": "Section 2", "q": "Entropy is a measure of:", "o": ["A) Temperature.", "B) Disorder or randomness.", "C) Internal energy.", "D) Heat transfer."], "a": "B) Disorder or randomness."}, {"topic": "Section 2", "q": "An isentropic process is one that is:", "o": ["A) Reversible and adiabatic.", "B) Irreversible and isothermal.", "C) Reversible and isothermal.", "D) Irreversible and adiabatic."], "a": "A) Reversible and adiabatic."}, {"topic": "Section 2", "q": "The efficiency of a Carnot engine operating between two temperature reservoirs is highest when:", "o": ["A) The temperature of the hot reservoir is high.", "B) The temperature of the cold reservoir is low.", "C) The temperature difference between the two reservoirs is small.", "D) The engine operates at maximum power."], "a": "B) The temperature of the cold reservoir is low."}, {"topic": "Section 2", "q": "Which of the following is a statement of the Kelvin-Planck statement of the 2nd Law of Thermodynamics?", "o": ["A) Heat flows from a hot object to a cold object spontaneously.", "B) It is impossible to construct a device that operates in a cycle and extracts heat from a single reservoir to do an equivalent amount of work.", "C) Entropy of an isolated system always decreases.", "D) The total energy in a closed system is conserved."], "a": "B) It is impossible to construct a device that operates in a cycle and extracts heat from a single reservoir to do an equivalent amount of work."}, {"topic": "Section 2", "q": "What is the Clausius statement of the 2nd Law of Thermodynamics?", "o": ["A) Heat always flows from a hot object to a cold object.", "B) It is impossible to create a perpetual motion machine.", "C) The entropy of an isolated system always increases.", "D) The temperature of a closed system always decreases."], "a": "C) The entropy of an isolated system always increases."}, {"topic": "Section 2", "q": "What is entropy in thermodynamics?", "o": ["A) A measure of the disorder or randomness of a system.", "B) A measure of the temperature of a system.", "C) A measure of the pressure of a system.", "D) A measure of the energy content of a system."], "a": "A) A measure of the disorder or randomness of a system."}, {"topic": "Section 2", "q": "Which type of process is characterized by constant entropy?", "o": ["A) Isobaric process", "B) Isothermal process", "C) Isentropic process", "D) Isenthalpic process"], "a": "C) Isentropic process"}, {"topic": "Section 2", "q": "In a reversible process, which of the following is true?", "o": ["A) The process occurs infinitely slowly.", "B) The process is always isothermal.", "C) The process is irreversible.", "D) The entropy of the system decreases."], "a": "A) The process occurs infinitely slowly."}, {"topic": "Section 2", "q": "What is the coefficient of performance (COP) for a refrigerator?", "o": ["A) The ratio of work input to the heat absorbed from the inside of the refrigerator.", "B) The ratio of work input to the heat rejected to the surroundings.", "C) The ratio of heat absorbed from the inside of the refrigerator to the work input.", "D) The ratio of heat rejected to the surroundings to the heat absorbed from the inside of the refrigerator."], "a": "C) The ratio of heat absorbed from the inside of the refrigerator to the work input."}, {"topic": "Section 2", "q": "What is the efficiency of a Carnot engine operating between two reservoirs at temperatures T_H (hot) and T_C (cold)?", "o": ["A) 100%", "B) (T_H - T_C) / T_H", "C) T_H / (T_H - T_C)", "D) T_C / T_H"], "a": "C) T_H / (T_H - T_C)"}, {"topic": "Section 2", "q": "What does the Kelvin-Planck statement of the 2nd Law of Thermodynamics state?", "o": ["A) Heat cannot be transferred from a cold reservoir to a hot reservoir.", "B) It is impossible to construct a perpetual motion machine of the first kind.", "C) Total energy of the universe is constant.", "D) Entropy always decreases in an isolated system."], "a": "B) It is impossible to construct a perpetual motion machine of the first kind."}, {"topic": "Section 2", "q": "What does the Clausius statement of the 2nd Law of Thermodynamics state?", "o": ["A) Heat cannot be transferred from a hot reservoir to a cold reservoir.", "B) It is impossible to construct a perpetual motion machine of the second kind.", "C) Heat is always transferred from a cold body to a hot body.", "D) Entropy always decreases in a closed system."], "a": "A) Heat cannot be transferred from a hot reservoir to a cold reservoir."}, {"topic": "Section 2", "q": "Which of the following is a state function related to the 2nd Law of Thermodynamics?", "o": ["A) Temperature", "B) Pressure", "C) Enthalpy", "D) Entropy"], "a": "D) Entropy"}, {"topic": "Section 2", "q": "An isentropic process is one that is:", "o": ["A) Reversible and adiabatic", "B) Irreversible and adiabatic", "C) Reversible and isobaric", "D) Irreversible and isothermal"], "a": "A) Reversible and adiabatic"}, {"topic": "Section 2", "q": "What is the efficiency of a Carnot heat engine operating between two reservoirs at temperatures T_H and T_C?", "o": ["A) 1 - (T_C / T_H)", "B) (T_H - T_C) / T_H", "C) (T_H / T_C) - 1", "D) T_H / (T_H - T_C)"], "a": "A) 1 - (T_C / T_H)"}, {"topic": "Section 2", "q": "What is the coefficient of performance (COP) of a refrigerator?", "o": ["A) 1 - (T_C / T_H)", "B) (T_H - T_C) / T_H", "C) (T_H / T_C) - 1", "D) T_C / (T_H - T_C)"], "a": "B) (T_H - T_C) / T_H"}, {"topic": "Section 2", "q": "What is the second law of thermodynamics primarily concerned with?", "o": ["A) Heat transfer", "B) Energy conservation", "C) Entropy", "D) Temperature"], "a": "C) Entropy"}, {"topic": "Section 2", "q": "The Kelvin-Planck statement of the second law of thermodynamics is related to:", "o": ["A) Entropy change", "B) Conservation of energy", "C) Irreversible processes", "D) Temperature gradients"], "a": "C) Irreversible processes"}, {"topic": "Section 2", "q": "The Clausius statement of the second law of thermodynamics is related to:", "o": ["A) Entropy change", "B) Conservation of energy", "C) Reversible processes", "D) Temperature gradients"], "a": "A) Entropy change"}, {"topic": "Section 2", "q": "Which of the following is an example of an isentropic process?", "o": ["A) Adiabatic compression", "B) Isothermal expansion", "C) Constant volume heating", "D) Constant pressure cooling"], "a": "A) Adiabatic compression"}, {"topic": "Section 2", "q": "The efficiency of a heat engine is defined as:", "o": ["A) The ratio of heat input to work output", "B) The ratio of work input to heat output", "C) The ratio of work output to heat input", "D) The ratio of temperature change to heat input"], "a": "C) The ratio of work output to heat input"}, {"topic": "Section 2", "q": "A reversible process in thermodynamics is one that:", "o": ["A) Occurs very slowly", "B) Happens spontaneously", "C) Cannot be analyzed", "D) Violates the second law"], "a": "A) Occurs very slowly"}, {"topic": "Section 2", "q": "In a refrigerator, the coefficient of performance (COP) is defined as:", "o": ["A) The ratio of work input to heat output", "B) The ratio of heat input to work output", "C) The ratio of work output to heat input", "D) The ratio of temperature change to work input"], "a": "A) The ratio of heat input to work output"}, {"topic": "Section 2", "q": "The Carnot cycle is an idealized thermodynamic cycle that:", "o": ["A) Operates with 100% efficiency", "B) Has a constant temperature during isentropic processes", "C) Consists of two isobaric and two isochoric processes", "D) Cannot be implemented in practice"], "a": "D) Cannot be implemented in practice"}, {"topic": "Section 2", "q": "What is the Kelvin-Planck statement of the second law of thermodynamics?", "o": ["A) Heat cannot be completely converted into work in a cyclic process.", "B) It is impossible to reach absolute zero temperature.", "C) The total entropy of an isolated system always increases.", "D) Energy can neither be created nor destroyed."], "a": "A) Heat cannot be completely converted into work in a cyclic process."}, {"topic": "Section 2", "q": "Which statement is true regarding the Clausius statement of the second law of thermodynamics?", "o": ["A) Heat cannot be transferred from a colder body to a hotter body without external work being done on the system.", "B) Heat can flow from a colder body to a hotter body spontaneously.", "C) The total entropy of an isolated system always decreases.", "D) Energy is conserved in all processes."], "a": "A) Heat cannot be transferred from a colder body to a hotter body without external work being done on the system."}, {"topic": "Section 2", "q": "Entropy is a measure of:", "o": ["A) Energy content of a system.", "B) Disorder or randomness in a system.", "C) Temperature of a system.", "D) Pressure of a system."], "a": "B) Disorder or randomness in a system."}, {"topic": "Section 2", "q": "An isentropic process is one in which:", "o": ["A) The temperature remains constant.", "B) The pressure remains constant.", "C) The entropy remains constant.", "D) The volume remains constant."], "a": "C) The entropy remains constant."}, {"topic": "Section 2", "q": "The efficiency of a Carnot engine operating between two reservoirs at temperatures T_H and T_C is given by:", "o": ["A) 1 - T_C / T_H", "B) 1 - T_H / T_C", "C) T_H / T_C", "D) T_C / T_H"], "a": "A) 1 - T_C / T_H"}, {"topic": "Section 2", "q": "What is the coefficient of performance (COP) for a heat pump?", "o": ["A) COP = 1 / (1 - T_C / T_H)", "B) COP = 1 - T_C / T_H", "C) COP = T_H / (T_H - T_C)", "D) COP = T_C / (T_H - T_C)"], "a": "A) COP = 1 / (1 - T_C / T_H)"}, {"topic": "Section 2", "q": "In a reversible process, which of the following is true?", "o": ["A) The process occurs spontaneously.", "B) The process is in thermal equilibrium.", "C) There is no change in entropy.", "D) The process is ideal and does not exist in reality."], "a": "B) The process is in thermal equilibrium."}, {"topic": "Section 2", "q": "A refrigerator is a device that:", "o": ["A) Converts heat into work.", "B) Transfers heat from a cold space to a hot space.", "C) Increases the internal energy of a system.", "D) Decreases the temperature of a system."], "a": "B) Transfers heat from a cold space to a hot space."}, {"topic": "Section 2", "q": "Which of the following is a power cycle used in steam power plants?", "o": ["A) Vapour Compression Cycle", "B) Brayton Cycle", "C) Rankine Cycle", "D) Otto Cycle"], "a": "C) Rankine Cycle"}, {"topic": "Section 2", "q": "Which cycle is commonly used in air conditioning and refrigeration systems?", "o": ["A) Rankine Cycle", "B) Brayton Cycle", "C) Vapour Compression Cycle", "D) Otto Cycle"], "a": "C) Vapour Compression Cycle"}, {"topic": "Section 2", "q": "In a Brayton cycle, which substance is typically used as the working fluid?", "o": ["A) Water", "B) Air", "C) Ammonia", "D) Hydrogen"], "a": "B) Air"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is associated with internal combustion engines?", "o": ["A) Rankine Cycle", "B) Brayton Cycle", "C) Otto Cycle", "D) Vapour Absorption Cycle"], "a": "C) Otto Cycle"}, {"topic": "Section 2", "q": "Which of the following cycles is commonly used in large-scale power plants for electricity generation?", "o": ["A) Diesel Cycle", "B) Vapour Compression Cycle", "C) Brayton Cycle", "D) Rankine Cycle"], "a": "D) Rankine Cycle"}, {"topic": "Section 2", "q": "In a refrigeration system, what does COP stand for?", "o": ["A) Coefficient of Performance", "B) Cycle of Power", "C) Compression of Pressure", "D) Cooling Output Potential"], "a": "A) Coefficient of Performance"}, {"topic": "Section 2", "q": "What is the primary goal of a power cycle?", "o": ["A) Cooling", "B) Heating", "C) Generating electricity", "D) Removing moisture"], "a": "C) Generating electricity"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in most power plants to generate electricity?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "A) Rankine cycle"}, {"topic": "Section 2", "q": "In a refrigeration cycle, which refrigerant type typically has a higher Coefficient of Performance (COP)?", "o": ["A) Vapour compression cycle", "B) Vapour absorption cycle", "C) Both have the same COP", "D) It depends on the specific application"], "a": "B) Vapour absorption cycle"}, {"topic": "Section 2", "q": "Which cycle is used in most spark-ignition gasoline engines?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "C) Otto cycle"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in diesel engines?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "D) Diesel cycle"}, {"topic": "Section 2", "q": "In a Brayton cycle, which component is responsible for the compression and expansion of the working fluid?", "o": ["A) Compressor and turbine", "B) Compressor and condenser", "C) Evaporator and compressor", "D) Turbine and condenser"], "a": "A) Compressor and turbine"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in refrigeration systems for air conditioning and cooling?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Vapour compression cycle"], "a": "D) Vapour compression cycle"}, {"topic": "Section 2", "q": "Which cycle is used in most natural gas power plants and jet engines?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "B) Brayton cycle"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in household refrigerators and air conditioners?", "o": ["A) Rankine cycle", "B) Otto cycle", "C) Brayton cycle", "D) Vapour compression cycle"], "a": "D) Vapour compression cycle"}, {"topic": "Section 2", "q": "In the Rankine cycle, what is the primary working fluid used to generate power in most steam power plants?", "o": ["A) Air", "B) Water", "C) Natural gas", "D) Refrigerant"], "a": "B) Water"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is typically associated with internal combustion engines used in most cars?", "o": ["A) Brayton cycle", "B) Rankine cycle", "C) Otto cycle", "D) Vapour absorption cycle"], "a": "C) Otto cycle"}, {"topic": "Section 2", "q": "What is the main difference between the Brayton cycle and the Rankine cycle?", "o": ["A) The working fluid", "B) The heat source", "C) The presence of a condenser", "D) The compression process"], "a": "A) The working fluid"}, {"topic": "Section 2", "q": "In a refrigeration cycle, what does the Coefficient of Performance (COP) measure?", "o": ["A) Efficiency of power generation", "B) Efficiency of work output", "C) Efficiency of cooling or refrigeration", "D) Efficiency of fuel combustion"], "a": "C) Efficiency of cooling or refrigeration"}, {"topic": "Section 2", "q": "In the Diesel cycle, what is the primary difference compared to the Otto cycle?", "o": ["A) The type of fuel used", "B) The number of strokes per cycle", "C) The presence of a spark plug", "D) The compression ratio"], "a": "A) The type of fuel used"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in most automotive engines?", "o": ["A) Rankine Cycle", "B) Brayton Cycle", "C) Otto Cycle", "D) Diesel Cycle"], "a": "C) Otto Cycle"}, {"topic": "Section 2", "q": "In a Rankine Cycle, what is the primary working fluid used?", "o": ["A) Air", "B) Water or steam", "C) Refrigerant", "D) Hydrogen"], "a": "B) Water or steam"}, {"topic": "Section 2", "q": "Which cycle is typically used for air conditioning and refrigeration systems?", "o": ["A) Brayton Cycle", "B) Rankine Cycle", "C) Vapour Compression Cycle", "D) Otto Cycle"], "a": "C) Vapour Compression Cycle"}, {"topic": "Section 2", "q": "What is the efficiency of the Brayton Cycle used in gas turbines?", "o": ["A) Efficiency is not relevant for the Brayton Cycle.", "B) High efficiency", "C) Medium efficiency", "D) Low efficiency"], "a": "D) Low efficiency"}, {"topic": "Section 2", "q": "Which cycle is associated with compression ignition engines (diesel engines)?", "o": ["A) Brayton Cycle", "B) Rankine Cycle", "C) Otto Cycle", "D) Diesel Cycle"], "a": "D) Diesel Cycle"}, {"topic": "Section 2", "q": "Which of the following cycles has the highest thermal efficiency for power generation?", "o": ["A) Rankine Cycle", "B) Otto Cycle", "C) Brayton Cycle", "D) Diesel Cycle"], "a": "A) Rankine Cycle"}, {"topic": "Section 2", "q": "What is the Coefficient of Performance (COP) for a perfect Carnot Refrigeration Cycle?", "o": ["A) 0", "B) 1", "C) Infinity (\u221e)", "D) It varies with operating conditions"], "a": "C) Infinity (\u221e)"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in steam power plants?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "A) Rankine cycle"}, {"topic": "Section 2", "q": "In a vapor compression refrigeration cycle, which component is responsible for heat rejection?", "o": ["A) Compressor", "B) Condenser", "C) Evaporator", "D) Expansion valve"], "a": "B) Condenser"}, {"topic": "Section 2", "q": "What is the efficiency of the Carnot heat engine operating between two reservoirs at temperatures T1 and T2 (T1 > T2)?", "o": ["A) 100%", "B) (T1 - T2) / T1", "C) (T1 - T2) / T2", "D) T1 / (T1 - T2)"], "a": "B) (T1 - T2) / T1"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in gas turbine engines for aircraft propulsion?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "B) Brayton cycle"}, {"topic": "Section 2", "q": "In an Otto cycle, what is the main factor that affects the efficiency of the engine?", "o": ["A) Compression ratio", "B) Inlet air temperature", "C) Combustion chamber shape", "D) Fuel octane rating"], "a": "A) Compression ratio"}, {"topic": "Section 2", "q": "The Coefficient of Performance (COP) of a heat pump is defined as:", "o": ["A) Work input divided by heat output", "B) Heat input divided by work output", "C) Heat output divided by work input", "D) Work output divided by heat input"], "a": "C) Heat output divided by work input"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in most air conditioning systems and refrigerators?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Vapour compression cycle"], "a": "D) Vapour compression cycle"}, {"topic": "Section 2", "q": "In the Rankine cycle, what is the working fluid typically used in most steam power plants?", "o": ["A) Helium", "B) Water", "C) Ammonia", "D) Carbon dioxide"], "a": "B) Water"}, {"topic": "Section 2", "q": "The efficiency of the Brayton cycle is primarily influenced by:", "o": ["A) Compression ratio", "B) Boiler temperature", "C) Ambient temperature", "D) Specific heat capacity"], "a": "A) Compression ratio"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is associated with spark-ignition gasoline engines?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "C) Otto cycle"}, {"topic": "Section 2", "q": "What is the primary factor that determines the efficiency of the Diesel cycle?", "o": ["A) Compression ratio", "B) Ignition temperature", "C) Fuel-air mixture ratio", "D) Turbine efficiency"], "a": "A) Compression ratio"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is used to evaluate the performance of heat pumps and refrigeration systems?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Vapour compression cycle", "D) Otto cycle"], "a": "C) Vapour compression cycle"}, {"topic": "Section 2", "q": "Which of the following is a power cycle?", "o": ["A) Vapour compression cycle", "B) Rankine cycle", "C) Vapour absorption cycle", "D) Brayton cycle"], "a": "B) Rankine cycle"}, {"topic": "Section 2", "q": "What is the primary purpose of a refrigeration cycle?", "o": ["A) To produce electricity", "B) To transfer heat from a cold reservoir to a hot reservoir", "C) To generate high-temperature steam", "D) To convert mechanical work into heat"], "a": "B) To transfer heat from a cold reservoir to a hot reservoir"}, {"topic": "Section 2", "q": "In a vapor compression refrigeration cycle, which component is responsible for cooling the refrigerant and turning it into a liquid?", "o": ["A) Compressor", "B) Condenser", "C) Evaporator", "D) Expansion valve"], "a": "B) Condenser"}, {"topic": "Section 2", "q": "The efficiency of a Rankine cycle is primarily determined by:", "o": ["A) The temperature of the working fluid at the boiler inlet", "B) The pressure of the working fluid at the turbine inlet", "C) The type of working fluid used", "D) The temperature of the working fluid at the condenser outlet"], "a": "A) The temperature of the working fluid at the boiler inlet"}, {"topic": "Section 2", "q": "In the Brayton cycle, the working fluid does not undergo a phase change. What is the primary application of the Brayton cycle?", "o": ["A) Power generation", "B) Refrigeration", "C) Air conditioning", "D) Heating water"], "a": "A) Power generation"}, {"topic": "Section 2", "q": "In the Otto cycle, what type of engine is typically used in automotive applications?", "o": ["A) Diesel engine", "B) Steam engine", "C) Gasoline engine", "D) Stirling engine"], "a": "C) Gasoline engine"}, {"topic": "Section 2", "q": "The Coefficient of Performance (COP) is typically used to measure the efficiency of:", "o": ["A) Power cycles", "B) Refrigeration cycles", "C) Both power and refrigeration cycles", "D) Heating systems"], "a": "B) Refrigeration cycles"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is commonly used in power plants to generate electricity?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "A) Rankine cycle"}, {"topic": "Section 2", "q": "What is the primary working fluid used in the Brayton cycle?", "o": ["A) Steam", "B) Air", "C) Water", "D) Ammonia"], "a": "B) Air"}, {"topic": "Section 2", "q": "Which thermodynamic cycle is associated with the operation of spark-ignition (gasoline) engines?", "o": ["A) Rankine cycle", "B) Brayton cycle", "C) Otto cycle", "D) Diesel cycle"], "a": "C) Otto cycle"}, {"topic": "Section 2", "q": "In a refrigeration cycle, what is the purpose of the evaporator?", "o": ["A) To compress the refrigerant", "B) To remove heat from the space being cooled", "C) To reject heat to the surroundings", "D) To control the flow of refrigerant"], "a": "B) To remove heat from the space being cooled"}, {"topic": "Section 2", "q": "What is the main difference between a vapor compression cycle and a vapor absorption cycle?", "o": ["A) The type of refrigerant used", "B) The presence of a compressor", "C) The source of energy for circulation", "D) The number of evaporators and condensers"], "a": "C) The source of energy for circulation"}, {"topic": "Section 2", "q": "What is the primary objective of a power cycle?", "o": ["A) To cool a space", "B) To generate electricity", "C) To heat water", "D) To refrigerate a room"], "a": "B) To generate electricity"}, {"topic": "Section 2", "q": "In a Rankine cycle, what is the efficiency associated with?", "o": ["A) Heat rejection", "B) Heat addition", "C) Isentropic compression", "D) Isentropic expansion"], "a": "B) Heat addition"}, {"topic": "Section 2", "q": "What does COP stand for in the context of refrigeration cycles?", "o": ["A) Compression of Pressure", "B) Coefficient of Performance", "C) Cycle of Power", "D) Cooling Output Power"], "a": "B) Coefficient of Performance"}, {"topic": "Section 2", "q": "What type of fuel is typically used in a spark ignition engine?", "o": ["A) Diesel", "B) Natural gas", "C) Gasoline", "D) Propane"], "a": "C) Gasoline"}, {"topic": "Section 2", "q": "In a spark ignition engine, what is the function of the spark plug?", "o": ["A) To compress the air-fuel mixture", "B) To ignite the air-fuel mixture", "C) To filter the incoming air", "D) To regulate the fuel flow"], "a": "B) To ignite the air-fuel mixture"}, {"topic": "Section 2", "q": "Which component of a compression ignition engine is responsible for the ignition of the air-fuel mixture?", "o": ["A) Carburetor", "B) Injector", "C) Spark plug", "D) Exhaust valve"], "a": "B) Injector"}, {"topic": "Section 2", "q": "What is the main difference between a four-stroke engine and a two-stroke engine?", "o": ["A) The number of cylinders", "B) The type of fuel used", "C) The number of strokes in the engine cycle", "D) The cooling system used"], "a": "C) The number of strokes in the engine cycle"}, {"topic": "Section 2", "q": "In a four-stroke engine, which stroke is responsible for the generation of power?", "o": ["A) Intake stroke", "B) Compression stroke", "C) Power stroke", "D) Exhaust stroke"], "a": "C) Power stroke"}, {"topic": "Section 2", "q": "What is the purpose of the exhaust stroke in a four-stroke engine?", "o": ["A) Intake of air-fuel mixture", "B) Compression of air-fuel mixture", "C) Removal of burned gases", "D) Ignition of the air-fuel mixture"], "a": "C) Removal of burned gases"}, {"topic": "Section 2", "q": "What is the key principle of operation for a spark ignition engine?", "o": ["A) Compression of air-fuel mixture", "B) Ignition of air-fuel mixture by a spark plug", "C) Injection of fuel into the combustion chamber", "D) Exhaust of burned gases"], "a": "B) Ignition of air-fuel mixture by a spark plug"}, {"topic": "Section 2", "q": "In a compression ignition engine, ignition is achieved by:", "o": ["A) A spark plug", "B) High compression of air-fuel mixture", "C) Fuel injection", "D) Exhaust gases"], "a": "B) High compression of air-fuel mixture"}, {"topic": "Section 2", "q": "Which of the following is not a major component of an internal combustion engine?", "o": ["A) Piston", "B) Carburetor", "C) Crankshaft", "D) Camshaft"], "a": "B) Carburetor"}, {"topic": "Section 2", "q": "What is the main function of the crankshaft in an internal combustion engine?", "o": ["A) Ignition of the air-fuel mixture", "B) Mixing air and fuel", "C) Converting reciprocating motion into rotational motion", "D) Controlling the intake and exhaust valves"], "a": "C) Converting reciprocating motion into rotational motion"}, {"topic": "Section 2", "q": "In a four-stroke cycle engine, how many strokes are needed to complete one cycle of operation?", "o": ["A) One", "B) Two", "C) Three", "D) Four"], "a": "D) Four"}, {"topic": "Section 2", "q": "In a two-stroke cycle engine, when does the exhaust stroke occur?", "o": ["A) After the intake stroke", "B) After the compression stroke", "C) After the power stroke", "D) There is no separate exhaust stroke"], "a": "D) There is no separate exhaust stroke"}, {"topic": "Section 2", "q": "What is the primary ignition method in a spark ignition engine?", "o": ["A) Compression ignition", "B) Spark ignition", "C) Glow plug ignition", "D) Steam ignition"], "a": "B) Spark ignition"}, {"topic": "Section 2", "q": "Which component in a spark ignition engine is responsible for creating the spark to ignite the air-fuel mixture?", "o": ["A) Carburetor", "B) Crankshaft", "C) Spark plug", "D) Piston"], "a": "C) Spark plug"}, {"topic": "Section 2", "q": "In a compression ignition engine, what is used to ignite the air-fuel mixture?", "o": ["A) Spark plug", "B) Carburetor", "C) Injector", "D) Glow plug"], "a": "C) Injector"}, {"topic": "Section 2", "q": "Which engine cycle consists of four distinct phases - intake, compression, power, and exhaust?", "o": ["A) Two-stroke cycle", "B) Otto cycle", "C) Diesel cycle", "D) Four-stroke cycle"], "a": "D) Four-stroke cycle"}, {"topic": "Section 2", "q": "Which component of an internal combustion engine is responsible for drawing in the air-fuel mixture from the environment during the intake phase?", "o": ["A) Camshaft", "B) Carburetor", "C) Exhaust valve", "D) Piston"], "a": "B) Carburetor"}, {"topic": "Section 2", "q": "What is the primary difference between a four-stroke cycle engine and a two-stroke cycle engine?", "o": ["A) The number of strokes in the cycle", "B) The type of fuel used", "C) The number of cylinders", "D) The engine size"], "a": "A) The number of strokes in the cycle"}, {"topic": "Section 2", "q": "Which of the following engines typically has a simpler design and is commonly used in small, lightweight applications such as chainsaws and mopeds?", "o": ["A) Four-stroke cycle engine", "B) Diesel engine", "C) Two-stroke cycle engine", "D) Wankel engine"], "a": "C) Two-stroke cycle engine"}, {"topic": "Section 2", "q": "What is the primary ignition method used in a spark ignition engine?", "o": ["A) Compression ignition", "B) Electric ignition", "C) Spark ignition", "D) Chemical ignition"], "a": "C) Spark ignition"}, {"topic": "Section 2", "q": "Which type of engine relies on the principle of self-ignition due to high compression ratios?", "o": ["A) Two-stroke engine", "B) Diesel engine", "C) Four-stroke engine", "D) Rotary engine"], "a": "B) Diesel engine"}, {"topic": "Section 2", "q": "In a four-stroke engine, which stroke is responsible for the actual power production?", "o": ["A) Intake stroke", "B) Compression stroke", "C) Power stroke", "D) Exhaust stroke"], "a": "C) Power stroke"}, {"topic": "Section 2", "q": "Which component in an internal combustion engine is responsible for drawing in the air-fuel mixture?", "o": ["A) Camshaft", "B) Piston", "C) Intake valve", "D) Exhaust valve"], "a": "C) Intake valve"}, {"topic": "Section 2", "q": "In a two-stroke engine, how many strokes are needed to complete one cycle of operation?", "o": ["A) 2 strokes", "B) 3 strokes", "C) 4 strokes", "D) 5 strokes"], "a": "A) 2 strokes"}, {"topic": "Section 2", "q": "What type of engine uses a spark plug to ignite the air-fuel mixture?", "o": ["A) Compression Ignition Engine (CI)", "B) Spark Ignition Engine (SI)", "C) Rotary Engine", "D) Diesel Engine"], "a": "B) Spark Ignition Engine (SI)"}, {"topic": "Section 2", "q": "Which component of an internal combustion engine compresses the air-fuel mixture before ignition?", "o": ["A) Piston", "B) Cylinder Head", "C) Crankshaft", "D) Camshaft"], "a": "A) Piston"}, {"topic": "Section 2", "q": "In a compression ignition engine (CI), how is the air-fuel mixture ignited?", "o": ["A) Spark plug", "B) Glow plug", "C) Carburetor", "D) Fuel injector"], "a": "B) Glow plug"}, {"topic": "Section 2", "q": "In a four-stroke cycle engine, how many strokes are required for a complete cycle of operation?", "o": ["A) One stroke", "B) Two strokes", "C) Three strokes", "D) Four strokes"], "a": "D) Four strokes"}, {"topic": "Section 2", "q": "What is the primary advantage of a two-stroke cycle engine over a four-stroke cycle engine?", "o": ["A) Higher fuel efficiency", "B) Simplicity and fewer moving parts", "C) Quieter operation", "D) Better torque output"], "a": "B) Simplicity and fewer moving parts"}, {"topic": "Section 2", "q": "What does HVAC stand for?", "o": ["A) Heating, Ventilation, and Air Conditioning", "B) High Voltage Alternating Current", "C) Hydraulic Valve Adjustment Control", "D) Heat Ventilation Adjustment Circuit"], "a": "A) Heating, Ventilation, and Air Conditioning"},

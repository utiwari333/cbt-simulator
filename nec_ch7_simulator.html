 "B) Combustion (Chain Reaction)"}, {"topic": "Section 1", "q": "How can fire be extinguished?", "o": ["A) By removing heat", "B) By removing oxygen", "C) By removing any one of the elements of the Fire Tetrahedron", "D) By increasing fuel"], "a": "C) By removing any one of the elements of the Fire Tetrahedron"}, {"topic": "Section 1", "q": "Which fire class does water extinguish, and what is its action?", "o": ["A) Fire Class A; Cools", "B) Fire Class B; Excludes Oxygen", "C) Fire Class C; Flame Interference", "D) Fire Class D; Excludes Oxygen"], "a": "A) Fire Class A; Cools"}, {"topic": "Section 1", "q": "What is the action of Dry Powder extinguishing agent?", "o": ["A) Cools", "B) Excludes Oxygen", "C) Flame Interference", "D) All Flame Interference"], "a": "B) Excludes Oxygen"}, {"topic": "Section 1", "q": "Which fire class does Foam extinguish, and what is its action?", "o": ["A) Fire Class A; Cools", "B) Fire Class B; Excludes Oxygen", "C) Fire Class C; Flame Interference", "D) Fire Class D; Excludes Oxygen"], "a": "B) Fire Class B; Excludes Oxygen"}, {"topic": "Section 1", "q": "For which fire classes is Carbon Dioxide (CO2) effective, and what is its action?", "o": ["A) Fire Class A; Cools", "B) Fire Class B, C; Excludes Oxygen", "C) Fire Class C; Flame Interference", "D) Fire Class D; Excludes Oxygen"], "a": "B) Fire Class B, C; Excludes Oxygen"}, {"topic": "Section 1", "q": "In what situations is Vaporizing Liquid commonly used?", "o": ["A) Large industrial fires", "B) Electrical fires", "C) Small fires, motor vehicles", "D) Kitchen fires"], "a": "C) Small fires, motor vehicles"}, {"topic": "Section 1", "q": "Which of the following is a recommended safety guideline for using a drill press?", "o": ["A) Hold the workpiece by hand.", "B) Use any type of shank bits.", "C) Secure bits before turning on the machine.", "D) Drill into the table intentionally."], "a": "C) Secure bits before turning on the machine."}, {"topic": "Section 1", "q": "What action should als act as anodes or cathodes", "D) Uniform corrosion controlled by regular inspection and maintenance."], "a": "C) Wet corrosion where metals act as anodes or cathodes"}, {"topic": "Section 1", "q": "What is the most common type of corrosion, and what are the control measures for it?", "o": ["A) Pitting Corrosion; Regular inspection and maintenance.", "B) Uniform Attack Corrosion; Protective coatings, proper material selection, sacrificial anodes.", "C) Crevice Corrosion; Proper design, corrosion-resistant materials.", "D) Hydrogen Embrittlement; Stress relief treatments, material selection."], "a": "B) Uniform Attack Corrosion; Protective coatings, proper material selection, sacrificial anodes."}, {"topic": "Section 1", "q": "What is the key control measure for preventing Stress Corrosion Cracking (SCC)?", "o": ["A) ?", "B) Using susceptible materials.", "C) Reducing stress levels.", "D) Applying protective coatings."], "a": "B) Reducing stress levels."}, {"topic": "Section 1", "q": "What causes Corrosion in Reinforced Concrete, and how does it affect the structure?", "o": ["A) Chemical reaction with oxygen; Increases mechanical strength.", "B) Presence of microorganisms; Produces corrosive byproducts.", "C) Porosity and cracking of concrete; Allows chemical attack on steel, causing expansive corrosion products.", "D) Combination of mechanical damage and corrosion; Abrasion due to fast-flowing water."], "a": "C) Porosity and cracking of concrete; Allows chemical attack on steel, causing expansive corrosion products."}, {"topic": "Section 1", "q": "What is the primary purpose of Inhibitive Coatings in corrosion prevention?", "o": ["A) Creating a barrier between the electrolyte and metal.", "B) Forming sacrificial layers to protect steel.", "C) Passivating the metal surface to prevent oxidation.", "D) Sacrificing themselves to protect steel."], "a": "C) Passivating the metal surface to prevent oxidation."}, {"topic": "Section 1", "q": "Which type of coating relies on avoiding contact between the electrolyte and the metal for corrosion protection?", "o": ["A) Inhibitive Coatings.", "B) Barrier Coatings.", "C) Sacrificial Coatings.", "D) Vinyl Coatings."], "a": "B) Barrier Coatings."}, {"topic": "Section 1", "q": "What is the primary function of Sacrificial Coatings in corrosion prevention?", "o": ["A) Passivating the metal surface.", "B) Creating a barrier between the electrolyte and metal.", "C) Sacrificing themselves to protect steel.", "D) Forming a thin metal layer."], "a": "C) Sacrificing themselves to protect steel."}, {"topic": "Section 1", "q": "Why are lead and chromate-based paints, as well as coal tar enamel, no longer used for protective coatings?", "o": ["A) They are ineffective against corrosion.", "B) They create a barrier instead of sacrificing.", "C) Environmental and health concerns.", "D) They are expensive."], "a": "C) Environmental and health concerns."}, {"topic": "Section 1", "q": "What is the typical process for applying protective coatings?", "o": ["A) Full coating, primer, sealant.", "B) Surface preparation, primer, full coating, sealant.", "C) Primer, full coating, sealant, surface preparation.", "D) Sealant, surface preparation, full coating, primer."], "a": "B) Surface preparation, primer, full coating, sealant."}, {"topic": "Section 1", "q": "What is the primary objective of Cathodic Protection (CP) in corrosion prevention?", "o": ["A) To create a larger corrosion cell.", "B) To accelerate corrosive attacks.", "C) To make the structure an anode.", "D) To alter the behavior of a metal and resist corrosive attacks."], "a": "D) To alter the behavior of a metal and resist corrosive attacks."}, {"topic": "Section 1", "q": "Which method of Cathodic Protection relies on sacrificial anode systems?", "o": ["A) Impressed Current Cathodic Protection.", "B) Sacrificial Cathodic Protection.", "C) Galvanic Cathodic Protection.", "D) Sacrificial Anodic Protection."], "a": "B) Sacrificial Cathodic Protection."}, {"topic": "Section 1", "q": "What is the function of the sacrificial metal (anode) in Galvanic Cathodic Protection?", "o": ["A) Accelerates corrosion of the cathode.", "B) Creates a larger corrosion cell.", "C) Sacrifices itself through corrosion to protect the structure.", "D) Acts as a barrier to corrosive attacks."], "a": "C) Sacrifices itself through corrosion to protect the structure."}, {"topic": "Section 1", "q": "What is the purpose of the DC current source in Impressed Current Cathodic Protection?", "o": ["A) To accelerate corrosion.", "B) To force current flow from the structure to the anode.", "C) To make the entire structure an anode.", "D) To create a larger corrosion cell."], "a": "B) To force current flow from the structure to the anode."}, {"topic": "Section 1", "q": "Which metals are suitable sacrificial anode metals in Galvanic Cathodic Protection for protecting steels?", "o": ["A) Gold and platinum alloys.", "B) Copper and copper alloys.", "C) Aluminum and aluminum alloys.", "D) Silver and nickel alloys."], "a": "C) Aluminum and aluminum alloys."}, {"topic": "Section 1", "q": "What is a characteristic of Impressed Current Cathodic Protection?", "o": ["A) It is a passive system.", "B) It requires an external power source.", "C) It relies on sacrificial anodes.", "D) It does not discharge current."], "a": "B) It requires an external power source."}, {"topic": "Section 1", "q": "In Impressed Current Cathodic Protection, why is a more noble anode than the structure used?", "o": ["A) To accelerate corrosion.", "B) For longer life of the anode.", "C) To decrease the current discharges.", "D) To make the structure an anode."], "a": "B) For longer life of the anode."}, {"topic": "Section 1", "q": "How is the direction of current flow ensured in Impressed Current Cathodic Protection?", "o": ["A) By disconnecting the rectifier.", "B) By connecting the positive pole of the rectifier to the structure.", "C) By connecting the positive pole of the rectifier to the anodes.", "D) By using sacrificial anodes."], "a": "B) By connecting the positive pole of the rectifier to the structure."}, {"topic": "Section 1", "q": "What type of system is Impressed Current Cathodic Protection?", "o": ["A) Passive system.", "B) Hybrid system.", "C) Active system.", "D) Manual system."], "a": "C) Active system."}, {"topic": "Section 1", "q": "What is the main purpose of Impressed Current Cathodic Protection?", "o": ["A) To accelerate corrosion.", "B) To create a larger corrosion cell.", "C) To resist corrosive attacks passively.", "D) To protect the structure from corrosion actively."], "a": "D) To protect the structure from corrosion actively."}, {"topic": "Section 1", "q": "What does the term \"failure mode\" in engineering refer to?", "o": ["A) The way in which a system functions", "B) The way in which a component is designed", "C) The way in which something might break down", "D) The way in which software functions"], "a": "C) The way in which something might break down"}, {"topic": "Section 1", "q": "Which of the following is NOT one of the broad categories of failures in engineering designs and systems?", "o": ["A) Hardware failure", "B) Software failure", "C) Human failure", "D) Weather-related failure"], "a": "D) Weather-related failure"}, {"topic": "Section 1", "q": "What is a common cause of hardware failure in engineering?", "o": ["A) Overemphasis on quality over cost", "B) Adequate knowledge of service loads and environment", "C) Poor material selection", "D) Proper testing and inspection"], "a": "C) Poor material selection"}, {"topic": "Section 1", "q": "Which mode of hardware failure involves the loss of required part geometry through corrosion or wear?", "o": ["A) Excessive elastic deformation", "B) Excessive plastic deformation", "C) Fracture", "D) Corrosion or wear-induced failure"], "a": "D) Corrosion or wear-induced failure"}, {"topic": "Section 1", "q": "What is the category of failure related to operators not following instructions or responding adequately to emergency situations?", "o": ["A) Hardware failure", "B) Software failure", "C) Human failure", "D) Organizational failure"], "a": "C) Human failure"}, {"topic": "Section 1", "q": "Which category of failure involves overlooking defective components or ignoring bad news?", "o": ["A) Hardware failure", "B) Software failure", "C) Human failure", "D) Organizational failure"], "a": "D) Organizational failure"}, {"topic": "Section 1", "q": "What is the primary goal of designing for safety in product design?", "o": ["A) Maximizing product performance", "B) Minimizing manufacturing costs", "C) Ensuring no injury to humans or the environment", "D) Reducing product complexity"], "a": "C) Ensuring no injury to humans or the environment"}, {"topic": "Section 1", "q": "What is the first step in designing for safety when making a product?", "o": ["A) Design protective devices", "B) Add appropriate warnings", "C) Make the product inherently safe", "D) Focus on aesthetics and design"], "a": "C) Make the product inherently safe"}, {"topic": "Section 1", "q": "What is Mean Time to Repair (MTTR) a measure of?", "o": ["A) The time it takes for a product to fail", "B) The average time between two failures", "C) The speed of maintenance and restoration of equipment", "D) The total time allocated for product operation"], "a": "C) The speed of maintenance and restoration of equipment"}, {"topic": "Section 1", "q": "What is the relationship between repair rate (r) and MTTR (Mean Time to Repair)?", "o": ["A) r = 1 / MTTR", "B) r = MTTR", "C) r = 1 - MTTR", "D) r = MTTR / 2"], "a": "A) r = 1 / MTTR"}, {"topic": "Section 1", "q": "What is the purpose of Mean Time Between Failure (MTBF)?", "o": ["A) To measure the time it takes for a system to fail", "B) To estimate the average time between two failures under specific conditions", "C) To measure the time the system is not running due to unscheduled maintenance", "D) To calculate the total time allocated for product operation"], "a": "B) To estimate the average time between two failures under specific conditions"}, {"topic": "Section 1", "q": "What does the term \"availability\" in the context of maintenance and reliability engineering refer to?", "o": ["A) The proportion of time a system is operating to the total time allocated for operation", "B) The time for which the system is not running due to scheduled maintenance", "C) The speed at which equipment can be repaired", "D) The total time allocated for product operation"], "a": "A) The proportion of time a system is operating to the total time allocated for operation"}, {"topic": "Section 1", "q": "Which process of failure is characterized by failures occurring due to design errors, manufacturing defects, or installation defects, and can be minimized by quality control?", "o": ["A) Early failure process", "B) Random failure process", "C) Wear-out process", "D) Predictable failure process"], "a": "A) Early failure process"}, {"topic": "Section 1", "q": "In which failure process do failures occur with no predictable pattern?", "o": ["A) Early failure process", "B) Random failure process", "C) Wear-out process", "D) Predictable failure process"], "a": "B) Random failure process"}, {"topic": "Section 1", "q": "Which failure process is associated with components aging over time?", "o": ["A) Early failure process", "B) Random failure process", "C) Wear-out process", "D) Predictable failure process"], "a": "C) Wear-out process"}, {"topic": "Section 1", "q": "Which of the three failure processes doesn't have a predictable pattern associated with it?", "o": ["A) Early failure process", "B) Random failure process", "C) Wear-out process", "D) Predictable failure process"], "a": "B) Random failure process"}, {"topic": "Section 1", "q": "What is the formula for the Mean Time Between Failures (MTBF) during the constant hazard rate?", "o": ["A) MTBF = 1 / \u03bb", "B) MTBF = \u03bb * num of failures", "C) MTBF = \u03bb * total operating time", "D) MTBF = num of failures / total operating time"], "a": "A) MTBF = 1 / \u03bb"}, {"topic": "Section 1", "q": "What is the formula for downtime during the constant hazard rate?", "o": ["A) Downtime = \u03bb * num of failures * MTTR", "B) Downtime = \u03bb * total operating time * MTTR", "C) Downtime = \u03bb * total operating time * MTBF", "D) Downtime = \u03bb * total operating time * MTTF"], "a": "B) Downtime = \u03bb * total operating time * MTTR"}, {"topic": "Section 1", "q": "What is the reliability during the constant hazard rate?", "o": ["A) R(t) = exp(\u2212\u03bbt)", "B) R(t) = \u03bb * t", "C) R(t) = 1 / (exp(\u03bbt))", "D) R(t) = \u03bb / (exp(t))"], "a": "A) R(t) = exp(\u2212\u03bbt)"}, {"topic": "Section 1", "q": "In cases of variable failure rates, which distribution is commonly used to express reliability?", "o": ["A) Exponential distribution", "B) Poisson distribution", "C) Weibull distribution", "D) Gaussian distribution"], "a": "C) Weibull distribution"}, {"topic": "Section 1", "q": "Which hazard analysis method involves a forward search technique to identify the effects of individual component failures?", "o": ["A) Fault Tree Analysis (FTA)", "B) Event Tree Analysis (ETA)", "C) Failure Modes and Effects Analysis (FMEA)", "D) Both B and C"], "a": "D) Both B and C"}, {"topic": "Section 1", "q": "In the context of Failure Mode and Effect Analysis (FMEA), what is the initiating event?", "o": ["A) , what is the initiating event?", "B) Component failure", "C) System shutdown", "D) Human error"], "a": "A) Component failure"}, {"topic": "Section 1", "q": "What is the primary goal of Failure Mode and Effect Analysis (FMEA)?", "o": ["A) ?", "B) Identify individual components", "C) Identify failure modes", "D) Identify failure mechanisms (causes)"], "a": "D) Identify the effect of each failure"}, {"topic": "Section 1", "q": "What is one limitation of Failure Mode and Effect Analysis (FMEA)?", "o": ["A) ?", "B) It considers unsafe interactions and design issues.", "C) It efficiently analyzes important and unimportant failures.", "D) It encourages redundancy."], "a": "C) It encourages redundancy."}, {"topic": "Section 1", "q": "What is the top event in Fault Tree Analysis (FTA)?", "o": ["A) ?", "B) The final event", "C) The most common event", "D) The desirable event"], "a": "D) The undesirable event"}, {"topic": "Section 1", "q": "What are cut-sets in the context of FTA?", "o": ["A) The causes of the top event", "B) The combination of basic events sufficient to cause the top-level event", "C) The minimal cut-sets", "D) The initial state/conditions"], "a": "B) The combination of basic events sufficient to cause the top-level event"}, {"topic": "Section 1", "q": "What is one of the strengths of Fault Tree Analysis (FTA) compared to Failure Mode and Effect Analysis (FMEA)?", "o": ["A) compared to Failure Mode and Effect Analysis (FMEA)?", "B) It captures independence between events.", "C) It is less efficient than FMEA.", "D) It captures systemic factors easily."], "a": "D) It captures combinations of failures."}, {"topic": "Section 1", "q": "What is one limitation of Fault Tree Analysis (FTA)?", "o": ["A) ?", "B) It easily captures systemic factors.", "C) It is not labor-intensive.", "D) It assumes independence between events."], "a": "C) It assumes independence between events."}, {"topic": "Section 1", "q": "In Event Tree Analysis (ETA), what is the primary goal?", "o": ["A) , what is the primary goal?", "B) To identify minimal cut-sets", "C) To capture combinations of failures", "D) To identify all possible outcomes"], "a": "C) To identify all possible outcomes"}, {"topic": "Section 1", "q": "What is the initiating event in Event Tree Analysis (ETA)?", "o": ["A) ?", "B) The desirable event", "C) The top event", "D) The component failure"], "a": "C) The component failure"}, {"topic": "Section 1", "q": "What are barriers in the context of ETA?", "o": ["A) The outcomes of the event tree", "B) The causes of the initiating event", "C) The safety functions or protection layers implemented to reduce consequences", "D) The minimal cut-sets"], "a": "C) The safety functions or protection layers implemented to reduce consequences"}, {"topic": "Section 1", "q": "What is the purpose of identifying barriers in ETA?", "o": ["A) To identify the order of events in the event tree", "B) To understand the causes of the initiating event", "C) To identify all possible outcomes", "D) To understand the safety functions and protection layers"], "a": "D) To understand the safety functions and protection layers"}, {"topic": "Section 1", "q": "How does Event Tree Analysis (ETA) differ from Fault Tree Analysis (FTA)?", "o": ["A) differ from Fault Tree Analysis (FTA)?", "B) ETA shows what failed, while FTA shows how failure occurred.", "C) ETA is more complex than FTA.", "D) ETA does not show the order of events, while FTA does."], "a": "A) ETA shows what failed, while FTA shows how failure occurred."}, {"topic": "Section 1", "q": "What is another name for the Fish Bone Diagram?", "o": ["A) Cause and Effect Diagram", "B) Root Cause Analysis", "C) Brainstorming Diagram", "D) Symptom Analysis Diagram"], "a": "A) Cause and Effect Diagram"}, {"topic": "Section 1", "q": "When should you apply the Fish Bone Diagram (Cause and Effect Diagram)?", "o": ["A) When you want to identify symptoms of a problem", "B) When you want to analyze the outcome or effect of a problem", "C) When you want to show the relationship between various factors influencing a problem", "D) When you want to keep the team focused on the symptoms of a problem"], "a": "C) When you want to show the relationship between various factors influencing a problem"}, {"topic": "Section 1", "q": "What is the first step in creating a Fish Bone Diagram?", "o": ["A) Identify the main causes", "B) Analyze the diagram", "C) Draw the spine and create the effect box", "D) Identify the outcome or effect to be analyzed"], "a": "D) Identify the outcome or effect to be analyzed"}, {"topic": "Section 1", "q": "What are the four main categories of causes associated with poor quality on a Fish Bone Diagram?", "o": ["A) Man, Money, Machine, Material", "B) Man, Material, Money, Method", "C) Man, Machine, Method, Material", "D) Man, Method, Material, Money"], "a": "C) Man, Machine, Method, Material"}, {"topic": "Section 1", "q": "How can you identify increasingly more detailed levels of causes while creating a Fish Bone Diagram?", "o": ["A) Draw additional branches for each major branch", "B) Use different colors for each cause category", "C) Ask a series of \"why\" questions", "D) Analyze the diagram"], "a": "C) Ask a series of \"why\" questions"}, {"topic": "Section 1", "q": "What is the primary purpose of a Reliability Block Diagram?", "o": ["A) To show the functional relationship between items in a system", "B) To indicate the number of elements in a system", "C) To show the physical layout of components in a system", "D) To indicate the order of assembly of components in a system"], "a": "A) To show the functional relationship between items in a system"}, {"topic": "Section 1", "q": "What is a Reliability Block Diagram element in series?", "o": ["A) All elements are active when the system is operating", "B) Only one element needs to be up for the group to be up", "C) If one or more elements are down, the whole system is down", "D) Elements are in standby redundancy"], "a": "C) If one or more elements are down, the whole system is down"}, {"topic": "Section 1", "q": "What is an example of elements in active redundancy?", "o": ["A) Four wheels on a lorry's rear suspension, where all must be up for the group to be up", "B) A car with a spare wheel, where the spare can replace a burst tire", "C) Components in a system arranged in a series", "D) Both A and C"], "a": "B) A car with a spare wheel, where the spare can replace a burst tire"}, {"topic": "Section 1", "q": "In a Reliability Block Diagram for components arranged in series, what is the formula for calculating the system reliability (Rsystem) for constant-failure-rate components?", "o": ["A) Rsystem = 1 - (1 - RA) * (1 - RB) * ... * (1 - RN)", "B) Rsystem = exp(-(\u03bbA + \u03bbB)t)", "C) Rsystem = exp(\u2212\u03bbAt) + exp(\u2212\u03bbBt) \u2212 exp(\u2212(\u03bbA + \u03bbB)t)", "D) Rsystem = \u03bb(RA * RB * ... * RN)"], "a": "B) Rsystem = exp(-(\u03bbA + \u03bbB)t)"}, {"topic": "Section 1", "q": "In a Reliability Block Diagram for components arranged in parallel, what is the formula for calculating the system reliability (Rsystem) for constant-failure-rate components?", "o": ["A) Rsystem = 1 - (1 - RA) * (1 - RB) * ... * (1 - RN)", "B) Rsystem = exp(-(\u03bbA + \u03bbB)t", "C) Rsystem = exp(\u2212\u03bbAt) - exp(\u2212\u03bbBt) \u2212 exp(\u2212(\u03bbA + \u03bbB)t)", "D) Rsystem = \u03bb(RA * RB * ... * RN)"], "a": "A) Rsystem = 1 - (1 - RA) * (1 - RB) * ... * (1 - RN)"}];

function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>

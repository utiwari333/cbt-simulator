n planning?", "o": ["A) Managing employee payroll", "B) Scheduling maintenance of machinery", "C) Allocating resources to meet production targets", "D) Handling customer complaints"], "a": "C) Allocating resources to meet production targets"}, {"topic": "Section 1", "q": "What is the primary objective of a Just-In-Time (JIT) production system?", "o": ["A) Minimizing inventory levels", "B) Maximizing production output", "C) Reducing production lead times", "D) Increasing work-in-progress (WIP) inventory"], "a": "A) Minimizing inventory levels"}, {"topic": "Section 1", "q": "What is Economic Order Quantity (EOQ)?", "o": ["A) The maximum quantity of inventory a company can order at one time.", "B) The order quantity that minimizes total inventory holding costs and ordering costs.", "C) The minimum quantity of inventory a company must order to meet demand.", "D) The average inventory level maintained by a company."], "a": "B) The order quantity that minimizes total inventory holding costs and ordering costs."}, {"topic": "Section 1", "q": "What is Safety Stock?", "o": ["A) The stock that is kept for safety purposes, such as for fire emergencies.", "B) Excess inventory that should be sold quickly.", "C) Extra inventory held to protect against uncertainties in demand and lead time.", "D) The inventory stored in a safety deposit box."], "a": "C) Extra inventory held to protect against uncertainties in demand and lead time."}, {"topic": "Section 1", "q": "What is the Reorder Point?", "o": ["A) The point at which you should stop reordering inventory.", "B) The point at which inventory levels are critically low and a reorder is necessary.", "C) The maximum inventory level that should not be exceeded.", "D) The point at which you should reorder more than you need."], "a": "B) The point at which inventory levels are critically low and a reorder is necessary."}, {"topic": "Section 1", "q": "What is Lead Time in inventory management?", "o": ["A) The time it takes to deliver a product to a customer.", "B) The time it takes to produce a product.", "C) The time it takes to reorder inventory.", "D) The time it takes for an order to be delivered after it's placed."], "a": "D) The time it takes for an order to be delivered after it's placed."}, {"topic": "Section 1", "q": "What does ABC Analysis in inventory management involve?", "o": ["A) Categorizing inventory items into three groups based on their importance.", "B) Analyzing the inventory alphabetically by product name.", "C) Classifying inventory items based on their color coding.", "D) Identifying the most expensive items in inventory."], "a": "A) Categorizing inventory items into three groups based on their importance."}, {"topic": "Section 1", "q": "Which of the following is a quantitative forecasting technique?", "o": ["A) Market Research", "B) Delphi Method", "C) Moving Average", "D) Expert Opinion"], "a": "C) Moving Average"}, {"topic": "Section 1", "q": "In inventory management, what does the term \"Ordering Cost\" refer to?", "o": ["A) The cost of placing and receiving orders for inventory.", "B) The cost of holding inventory in storage.", "C) The cost of damaged or obsolete inventory.", "D) The cost of production."], "a": "A) The cost of placing and receiving orders for inventory."}, {"topic": "Section 1", "q": "What does the Economic Order Quantity (EOQ) represent?", "o": ["A) The maximum order quantity to minimize holding costs.", "B) The order quantity that minimizes both ordering and holding costs.", "C) The minimum order quantity to ensure stockouts are avoided.", "D) The order quantity that maximizes reorder frequency."], "a": "B) The order quantity that minimizes both ordering and holding costs."}, {"topic": "Section 1", "q": "Safety stock is used to:", "o": ["A) Maximize inventory turnover.", "B) Minimize carrying costs.", "C) Prevent stockouts due to variability in demand or lead time.", "D) Reduce the reorder point."], "a": "C) Prevent stockouts due to variability in demand or lead time."}, {"topic": "Section 1", "q": "The reorder quantity is:", "o": ["A) The quantity ordered each time inventory reaches the reorder point.", "B) The quantity of safety stock added to the current inventory.", "C) The maximum quantity an organization can order at one time.", "D) The quantity required to reach the Economic Order Quantity (EOQ)."], "a": "A) The quantity ordered each time inventory reaches the reorder point."}, {"topic": "Section 1", "q": "In inventory management, lead time refers to:", "o": ["A) The time it takes to process an order and receive it.", "B) The time it takes to sell an item from inventory.", "C) The time it takes to manufacture a product.", "D) The time it takes to count inventory."], "a": "A) The time it takes to process an order and receive it."}, {"topic": "Section 1", "q": "What does the \"A\" category in ABC analysis represent?", "o": ["A) Items with the highest value and the highest priority.", "B) Items with the lowest value and the lowest priority.", "C) Items with the highest value and the lowest priority.", "D) Items with the lowest value and the highest priority."], "a": "A) Items with the highest value and the highest priority."}, {"topic": "Section 1", "q": "Which forecasting technique relies on past data to predict future values by identifying trends and patterns?", "o": ["A) Exponential Smoothing", "B) Delphi Method", "C) Market Research", "D) Simple Moving Average"], "a": "D) Simple Moving Average"}, {"topic": "Section 1", "q": "What does Economic Order Quantity (EOQ) represent in inventory management?", "o": ["A) The maximum order quantity", "B) The minimum order quantity", "C) The order quantity that minimizes total inventory costs", "D) The order quantity that maximizes total inventory costs"], "a": "C) The order quantity that minimizes total inventory costs"}, {"topic": "Section 1", "q": "Safety stock is used to:", "o": ["A) Reduce lead time", "B) Minimize holding costs", "C) Protect against stockouts due to demand variability", "D) Reduce order quantity"], "a": "C) Protect against stockouts due to demand variability"}, {"topic": "Section 1", "q": "Reorder point is calculated as:", "o": ["A) EOQ + Safety Stock", "B) Safety Stock - EOQ", "C) Demand during lead time + Safety Stock", "D) EOQ - Demand during lead time"], "a": "C) Demand during lead time + Safety Stock"}, {"topic": "Section 1", "q": "Lead time in inventory management represents:", "o": ["A) The time required to sell inventory", "B) The time required to reorder inventory", "C) The time between placing an order and receiving the order", "D) The time between receiving inventory and paying for it"], "a": "C) The time between placing an order and receiving the order"}, {"topic": "Section 1", "q": "In ABC analysis, items are categorized into three classes based on:", "o": ["A) Item size and weight", "B) The cost of the item", "C) The demand for the item", "D) The lead time for the item"], "a": "B) The cost of the item"}, {"topic": "Section 1", "q": "Which forecasting technique relies on historical demand data and weights recent data more heavily?", "o": ["A) Exponential Smoothing", "B) Moving Averages", "C) Delphi Method", "D) Linear Regression"], "a": "A) Exponential Smoothing"}, {"topic": "Section 1", "q": "Which forecasting technique involves experts providing their opinions and estimates on future demand?", "o": ["A) Time Series Analysis", "B) Market Research", "C) Delphi Method", "D) Regression Analysis"], "a": "C) Delphi Method"}, {"topic": "Section 1", "q": "What is the Economic Order Quantity (EOQ) used for in inventory control?", "o": ["A) To minimize carrying costs", "B) To maximize order quantity", "C) To reduce lead time", "D) To maximize safety stock"], "a": "A) To minimize carrying costs"}, {"topic": "Section 1", "q": "Safety stock is used primarily for:", "o": ["A) Minimizing ordering costs", "B) Handling unexpected demand or lead time fluctuations", "C) Reducing holding costs", "D) Maximizing inv function getRandomQuestions(){
    let shuffled = fullQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0,100);
}

var questions = getRandomQuestions();

var current = 0;
var answers = {};
var visited = {};
var marked = {};


// TIMER
var totalTime = 7200;

function startTimer(){
    var timer = setInterval(function(){
        var h = Math.floor(totalTime/3600);
        var m = Math.floor((totalTime%3600)/60);
        var s = totalTime%60;

        document.getElementById("timer").innerText =
        h + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            submitExam(true);
        }
    },1000);
}


// PALETTE
function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>

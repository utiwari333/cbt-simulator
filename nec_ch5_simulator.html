ng , the hypo eutectoid steel is", "o": ["A) Heated from 30 to 50 C above the upper critical temperature and then cooled in still air", "B) Heated from 30 to 50 C above the upper critical temperature and then cooled suddenly in a suitable medium", "C) Heated from 30 to 50 C above the upper critical temperature and then cooled slowly in furnace", "D) Heated below or close to the lower critical temperature and then cooled slowly"], "a": "D) Heated below or close to the lower critical temperature and then cooled slowly"}, {"topic": "Section 1", "q": "The process of producing a component with tough and ductile core and a hard outer surface is known as", "o": ["A) Hardening", "B) Case Hardening", "C) Tempering", "D) Annealing"], "a": "B) Case Hardening"}, {"topic": "Section 1", "q": "Which of the following characteristics is mainly considered for the solidification of castings?", "o": ["A) Appearance", "B) Crystal structure", "C) Moulding capacity", "D) Surface finish"], "a": "B) Crystal structure"}, {"topic": "Section 1", "q": "What is powder metallurgy?", "o": ["A) Production and working of metals as fine powders", "B) Working with metals as fine powders", "C) Methods for utilizing metals as fine powders", "D) None of the mentioned"], "a": "A) Production and working of metals as fine powders"}, {"topic": "Section 1", "q": "Porous product can be effectively produced using", "o": ["A) casting", "B) forging", "C) turning", "D) powder metallurgy"], "a": "D) powder metallurgy"}, {"topic": "Section 1", "q": "Which of the following components can be manufactured by powder metallurgy technique?", "o": ["A) Cams", "B) Engine disks", "C) Connecting rods", "D) All of these"], "a": "D) All of these"}, {"topic": "Section 1", "q": "The particles shapes influences", "o": ["A) Flowability of powders", "B) Packing efficiency", "C) Interaction with fluids", "D) All of these"], "a": "D) All of these"}, {"topic": "Section 1", "q": "Cyaniding is the process of", "o": ["A) Dipping steel in rface is hard"}, {"topic": "Section 1", "q": "Out of following _______ is not a surface hardening process.", "o": ["A) flame hardening", "B) Martempering", "C) Cyaniding", "D) nitriding"], "a": "B) Martempering"}, {"topic": "Section 1", "q": "The temperatures for nitriding is ______ degree C.", "o": ["A) 900", "B) 550", "C) 850", "D) 650"], "a": "B) 550"}, {"topic": "Section 1", "q": "Cyaniding is not used for ________", "o": ["A) large shape components", "B) small shape components", "C) both of the above", "D) none of the above"], "a": "A) large shape components"}, {"topic": "Section 1", "q": "When steel is normalized , its", "o": ["A) yield point increases", "B) Ductility decreases", "C) Ultimate tensile strength increases", "D) All of the above"], "a": "D) All of the above"}, {"topic": "Section 1", "q": "In the process of hardening of steel, the metal has to be heated to a temperature ______ the critical range.", "o": ["A) below", "B) half", "C) above", "D) around"], "a": "C) above"}, {"topic": "Section 1", "q": "The heat treatment process used for softening hardened steel is", "o": ["A) Nitriding", "B) Normilising", "C) Annealing", "D) Tempering"], "a": "C) Annealing"}, {"topic": "Section 1", "q": "What is the purpose of tempering steel ?", "o": ["A) To reduce the brittleness", "B) To remove the ductility", "C) To increase the hardness", "D) To increase the brittleness"], "a": "A) To reduce the brittleness"}, {"topic": "Section 1", "q": "After hardening process, the metal becomes more hardened and also will become more", "o": ["A) Brittle", "B) Ductile", "C) Malleable", "D) Tough"], "a": "A) Brittle"}, {"topic": "Section 1", "q": "In Annealing, cooling is done in which of the following medium?", "o": ["A) Air", "B) Water", "C) Oil", "D) Furnace"], "a": "D) Furnace"}, {"topic": "Section 1", "q": "While normalizing the steel should be cooled", "o": ["A) In still air to room temperature", "B) In oil", "C) By forced air", "D) In water"], "a": "A) In still air to roo function getRandomQuestions(){
    let shuffled = fullQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0,100);
}

var questions = getRandomQuestions();

var current = 0;
var answers = {};
var visited = {};
var marked = {};


// TIMER
var totalTime = 7200;

function startTimer(){
    var timer = setInterval(function(){
        var h = Math.floor(totalTime/3600);
        var m = Math.floor((totalTime%3600)/60);
        var s = totalTime%60;

        document.getElementById("timer").innerText =
        h + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);

        totalTime--;

        if(totalTime < 0){
            clearInterval(timer);
            submitExam(true);
        }
    },1000);
}


// PALETTE
function buildPalette(){
    var p="";
    for(let i=0;i<questions.length;i++){
        p+=`<button id="p${i}" class="default" onclick="go(${i})">${i+1}</button>`;
    }
    document.getElementById("palette").innerHTML = p;
}

function updatePalette(){
    for(let i=0;i<questions.length;i++){
        let btn = document.getElementById("p"+i);

        if(marked[i]){
            btn.className="marked";
        }
        else if(answers[i] !== undefined){
            btn.className="answered";
        }
        else if(visited[i]){
            btn.className="unanswered";
        }
        else{
            btn.className="default";
        }
    }
}


// NAVIGATION
function go(i){
    current=i;
    loadQuestion();
}

function loadQuestion(){

    visited[current]=true;

    var q = questions[current];
    document.getElementById("question").innerHTML = (current+1)+". "+q.q;

    var opts = "";
    q.o.forEach(function(opt,i){
        var checked = (answers[current] !== undefined && answers[current] === i) ? "checked" : "";

        opts += `<label style="display:block;cursor:pointer;margin:8px 0;">
        <input type="radio" name="opt" value="${i}" ${checked}> ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = opts;

    document.querySelectorAll('input[name="opt"]').forEach(function(radio){
        radio.addEventListener("change", function(){
            answers[current] = parseInt(this.value);
            if(marked[current]) delete marked[current];
            updateCount();
            updatePalette();
        });
    });

    updateCount();
    updatePalette();
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}

function mark(){
    marked[current]=true;
    updatePalette();
}


// ATTEMPT COUNT
function updateCount(){
    document.getElementById("count").innerText = Object.keys(answers).length;
}


// SUBMIT
function submitExam(auto=false){

    if(!auto && Object.keys(visited).length < 100){
        alert("Visit all questions before submitting!");
        return;
    }

    let score = 0;
    let attempted = 0;

    var resultHTML = "<h2>Results</h2>";

    questions.forEach(function(q,i){

        let correct = q.a;
        let userIndex = answers[i];
        let user = userIndex !== undefined ? q.o[userIndex] : null;

        if(user !== null) attempted++;

        let isCorrect = false;

        if(user && correct){
            isCorrect = user.charAt(0) === correct.charAt(0);
        }

        if(isCorrect) score++;

        resultHTML += `
        <div>
        <b>${i+1}. ${q.q}</b><br>

        Your Answer: 
        <span style="color:${user ? (isCorrect ? "green" : "red") : "black"}">
        ${user ? user : "Not Attempted"}
        </span><br>

        Correct Answer: 
        <span style="color:green">${correct}</span>
        </div><br>`;
    });

    resultHTML =
    `<h2>Results</h2>
     <div style="text-align:center;font-size:34px;font-weight:bold;margin-bottom:10px;">
     Score: ${score}/100
     </div>
     <div style="text-align:center;font-size:24px;margin-bottom:20px;">
     Attempted: ${attempted}/100
     </div>` + resultHTML;

    document.getElementById("resultArea").innerHTML = resultHTML;
    document.getElementById("resultArea").style.display="block";
    document.getElementById("examArea").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("palette").style.display="none";
    document.getElementById("attemptBox").style.display="none";
    document.getElementById("timer").style.display="none";
}


buildPalette();
startTimer();
loadQuestion();

</script>
